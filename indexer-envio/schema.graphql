type Pool {
  id: ID! # "{chainId}-{poolAddress}"
  chainId: Int! @index
  token0: String
  token1: String
  token0Decimals: Int!
  token1Decimals: Int!
  source: String!

  # Latest reserves (updated on every ReserveUpdate / Swap)
  reserves0: BigInt!
  reserves1: BigInt!

  # Cumulative metrics (running totals since pool creation)
  swapCount: Int!
  notionalVolume0: BigInt!
  notionalVolume1: BigInt!
  rebalanceCount: Int!

  # Oracle state (FPMM pools only; VirtualPools default to N/A)
  oracleOk: Boolean!
  oraclePrice: BigInt!
  oracleTimestamp: BigInt!
  oracleTxHash: String!
  oracleExpiry: BigInt!
  oracleNumReporters: Int!
  referenceRateFeedID: String! @index

  # Deviation / rebalance state
  invertRateFeed: Boolean!
  priceDifference: BigInt!
  rebalanceThreshold: Int!
  lastRebalancedAt: BigInt!
  # Rising-edge timestamp: block time when priceDifference crossed strictly
  # above rebalanceThreshold (devRatio > 1.0). Exact-threshold pools stay
  # WARN and do NOT start this timer. 0n when not currently breached. Does
  # not track oracle staleness — this is price-action only.
  deviationBreachStartedAt: BigInt!

  # Health
  healthStatus: String!

  # Health score accumulators (FPMM pools only)
  healthTotalSeconds: BigInt! # total tracked seconds with oracle coverage
  healthBinarySeconds: BigInt! # seconds where deviationRatio ≤ 1.0
  lastOracleSnapshotTimestamp: BigInt! # timestamp of most recent oracle snapshot
  lastDeviationRatio: String! # deviationRatio at most recent snapshot
  hasHealthData: Boolean! # true once first health snapshot recorded
  # Fee configuration (FPMM pools only; basis points, e.g. 15 = 0.15%)
  lpFee: Int!
  protocolFee: Int!

  # Trading limits (FPMM pools only; defaults to "N/A" for VirtualPools)
  limitStatus: String! # "OK" | "WARN" | "CRITICAL" | "N/A"
  limitPressure0: String! # e.g. "0.1230"
  limitPressure1: String! # e.g. "0.0050"
  # Rebalancer liveness (FPMM pools only)
  rebalancerAddress: String!
  rebalanceLivenessStatus: String! # "ACTIVE" | "N/A"
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
}

type OracleSnapshot @index(fields: ["poolId", "timestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  timestamp: BigInt! @index
  oraclePrice: BigInt!
  oracleOk: Boolean!
  numReporters: Int!
  priceDifference: BigInt!
  rebalanceThreshold: Int!
  source: String!
  blockNumber: BigInt!
  txHash: String!
  deviationRatio: String! # priceDifference / rebalanceThreshold, 6dp fixed
  healthBinaryValue: String! # "1.000000" if d ≤ 1.0, "0.000000" otherwise
  hasHealthData: Boolean! # false for legacy/no-data rows
}

type PoolSnapshot @index(fields: ["poolId", "timestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  timestamp: BigInt! @index

  # Point-in-time state (latest values at end of this hour)
  reserves0: BigInt!
  reserves1: BigInt!

  # Per-hour activity
  swapCount: Int!
  swapVolume0: BigInt!
  swapVolume1: BigInt!
  rebalanceCount: Int!
  mintCount: Int!
  burnCount: Int!

  # Running cumulative totals (snapshot of Pool cumulatives at this hour)
  cumulativeSwapCount: Int!
  cumulativeVolume0: BigInt!
  cumulativeVolume1: BigInt!

  blockNumber: BigInt!
}

# Daily rollup of PoolSnapshot — same shape, day-bucketed instead of hour-bucketed.
# Exists so homepage volume-over-time and per-pool snapshot charts fit in a single
# Hasura page for years of history instead of hitting the 1000-row cap.
type PoolDailySnapshot @index(fields: ["poolId", "timestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  timestamp: BigInt! @index # UTC day bucket (ts / 86400 * 86400)
  # Point-in-time state (latest values at end of this day)
  reserves0: BigInt!
  reserves1: BigInt!

  # Per-day activity
  swapCount: Int!
  swapVolume0: BigInt!
  swapVolume1: BigInt!
  rebalanceCount: Int!
  mintCount: Int!
  burnCount: Int!

  # Running cumulative totals (snapshot of Pool cumulatives at this day)
  cumulativeSwapCount: Int!
  cumulativeVolume0: BigInt!
  cumulativeVolume1: BigInt!

  blockNumber: BigInt!
}

type FactoryDeployment {
  id: ID!
  chainId: Int! @index
  poolId: String!
  token0: String!
  token1: String!
  implementation: String!
  factoryAddress: String!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

type SwapEvent @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  sender: String!
  recipient: String!
  amount0In: BigInt!
  amount1In: BigInt!
  amount0Out: BigInt!
  amount1Out: BigInt!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

type LiquidityEvent @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  kind: String!
  sender: String!
  recipient: String!
  amount0: BigInt!
  amount1: BigInt!
  liquidity: BigInt!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

type ReserveUpdate @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  reserve0: BigInt!
  reserve1: BigInt!
  blockTimestampInPool: BigInt!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

type RebalanceEvent @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  sender: String! # Strategy contract (event.params.sender)
  caller: String! # EOA that triggered the rebalance (tx.from)
  priceDifferenceBefore: BigInt!
  priceDifferenceAfter: BigInt!
  improvement: BigInt! # priceDifferenceBefore - priceDifferenceAfter
  effectivenessRatio: String! # improvement / priceDifferenceBefore as string e.g. "0.5000"
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

type TradingLimit @index(fields: ["poolId"]) {
  id: ID! # "{poolId}-{tokenAddress}"
  chainId: Int! @index
  poolId: String!
  token: String!
  limit0: BigInt!
  limit1: BigInt!
  decimals: Int!
  netflow0: BigInt!
  netflow1: BigInt!
  lastUpdated0: BigInt!
  lastUpdated1: BigInt!
  limitPressure0: String! # stored as string e.g. "0.1230"
  limitPressure1: String!
  limitStatus: String! # "OK" | "WARN" | "CRITICAL"
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
}

type VirtualPoolLifecycle {
  id: ID!
  chainId: Int! @index
  poolId: String!
  action: String!
  token0: String
  token1: String
  factoryAddress: String!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

type LiquidityPosition @index(fields: ["poolId", "address"]) {
  id: ID! # "{poolId}-{address}"
  chainId: Int! @index
  poolId: String! @index
  address: String! @index
  netLiquidity: BigInt! # Running sum: +mint, -burn. Always >= 0 in practice.
  lastUpdatedBlock: BigInt!
  lastUpdatedTimestamp: BigInt!
}

type ProtocolFeeTransfer {
  id: ID!
  chainId: Int! @index
  token: String! @index
  tokenSymbol: String!
  tokenDecimals: Int!
  amount: BigInt!
  from: String!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

# ─── Open Liquidity Strategy ───────────────────────────────────

# Registered OLS pool config. One record per (pool, OLS contract).
# id = "<poolAddress>-<olsAddress>" — composite key so re-registration to a
# new OLS contract creates a fresh record instead of silently overwriting history.
type OlsPool {
  id: ID! # "{chainId}-<poolAddress>-<olsAddress>" composite key
  chainId: Int! @index
  poolId: String! @index # "{chainId}-{poolAddress}" (FK to Pool.id)
  olsAddress: String! # OpenLiquidityStrategy contract address
  isActive: Boolean! # false after PoolRemoved
  debtToken: String! # address of debt token (from AddPoolParams)
  rebalanceCooldown: BigInt! # uint32 seconds
  lastRebalance: BigInt! # uint32 Unix timestamp (0 = never rebalanced)
  protocolFeeRecipient: String!
  liquiditySourceIncentiveExpansion: BigInt!
  liquiditySourceIncentiveContraction: BigInt!
  protocolIncentiveExpansion: BigInt!
  protocolIncentiveContraction: BigInt!
  olsRebalanceCount: Int! # count of LiquidityMoved events for this pool
  addedAtBlock: BigInt!
  addedAtTimestamp: BigInt!
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
}

# Individual LiquidityMoved events from OLS
type OlsLiquidityEvent @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index # "{chainId}-{poolAddress}" (FK to Pool.id)
  olsAddress: String!
  direction: Int! # 0 = Expand, 1 = Contract
  tokenGivenToPool: String!
  amountGivenToPool: BigInt!
  tokenTakenFromPool: String!
  amountTakenFromPool: BigInt!
  caller: String! # tx.from — the rebalancer EOA
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

# Lifecycle events: PoolAdded, PoolRemoved, RebalanceCooldownSet
type OlsLifecycleEvent {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  olsAddress: String!
  action: String! # "POOL_ADDED" | "POOL_REMOVED" | "COOLDOWN_SET"
  cooldown: BigInt! # 0 for non-cooldown events; value for COOLDOWN_SET
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

# ============================================================================
# Bridge Flows — generic (provider-agnostic) core
#
# Any bridge provider (Wormhole NTT today; LayerZero / Axelar / CCTP later)
# writes to these entities. Provider-specific fields live in the extension
# tables below (e.g. WormholeTransferDetail).
#
# BridgeTransfer.id = "{provider}-{providerMessageId}", lowercase, URL-safe.
# ============================================================================

enum BridgeProvider {
  WORMHOLE
}

type BridgeTransfer {
  id: ID! # "{provider}-{providerMessageId}", lowercased
  provider: BridgeProvider! @index
  providerMessageId: String! @index # Wormhole digest; LayerZero GUID; etc.
  status: String! @index # PENDING | SENT | ATTESTED | DELIVERED | QUEUED_OUTBOUND | QUEUED_INBOUND | CANCELLED | FAILED
  tokenSymbol: String! @index
  tokenAddress: String!
  tokenDecimals: Int!

  sourceChainId: Int
  sourceContract: String # provider's source-chain dispatch contract (e.g. NttManager)
  destChainId: Int
  destContract: String

  sender: String @index
  recipient: String @index
  amount: BigInt

  sentBlock: BigInt
  sentTimestamp: BigInt @index
  sentTxHash: String

  attestationCount: Int!
  firstAttestedTimestamp: BigInt
  lastAttestedTimestamp: BigInt

  deliveredBlock: BigInt
  deliveredTimestamp: BigInt
  deliveredTxHash: String

  cancelledTimestamp: BigInt
  failedReason: String

  usdPriceAtSend: String # fixed-point 18dp string
  usdValueAtSend: String # 2dp string, lex-sortable
  firstSeenAt: BigInt!
  lastUpdatedAt: BigInt!
}

type BridgeAttestation {
  id: ID! # "{transferId}-{attester}-{attesterIndex}"
  transferId: String! @index
  provider: BridgeProvider!
  attester: String! # guardian address (Wormhole); DVN address (LayerZero)
  attesterIndex: Int
  chainId: Int!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
  txHash: String!
}

type BridgeDailySnapshot {
  id: ID! # "{dayTs}-{provider}-{tokenSymbol}-{sourceChainId}-{destChainId}"
  date: BigInt! @index
  provider: BridgeProvider!
  tokenSymbol: String! @index
  sourceChainId: Int! @index
  destChainId: Int! @index
  sentCount: Int!
  deliveredCount: Int!
  cancelledCount: Int!
  sentVolume: BigInt!
  deliveredVolume: BigInt!
  sentUsdValue: String!
  updatedAt: BigInt!
}

type BridgeBridger {
  id: ID! # lowercase sender address (cross-chain identity)
  sender: String! @index
  totalSentCount: Int!
  totalSentUsd: String! # 2dp, lex-sortable
  sourceChainsUsed: String! # JSON array of EVM chainIds
  tokensUsed: String! # JSON array of token symbols
  providersUsed: String! # JSON array of BridgeProvider values
  firstSeenAt: BigInt!
  lastSeenAt: BigInt!
}

# ============================================================================
# Bridge Flows — Wormhole-specific extension
#
# These entities only exist for Wormhole-originated transfers. Adding a new
# provider means adding sibling entities (e.g. LayerZeroTransferDetail); the
# generic entities above are untouched.
# ============================================================================

type WormholeNttManager {
  id: ID! # "{chainId}-{nttManagerAddr}", lowercased
  chainId: Int! @index
  nttManager: String! @index
  transceiver: String! @index
  helper: String!
  tokenAddress: String! @index
  tokenSymbol: String! @index
  tokenDecimals: Int!
  wormholeChainId: Int!
  rateFeedId: String
  seededAtTimestamp: BigInt! # block.timestamp of the first event that seeded this row
}

type WormholeTransferDetail {
  id: ID! # == BridgeTransfer.id
  digest: String! @index # bytes32, 0x-lowercased — the provider's message id
  msgSequence: BigInt @index
  sourceWormholeChainId: Int
  destWormholeChainId: Int
  refundAddress: String
  fee: BigInt # Wormhole delivery fee, native token (not USD)
  # NTT rate-limiter state (Wormhole-specific)
  outboundQueuedSequence: BigInt
  inboundQueuedTimestamp: BigInt
  rateLimitedCurrentCapacity: BigInt
}

type WormholeTransferPending {
  id: ID! # "{chainId}-{txHash}", ephemeral — should be 0 rows in steady state
  chainId: Int!
  txHash: String!
  nttManager: String!
  sender: String!
  recipient: String!
  refundAddress: String!
  amount: BigInt!
  fee: BigInt!
  recipientWormholeChainId: Int!
  msgSequence: BigInt!
  sentBlock: BigInt!
  sentTimestamp: BigInt!
}
