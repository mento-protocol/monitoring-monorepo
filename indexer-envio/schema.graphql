type Pool {
  id: ID! # "{chainId}-{poolAddress}"
  chainId: Int! @index
  token0: String
  token1: String
  token0Decimals: Int!
  token1Decimals: Int!
  source: String!

  # Latest reserves (updated on every ReserveUpdate / Swap)
  reserves0: BigInt!
  reserves1: BigInt!

  # Cumulative metrics (running totals since pool creation)
  swapCount: Int!
  notionalVolume0: BigInt!
  notionalVolume1: BigInt!
  rebalanceCount: Int!

  # Oracle state (FPMM pools only; VirtualPools default to N/A)
  oracleOk: Boolean!
  oraclePrice: BigInt!
  oracleTimestamp: BigInt!
  oracleTxHash: String!
  oracleExpiry: BigInt!
  oracleNumReporters: Int!
  referenceRateFeedID: String! @index

  # Oracle median-jump detection (FPMM pools only). Tracks the delta between
  # consecutive `MedianUpdated` prices — the signal consumed by the "Oracle
  # Jump Exceeds Swap Fee" alert.
  # Previous `MedianUpdated` value, stored separately from `oraclePrice`
  # because `OracleReported` also overwrites `oraclePrice` with individual
  # reporter values, so it can't be used as the "previous median".
  lastMedianPrice: BigInt!
  # Block timestamp of the most recent non-zero `MedianUpdated`. Distinct
  # from `oracleTimestamp` (also moved by OracleReported) and
  # `lastOracleJumpAt` (only set once a jump can be computed, so 0 for the
  # first-ever median). Sole consumer is the next MedianUpdated, which
  # captures it as `prevMedianAt` before overwrite.
  lastMedianAt: BigInt!
  # `lastMedianPrice` / `lastMedianAt` from the prior MedianUpdated, captured
  # before overwrite so the Oracle Jump alert can render "Previous Oracle
  # Price (Xm ago)". 0 until the second non-zero MedianUpdated.
  prevMedianPrice: BigInt!
  prevMedianAt: BigInt!
  # |newMedian − prevMedian| / prevMedian × 10_000, as a 4dp fixed-point
  # string (e.g. "10.5000" = 10.5 bps). "0.0000" before the second
  # `MedianUpdated` on a feed.
  lastOracleJumpBps: String!
  # Block timestamp of the `MedianUpdated` event that produced
  # `lastOracleJumpBps`. 0 before the first `MedianUpdated`.
  lastOracleJumpAt: BigInt!

  # Deviation / rebalance state
  invertRateFeed: Boolean!
  priceDifference: BigInt!
  rebalanceThreshold: Int!
  lastRebalancedAt: BigInt!
  # Rising-edge timestamp: block time when priceDifference crossed strictly
  # above the 1% tolerance line (devRatio > 1.01). Exact-tolerance pools
  # stay OK and do NOT start this timer. 0n when not currently breached.
  # Does not track oracle staleness — this is price-action only.
  deviationBreachStartedAt: BigInt!
  # Max `priceDifference` observed during the currently-open breach (0 when
  # no open breach). Denormalized from the open `DeviationThresholdBreach`
  # row so the live-uptime tile can gate on peak — same basis as the
  # indexer's `cumulativeCriticalSeconds` accrual on close — without
  # joining to the breach row at render time.
  currentOpenBreachPeak: BigInt!
  # `rebalanceThreshold` captured at the rising edge of the currently-open
  # breach (0 when no open breach). Denormalized so the live-uptime gate
  # scores peak against the SAME threshold the persisted accrual uses
  # (entry-time, not current-time). Otherwise an
  # `FPMMRebalanceThresholdUpdated` mid-breach could shift the live verdict.
  currentOpenBreachEntryThreshold: Int!

  # Health
  healthStatus: String!

  # Health score accumulators (FPMM pools only)
  healthTotalSeconds: BigInt! # total tracked seconds with oracle coverage
  healthBinarySeconds: BigInt! # seconds where deviationRatio ≤ 1.01 (within tolerance)
  lastOracleSnapshotTimestamp: BigInt! # timestamp of most recent oracle snapshot
  lastDeviationRatio: String! # deviationRatio at most recent snapshot
  lastEffectivenessRatio: String! # effectivenessRatio of most recent RebalanceEvent ("-1" sentinel until first rebalance)
  hasHealthData: Boolean! # true once first health snapshot recorded
  # Breach accumulators — running totals over the pool's lifetime (trading-seconds,
  # i.e. FX weekend closure is excluded). `cumulativeCriticalSeconds` is the
  # "time in CRITICAL" SLO number; dividing by a denominator of total tracked
  # trading-seconds in the window gives the uptime %. Summed at breach close.
  cumulativeBreachSeconds: BigInt!
  cumulativeCriticalSeconds: BigInt!
  breachCount: Int!
  # Fee configuration (FPMM pools only; basis points, e.g. 15 = 0.15%).
  # `-1` sentinel means RPC read failed and the field has not yet healed.
  lpFee: Int!
  protocolFee: Int!
  rebalanceReward: Int!

  # Trading limits (FPMM pools only; defaults to "N/A" for VirtualPools)
  limitStatus: String! # "OK" | "WARN" | "CRITICAL" | "N/A"
  limitPressure0: String! # e.g. "0.1230"
  limitPressure1: String! # e.g. "0.0050"
  # Rebalancer liveness (FPMM pools only)
  rebalancerAddress: String!
  rebalanceLivenessStatus: String! # "ACTIVE" | "N/A"
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
}

type DeviationThresholdBreach @index(fields: ["poolId", "startedAt"]) {
  id: ID! # "{poolId}-{startedAt}"
  chainId: Int! @index
  poolId: String! @index
  startedAt: BigInt! @index # block time of the rising edge
  startedAtBlock: BigInt!
  endedAt: BigInt @index # null while active
  endedAtBlock: BigInt
  # Durations in trading-seconds (FX weekend closure excluded). Null while
  # the breach is still open.
  durationSeconds: BigInt
  # Portion of the duration past the 1h grace window — equals the
  # "time in CRITICAL" SLO number for this breach alone.
  criticalDurationSeconds: BigInt
  # Magnitude
  entryPriceDifference: BigInt! # priceDifference at the rising edge
  # rebalanceThreshold at the rising edge (bps). Captures the threshold the
  # breach opened against so that critical-magnitude scoring (peak vs 1.05x)
  # at falling edge isn't retroactively shifted by a mid-breach
  # FPMMRebalanceThresholdUpdated event.
  entryRebalanceThreshold: Int!
  peakPriceDifference: BigInt! # max observed during the breach
  peakAt: BigInt! # block time when peak was reached
  peakAtBlock: BigInt!
  # Causation
  startedByEvent: String! # "swap" | "liquidity" | "oracle_update" | "rebalance" | "threshold_change" | "unknown"
  startedByTxHash: String!
  endedByEvent: String # null while active
  endedByTxHash: String
  endedByStrategy: String # rebalancer strategy address, when endedByEvent = "rebalance"
  # Rebalance attempts observed while the breach was open (including the
  # closing rebalance, if it closed via rebalance).
  rebalanceCountDuring: Int!
}

type OracleSnapshot @index(fields: ["poolId", "timestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  timestamp: BigInt! @index
  oraclePrice: BigInt!
  oracleOk: Boolean!
  numReporters: Int!
  priceDifference: BigInt!
  rebalanceThreshold: Int!
  source: String!
  blockNumber: BigInt!
  txHash: String!
  deviationRatio: String! # priceDifference / rebalanceThreshold, 6dp fixed
  healthBinaryValue: String! # "1.000000" if d ≤ 1.01 (within tolerance), "0.000000" otherwise
  hasHealthData: Boolean! # false for legacy/no-data rows
}

type PoolSnapshot @index(fields: ["poolId", "timestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  timestamp: BigInt! @index

  # Point-in-time state (latest values at end of this hour)
  reserves0: BigInt!
  reserves1: BigInt!

  # Per-hour activity
  swapCount: Int!
  swapVolume0: BigInt!
  swapVolume1: BigInt!
  rebalanceCount: Int!
  mintCount: Int!
  burnCount: Int!

  # Running cumulative totals (snapshot of Pool cumulatives at this hour)
  cumulativeSwapCount: Int!
  cumulativeVolume0: BigInt!
  cumulativeVolume1: BigInt!

  blockNumber: BigInt!
}

# Daily rollup of PoolSnapshot — same shape, day-bucketed instead of hour-bucketed.
# Exists so homepage volume-over-time and per-pool snapshot charts fit in a single
# Hasura page for years of history instead of hitting the 1000-row cap.
type PoolDailySnapshot @index(fields: ["poolId", "timestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  timestamp: BigInt! @index # UTC day bucket (ts / 86400 * 86400)
  # Point-in-time state (latest values at end of this day)
  reserves0: BigInt!
  reserves1: BigInt!

  # Per-day activity
  swapCount: Int!
  swapVolume0: BigInt!
  swapVolume1: BigInt!
  rebalanceCount: Int!
  mintCount: Int!
  burnCount: Int!

  # Running cumulative totals (snapshot of Pool cumulatives at this day)
  cumulativeSwapCount: Int!
  cumulativeVolume0: BigInt!
  cumulativeVolume1: BigInt!
  # Health accumulators frozen at this day's last event. Differencing two
  # daily rows gives the binary uptime % over the window between them —
  # consumed by the UI's "X.XX% last 7d" subtitle on the Uptime tile.
  cumulativeHealthBinarySeconds: BigInt!
  cumulativeHealthTotalSeconds: BigInt!

  blockNumber: BigInt!
}

type FactoryDeployment {
  id: ID!
  chainId: Int! @index
  poolId: String!
  token0: String!
  token1: String!
  implementation: String!
  factoryAddress: String!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

type SwapEvent @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  sender: String! # event.params.sender — the pool's caller (router/broker for routed swaps)
  recipient: String! # event.params.to — where output tokens land
  caller: String! @index # tx.from — the EOA that signed the tx (volume-leaderboard primary key)
  txTo: String! @index # tx.to — entry-point contract; aggregator router if routed via Squid/Jumper/etc.
  amount0In: BigInt!
  amount1In: BigInt!
  amount0Out: BigInt!
  amount1Out: BigInt!
  # Notional USD value, 18-decimal "USD-wei" scaling. 0 when neither token is
  # USD-pegged (see USD_PEGGED_SYMBOLS in src/usd.ts) — distinguishable from
  # genuine zero-volume swaps via amount0In/Out being non-zero.
  volumeUsdWei: BigInt!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

type LiquidityEvent @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  kind: String!
  sender: String!
  recipient: String!
  amount0: BigInt!
  amount1: BigInt!
  liquidity: BigInt!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

type ReserveUpdate @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  reserve0: BigInt!
  reserve1: BigInt!
  blockTimestampInPool: BigInt!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

type RebalanceEvent @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  sender: String! # Strategy contract (event.params.sender)
  caller: String! # EOA that triggered the rebalance (tx.from)
  priceDifferenceBefore: BigInt!
  priceDifferenceAfter: BigInt!
  improvement: BigInt! # priceDifferenceBefore - priceDifferenceAfter
  rebalanceThreshold: Int! # bps at event time; 0 = indexer hadn't read on-chain value
  # improvement / (before - threshold), stringified. 1.0000 = landed on
  # boundary; >1 = overshoot; 0.0000 = real 0%-effective miss; <0 = made
  # deviation worse; "" (empty) = degenerate (threshold missing, pool
  # already in-band, or before=0) — distinct from real 0% on purpose so
  # the UI can render "—" without hiding control-loop misses.
  effectivenessRatio: String!
  # Token deltas across the rebalance: `reserves_post - reserves_pre`. Signed
  # wei: positive means the pool received that token. Pre-rebalance reserves
  # come from `getReserves()` at `blockNumber - 1`; on RPC failure both deltas
  # are 0 and `notionalUsd`/`rewardUsd` are "" (sentinel — see below).
  # Known limitation: `blockNumber - 1` is the previous block's end state,
  # not the in-tx pre-rebalance state. If an earlier swap/mint/burn lands
  # in the same block as the rebalance, its delta is folded in. Triggers
  # on <5% of mainnet rebalances; revisit if the impact shows up in data
  # (the architectural fix needs txHash-aware pre-UR tracking on Pool).
  amount0Delta: BigInt!
  amount1Delta: BigInt!
  # `Pool.rebalanceReward` snapshot at event time (bps). -2 sentinel ("getter
  # missing on this contract"; see PR #222) is normalized to 0 here so the
  # reward arithmetic is well-defined.
  rewardBps: Int!
  # Notional USD value of the rebalance: |delta| of the USD-pegged side
  # (USD_PEGGED_SYMBOLS in src/usd.ts) scaled by its decimals, fixed-point
  # 4dp, e.g. "12345.6789". "" (empty) sentinel when the pool has no
  # USD-pegged side or the pre-reserves RPC failed — distinct from "0.0000".
  notionalUsd: String!
  # `notionalUsd × rewardBps / 10000`, fixed-point 4dp. Mirrors the empty
  # sentinel of `notionalUsd`. The UI renders "—" when empty.
  rewardUsd: String!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

