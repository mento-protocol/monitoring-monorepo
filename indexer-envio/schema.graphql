# ─── Open Liquidity Strategy ───────────────────────────────────

# Registered OLS pool config. One record per (pool, OLS contract).
# id = "<poolAddress>-<olsAddress>" — composite key so re-registration to a
# new OLS contract creates a fresh record instead of silently overwriting history.
type OlsPool {
  id: ID! # "{chainId}-<poolAddress>-<olsAddress>" composite key
  chainId: Int! @index
  poolId: String! @index # "{chainId}-{poolAddress}" (FK to Pool.id)
  olsAddress: String! # OpenLiquidityStrategy contract address
  isActive: Boolean! # false after PoolRemoved
  debtToken: String! # address of debt token (from AddPoolParams)
  rebalanceCooldown: BigInt! # uint32 seconds
  lastRebalance: BigInt! # uint32 Unix timestamp (0 = never rebalanced)
  protocolFeeRecipient: String!
  liquiditySourceIncentiveExpansion: BigInt!
  liquiditySourceIncentiveContraction: BigInt!
  protocolIncentiveExpansion: BigInt!
  protocolIncentiveContraction: BigInt!
  olsRebalanceCount: Int! # count of LiquidityMoved events for this pool
  addedAtBlock: BigInt!
  addedAtTimestamp: BigInt!
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
}

# Individual LiquidityMoved events from OLS
type OlsLiquidityEvent @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  chainId: Int! @index
  poolId: String! @index # "{chainId}-{poolAddress}" (FK to Pool.id)
  olsAddress: String!
  direction: Int! # 0 = Expand, 1 = Contract
  tokenGivenToPool: String!
  amountGivenToPool: BigInt!
  tokenTakenFromPool: String!
  amountTakenFromPool: BigInt!
  caller: String! # tx.from — the rebalancer EOA
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

# Lifecycle events: PoolAdded, PoolRemoved, RebalanceCooldownSet
type OlsLifecycleEvent {
  id: ID!
  chainId: Int! @index
  poolId: String! @index
  olsAddress: String!
  action: String! # "POOL_ADDED" | "POOL_REMOVED" | "COOLDOWN_SET"
  cooldown: BigInt! # 0 for non-cooldown events; value for COOLDOWN_SET
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

# ============================================================================
# Circuit Breakers (BreakerBox + MedianDeltaBreaker + ValueDeltaBreaker)
#
# Per-feed breaker config + live state. Every v3 indexed pool with a
# `referenceRateFeedID` has at most ONE trip-able BreakerConfig row
# (MedianDelta on FX, ValueDelta on stablecoin). MarketHoursBreaker is
# represented as a Breaker row for completeness — its events fire through
# BreakerBox — but no BreakerConfig is populated for it (no per-feed state).
#
# IDs:
#   Breaker.id        = "{chainId}-{breakerAddress}"
#   BreakerConfig.id  = "{chainId}-{breakerAddress}-{rateFeedID}"
#   BreakerTripEvent.id = eventId(chainId, blockNumber, logIndex)
#
# All addresses + feed IDs are lowercased.
# ============================================================================

enum BreakerKind {
  MEDIAN_DELTA
  VALUE_DELTA
  MARKET_HOURS
}

enum BreakerStatus {
  OK
  TRIPPED
}

type Breaker @index(fields: ["chainId", "address"]) {
  id: ID! # "{chainId}-{lowercaseAddress}"
  chainId: Int! @index
  address: String! @index # lowercased
  kind: BreakerKind!
  # Trading mode this breaker OR's into rateFeedTradingMode when tripped.
  # Production: 3 (halt) for all three breakers on Celo + Monad.
  activatesTradingMode: Int!
  # Defaults — used when per-feed override is sentinel 0.
  defaultCooldownTime: BigInt! # seconds
  defaultRateChangeThreshold: BigInt! # Fixidity 1e24=100%
  registeredAtBlock: BigInt!
  registeredAtTimestamp: BigInt!
  removed: Boolean!
}

type BreakerConfig @index(fields: ["chainId", "rateFeedID"]) {
  id: ID! # "{chainId}-{breakerAddress}-{rateFeedID}"
  chainId: Int! @index
  breaker: Breaker!
  # Denormalized for query convenience (avoid joining for filter-by-address).
  breakerAddress: String! @index
  rateFeedID: String! @index # lowercased
  enabled: Boolean!
  # Per-feed config (sentinel 0 = inherit Breaker default).
  cooldownTime: BigInt!
  rateChangeThreshold: BigInt!
  # MedianDelta-only (null on VALUE_DELTA / MARKET_HOURS).
  smoothingFactor: BigInt # Fixidity
  # `0n` = uninitialized. Treat as "not yet seeded" in UI; the next
  # `MedianUpdated` will seed EMA = currentMedian (mirrors contract behavior
  # in MedianDeltaBreaker.shouldTrigger when previousEMA == 0).
  medianRatesEMA: BigInt
  # ValueDelta-only.
  referenceValue: BigInt
  # Live state mirrored from MedianUpdated (NOT OracleReported — the
  # contract only invokes shouldTrigger when the median changes).
  lastMedianRate: BigInt
  lastUpdatedAt: BigInt
  # Current status mirroring on-chain BreakerStatus struct.
  status: BreakerStatus!
  # 0 if OK; activatesTradingMode if TRIPPED.
  tradingMode: Int!
  # = on-chain BreakerStatus.lastUpdatedTime; drives cooldown timing.
  lastStatusUpdatedAt: BigInt!
  # Pre-rolled = lastStatusUpdatedAt + cooldownTime. Refreshed on every trip
  # / reset / cooldown config change so the dashboard can render
  # `cooldownEndsAt - now` without RPC.
  cooldownEndsAt: BigInt!
  lastTripAt: BigInt
  lastTripTxHash: String
  lastResetAt: BigInt
  tripCountLifetime: Int!
}

type BreakerTripEvent @index(fields: ["rateFeedID", "blockTimestamp"]) {
  id: ID! # eventId(chainId, blockNumber, logIndex)
  chainId: Int! @index
  breaker: Breaker!
  breakerAddress: String! @index
  rateFeedID: String! @index
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
  txHash: String!
  logIndex: Int!
  # Snapshots at trip time so the UI can render
  # "tripped at 4.53% (threshold 4.00%)" without RPC.
  medianRateAtTrip: BigInt!
  # Nullable: EMA at trip time for MedianDelta; referenceValue for ValueDelta.
  referenceAtTrip: BigInt
  thresholdAtTrip: BigInt!
}

# ============================================================================
# Bridge Flows — generic (provider-agnostic) core
#
# Any bridge provider (Wormhole NTT today; LayerZero / Axelar / CCTP later)
# writes to these entities. Provider-specific fields live in the extension
# tables below (e.g. WormholeTransferDetail).
#
# BridgeTransfer.id = "{provider}-{providerMessageId}", lowercase, URL-safe.
# ============================================================================

enum BridgeProvider {
  WORMHOLE
}

type BridgeTransfer {
  id: ID! # "{provider}-{providerMessageId}", lowercased
  provider: BridgeProvider! @index
  providerMessageId: String! @index # Wormhole digest; LayerZero GUID; etc.
  status: String! @index # PENDING | SENT | ATTESTED | DELIVERED | QUEUED_INBOUND | CANCELLED | FAILED. Source-side queue (QUEUED_OUTBOUND) is intentionally omitted — see src/wormhole/status.ts.
  tokenSymbol: String! @index
  tokenAddress: String!
  tokenDecimals: Int!

  sourceChainId: Int
  sourceContract: String # provider's source-chain dispatch contract (e.g. NttManager)
  destChainId: Int
  destContract: String

  sender: String @index
  recipient: String @index
  amount: BigInt

  sentBlock: BigInt
  sentTimestamp: BigInt @index
  sentTxHash: String

  attestationCount: Int!
  firstAttestedTimestamp: BigInt
  lastAttestedTimestamp: BigInt

  deliveredBlock: BigInt
  deliveredTimestamp: BigInt
  deliveredTxHash: String

  cancelledTimestamp: BigInt
  failedReason: String

  # Nullable while USD pricing is deferred (plan §1.5). Mirrors the deferral
  # annotation on BridgeDailySnapshot.sentUsdValue — no handler writes these
  # today; UI falls back to live oracle rates.
  usdPriceAtSend: String # fixed-point 18dp string
  usdValueAtSend: String # 2dp string, lex-sortable
  # `BRIDGE_TRANSFERS_WINDOW` polls Hasura every 10s with `_gte` + descending
  # sort on this field, so it needs an index to avoid full scans under load.
  firstSeenAt: BigInt! @index
  lastUpdatedAt: BigInt!
}

type BridgeAttestation {
  id: ID! # "{transferId}-{attester}-{attesterIndex}"
  transferId: String! @index
  provider: BridgeProvider!
  attester: String! # guardian address (Wormhole); DVN address (LayerZero)
  attesterIndex: Int
  chainId: Int!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
  txHash: String!
}

type BridgeDailySnapshot {
  id: ID! # "{dayTs}-{provider}-{tokenSymbol}-{sourceChainId}-{destChainId}"
  date: BigInt! @index
  provider: BridgeProvider!
  tokenSymbol: String! @index
  sourceChainId: Int! @index
  destChainId: Int! @index
  sentCount: Int!
  deliveredCount: Int!
  cancelledCount: Int!
  sentVolume: BigInt!
  deliveredVolume: BigInt!
  # Nullable while USD pricing is deferred (plan §1.5). Writers set null
  # rather than a "0.00" sentinel so consumers can distinguish "no USD
  # computation yet" from "genuinely zero value".
  sentUsdValue: String
  updatedAt: BigInt!
}

type BridgeBridger {
  id: ID! # lowercase sender address (cross-chain identity)
  sender: String! @index
  totalSentCount: Int!
  # Nullable while USD pricing is deferred (plan §1.5). See sentUsdValue
  # comment on BridgeDailySnapshot.
  totalSentUsd: String
  sourceChainsUsed: String! # JSON array of EVM chainIds
  tokensUsed: String! # JSON array of token symbols
  providersUsed: String! # JSON array of BridgeProvider values
  firstSeenAt: BigInt!
  lastSeenAt: BigInt!
}

# ============================================================================
# Bridge Flows — Wormhole-specific extension
#
# These entities only exist for Wormhole-originated transfers. Adding a new
# provider means adding sibling entities (e.g. LayerZeroTransferDetail); the
# generic entities above are untouched.
# ============================================================================

type WormholeNttManager {
  id: ID! # "{chainId}-{nttManagerAddr}", lowercased
  chainId: Int! @index
  nttManager: String! @index
  transceiver: String! @index
  helper: String!
  tokenAddress: String! @index
  tokenSymbol: String! @index
  tokenDecimals: Int!
  wormholeChainId: Int!
  rateFeedId: String
  seededAtTimestamp: BigInt! # block.timestamp of the first event that seeded this row
}

type WormholeTransferDetail {
  id: ID! # == BridgeTransfer.id
  digest: String! @index # NTT manager-layer digest (TransceiverStructs.nttManagerMessageDigest). Used by TransferSent/TransferRedeemed/MessageAttestedTo. This is the BridgeTransfer primary-key suffix.
  transceiverDigest: String @index # Wormhole transceiver-layer digest (TransceiverStructs.transceiverMessageDigest), different bytestring from `digest`. Populated on the destination side when ReceivedMessage pairs with MessageAttestedTo/TransferRedeemed in the same tx.
  msgSequence: BigInt @index # Wormhole VAA sequence number, unique per (emitterChain, emitterAddress).
  sourceWormholeChainId: Int
  destWormholeChainId: Int
  refundAddress: String
  fee: BigInt # Wormhole delivery fee, native token (not USD)
  # Dest-side rate-limit queue. Source-side queue events carry only a sequence,
  # not a digest, so they cannot be correlated to a BridgeTransfer in v1.
  inboundQueuedTimestamp: BigInt
}

# Scratch table for dest-side pairing of ReceivedMessage → MessageAttestedTo
# (or TransferRedeemed) within a single destination-chain transaction.
#
# Why it's necessary: ReceivedMessage carries the transceiver-layer digest
# (TransceiverStructs.transceiverMessageDigest), which is a DIFFERENT
# bytestring from the NTT manager-layer digest emitted by TransferSent /
# MessageAttestedTo / TransferRedeemed. The BridgeTransfer entity is keyed
# by the manager digest, so ReceivedMessage cannot directly create or
# enrich the row — it would produce orphans keyed by the wrong digest.
#
# Pairing: within a single destination-chain tx, NTT emits (in logIndex order)
#   1. Transceiver: ReceivedMessage(transceiverDigest, emitterChain, emitterAddress, sequence)
#   2. NttManager:  MessageAttestedTo(managerDigest, transceiver, index)
#   3. NttManager:  TransferRedeemed(managerDigest)    -- only if threshold met
# The MessageAttestedTo/TransferRedeemed handler walks backward through
# logIndex to find the scratch row and drains it: stamping the source
# identity (sourceChainId, sourceTransceiver) and transceiverDigest onto
# the BridgeTransfer/detail keyed by the authoritative manager digest.
# Steady-state count = 0.
type WormholeDestPending {
  id: ID! # "{chainId}-{txHash}-{logIndex}", ephemeral — should be 0 rows in steady state.
  chainId: Int! # destination chain id
  txHash: String!
  transceiverDigest: String! # digest as seen in ReceivedMessage (transceiver-layer)
  sourceChainId: Int! # resolved from emitterChainId via WORMHOLE_TO_EVM_CHAIN_ID
  sourceTransceiver: String! # bytes32ToAddress(emitterAddress) — source-chain transceiver proxy
  sourceWormholeChainId: Int! # raw Wormhole chain id of source
  msgSequence: BigInt!
  destTransceiver: String! # event.srcAddress — the receiving transceiver proxy
  blockTimestamp: BigInt!
}

type WormholeTransferPending {
  id: ID! # "{chainId}-{txHash}-{logIndex}", ephemeral — should be 0 rows in steady state. logIndex is load-bearing: a single tx can emit multiple TransferSent pairs (wrapper contracts), and keying only by txHash would collide.
  chainId: Int!
  txHash: String!
  nttManager: String!
  sender: String!
  recipient: String!
  refundAddress: String!
  amount: BigInt!
  fee: BigInt!
  recipientWormholeChainId: Int!
  msgSequence: BigInt!
  sentBlock: BigInt!
  sentTimestamp: BigInt!
}

# -----------------------------------------------------------------------------
# Volume Leaderboard rollups
#
# Per-trader daily and per-(trader, pool) daily aggregates, plus per-aggregator
# daily aggregates. Source: SwapEvent. Trader key = SwapEvent.caller (tx.from).
# USD fields use 18-decimal "USD-wei" scaling for cheap BigInt summation;
# format to 4dp on read (USD = wei * 10000 / 10^18 / 10000).
# Day bucketing: timestamp = ts / 86400 * 86400 (UTC midnight).
# -----------------------------------------------------------------------------

type TraderDailySnapshot @index(fields: ["chainId", "trader", "timestamp"]) {
  id: ID! # "{chainId}-{trader}-{day}"
  chainId: Int!
  trader: String! @index
  timestamp: BigInt! @index
  swapCount: Int!
  uniquePools: Int!
  volumeUsdWei: BigInt!
  feesPaidUsdWei: BigInt!
  isSystemAddress: Boolean! @index
  # Block timestamp of the trader's most recent swap within this day — drives
  # the leaderboard's "Last active" column at sub-day precision (the day bucket
  # alone would show every active trader as "today").
  lastSeenTimestamp: BigInt!
}

type TraderPoolDailySnapshot
  @index(fields: ["chainId", "trader", "poolId", "timestamp"]) {
  id: ID! # "{chainId}-{trader}-{poolId}-{day}"
  chainId: Int!
  trader: String! @index
  poolId: String! @index
  timestamp: BigInt! @index
  swapCount: Int!
  # Direction-split USD-wei totals. "Inflow" = tokens flowing TO the trader
  # (the swap's amountXOut for that token). "Outflow" = amountXIn.
  # Sum of all four ≈ 2 × volumeUsdWei (one inflow + one outflow per swap).
  inflowToken0UsdWei: BigInt!
  outflowToken0UsdWei: BigInt!
  inflowToken1UsdWei: BigInt!
  outflowToken1UsdWei: BigInt!
  feesPaidUsdWei: BigInt!
}

type AggregatorDailySnapshot
  @index(fields: ["chainId", "aggregator", "timestamp"]) {
  id: ID! # "{chainId}-{aggregator}-{day}"
  chainId: Int!
  # Canonical name from classifyAggregator(): "squid" | "jumper" | "lifi" |
  # "openocean" | "0x" | "1inch" | "paraswap" | "cowswap" | "direct" | "system"
  # | "unknown". "direct" = txTo is the Mento Broker (user used Mento UI/SDK).
  # "system" = txTo is a known internal contract (rebalancer, NTT, etc.).
  # "unknown" = txTo not in any known list — surfaces gaps for follow-up.
  aggregator: String! @index
  # Most recently observed router address mapped to this aggregator. May vary
  # across days if multiple routers map to the same canonical name.
  lastSeenAggregatorAddress: String!
  timestamp: BigInt! @index
  swapCount: Int!
  uniqueTraders: Int!
  volumeUsdWei: BigInt!
  feesPaidUsdWei: BigInt!
}

# Existence-only marker entities used to dedupe first-touch increments of
# `uniqueTraders` and `uniquePools`. Cheaper than scanning the parent table.
type AggregatorTraderDayMarker {
  id: ID! # "{chainId}-{aggregator}-{trader}-{day}"
}

type TraderPoolDayMarker {
  id: ID! # "{chainId}-{trader}-{poolId}-{day}"
}
