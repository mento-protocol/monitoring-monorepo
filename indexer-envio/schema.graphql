type Pool {
  id: ID!
  token0: String
  token1: String
  token0Decimals: Int!
  token1Decimals: Int!
  source: String!

  # Latest reserves (updated on every ReserveUpdate / Swap)
  reserves0: BigInt!
  reserves1: BigInt!

  # Cumulative metrics (running totals since pool creation)
  swapCount: Int!
  notionalVolume0: BigInt!
  notionalVolume1: BigInt!
  rebalanceCount: Int!

  # Oracle state (FPMM pools only; VirtualPools default to N/A)
  oracleOk: Boolean!
  oraclePrice: BigInt!
  oracleTimestamp: BigInt!
  oracleTxHash: String!
  oracleExpiry: BigInt!
  oracleNumReporters: Int!
  referenceRateFeedID: String! @index

  # Deviation / rebalance state
  invertRateFeed: Boolean!
  priceDifference: BigInt!
  rebalanceThreshold: Int!
  lastRebalancedAt: BigInt!

  # Health
  healthStatus: String!

  # Trading limits (FPMM pools only; defaults to "N/A" for VirtualPools)
  limitStatus: String! # "OK" | "WARN" | "CRITICAL" | "N/A"
  limitPressure0: String! # e.g. "0.1230"
  limitPressure1: String! # e.g. "0.0050"
  # Rebalancer liveness (FPMM pools only)
  rebalancerAddress: String!
  rebalanceLivenessStatus: String! # "ACTIVE" | "N/A"
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
}

type OracleSnapshot @index(fields: ["poolId", "timestamp"]) {
  id: ID!
  poolId: String! @index
  timestamp: BigInt! @index
  oraclePrice: BigInt!
  oracleOk: Boolean!
  numReporters: Int!
  priceDifference: BigInt!
  rebalanceThreshold: Int!
  source: String!
  blockNumber: BigInt!
}

type PoolSnapshot @index(fields: ["poolId", "timestamp"]) {
  id: ID!
  poolId: String! @index
  timestamp: BigInt! @index

  # Point-in-time state (latest values at end of this hour)
  reserves0: BigInt!
  reserves1: BigInt!

  # Per-hour activity
  swapCount: Int!
  swapVolume0: BigInt!
  swapVolume1: BigInt!
  rebalanceCount: Int!
  mintCount: Int!
  burnCount: Int!

  # Running cumulative totals (snapshot of Pool cumulatives at this hour)
  cumulativeSwapCount: Int!
  cumulativeVolume0: BigInt!
  cumulativeVolume1: BigInt!

  blockNumber: BigInt!
}

type FactoryDeployment {
  id: ID!
  poolId: String!
  token0: String!
  token1: String!
  implementation: String!
  factoryAddress: String!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

type SwapEvent @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  poolId: String! @index
  sender: String!
  recipient: String!
  amount0In: BigInt!
  amount1In: BigInt!
  amount0Out: BigInt!
  amount1Out: BigInt!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
  # true when this swap was triggered internally by a Mint/Burn rebalance,
  # not by a direct user trade through the Router
  isLpSwap: Boolean!
}

# Ephemeral lookup: lets the Mint/Burn handler find the immediately preceding
# Swap that fired in the same transaction and backfill isLpSwap = true.
# id format: "{chainId}:{poolId}:{txHash}:{swapLogIndex}"
# The Mint/Burn handler queries by logIndex-1 so only the swap *directly*
# before it (the internal LP-rebalance swap) is matched — not unrelated user
# swaps that happen to share the same tx.
type SwapTxIndex {
  id: ID!
  swapEventId: String!
}

type LiquidityEvent @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  poolId: String! @index
  kind: String!
  sender: String!
  recipient: String!
  amount0: BigInt!
  amount1: BigInt!
  liquidity: BigInt!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

type ReserveUpdate @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  poolId: String! @index
  reserve0: BigInt!
  reserve1: BigInt!
  blockTimestampInPool: BigInt!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

type RebalanceEvent @index(fields: ["poolId", "blockTimestamp"]) {
  id: ID!
  poolId: String! @index
  sender: String! # Strategy contract (event.params.sender)
  caller: String! # EOA that triggered the rebalance (tx.from)
  priceDifferenceBefore: BigInt!
  priceDifferenceAfter: BigInt!
  improvement: BigInt! # priceDifferenceBefore - priceDifferenceAfter
  effectivenessRatio: String! # improvement / priceDifferenceBefore as string e.g. "0.5000"
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}

type TradingLimit @index(fields: ["poolId"]) {
  id: ID! # "{poolId}-{tokenAddress}"
  poolId: String!
  token: String!
  limit0: BigInt!
  limit1: BigInt!
  decimals: Int!
  netflow0: BigInt!
  netflow1: BigInt!
  lastUpdated0: BigInt!
  lastUpdated1: BigInt!
  limitPressure0: String! # stored as string e.g. "0.1230"
  limitPressure1: String!
  limitStatus: String! # "OK" | "WARN" | "CRITICAL"
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
}

type VirtualPoolLifecycle {
  id: ID!
  poolId: String!
  action: String!
  token0: String
  token1: String
  factoryAddress: String!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

type ProtocolFeeTransfer {
  id: ID!
  token: String! @index
  tokenSymbol: String!
  tokenDecimals: Int!
  amount: BigInt!
  from: String!
  txHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt! @index
}
