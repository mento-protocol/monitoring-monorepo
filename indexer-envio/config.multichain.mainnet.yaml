    start_block: ${ENVIO_START_BLOCK_MONAD:-60710000} # Covers ≥2026-03-10T18:00Z to catch early Wormhole NTT deliveries. SortedOracles ~60733096, FPMMFactory ~60747398
    contracts:
      - name: FPMMFactory
        address:
          - 0xa849b475FE5a4B5C9C3280152c7a1945b907613b # TransparentUpgradeableProxy:FPMMFactory
      - name: FPMM
        address: [] # Dynamically registered via FPMMFactory.FPMMDeployed.contractRegister
      - name: VirtualPool
        address: [] # Dynamically registered via VirtualPoolFactory.VirtualPoolDeployed.contractRegister
      - name: VirtualPoolFactory
        address: [] # Not yet deployed on Monad — add address when live
      - name: SortedOracles
        address:
          - "0x6f92C745346057a61b259579256159458a0a6A92" # TransparentUpgradeableProxy:SortedOracles
      - name: ERC20FeeToken
        address: [] # Dynamically registered from FPMMDeployed events
      - name: OpenLiquidityStrategy
