# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: mento-multichain-mainnet
description: Mento multichain mainnet indexer — Celo (42220) + Monad (143) + Ethereum sUSDS (1)

# Disable v3's `src/handlers/` auto-loading. Each contract below explicitly
# points at `src/EventHandlers.ts`, which side-effect imports the same
# files in `src/handlers/`. Without this `null`, v3 would auto-load
# `src/handlers/*` AND fire the same files via the entry point — double
# registration would double-apply every stateful update (volumes, fee
# snapshots, breach counters, etc.).
handlers: null
#
# ⚠️  BREAKING CHANGE — DEPLOYMENT CHECKLIST ⚠️
#
# This config introduces a NEW Envio deployment. Do NOT replace the existing
# Celo-only deployment in place. Deployment sequence:
#
# 1. Deploy as a NEW Envio hosted project (new endpoint, new DB).
#    Pool.id changes from "0x..." to "{chainId}-0x..." — no in-place migration.
#    Full reindex required.
#
# 2. Validate parity against the existing Celo endpoint:
#    pool count, swap counts for a fixed window, oracle snapshots on both chains.
#
# 3. Update dashboard consumers BEFORE cutover:
#    - Pool route params assume raw addresses → must handle "{chainId}-{address}"
#    - GraphQL queries filtering by Pool.id must use the new format
#    - Any hardcoded pool address references in the dashboard
#
# 4. Switch NEXT_PUBLIC_HASURA_URL only after (2) and (3) are done.
#
# 5. Keep the old Celo-only endpoint running for ≥1 week as rollback.
#
# 6. Per-chain RPC overrides: set ENVIO_RPC_URL_42220, ENVIO_RPC_URL_143,
#    and ENVIO_RPC_URL_1 independently. Do NOT use the generic ENVIO_RPC_URL
#    in multichain mode — it routes all chains to the same endpoint.

# ---------------------------------------------------------------------------
# Global contract definitions (shared ABI + handler across all networks)
# Network-level entries below reference these by name and specify addresses.
# ---------------------------------------------------------------------------
contracts:
  # Mento Broker — settles legacy v2 swaps (Broker → IExchangeProvider →
  # BiPoolManager). v3 swaps bypass this contract entirely (the v3 Router
  # calls FPMM/VirtualPool pools directly), so Broker.Swap is the single
  # source of truth for v2 volume on the dashboard. No address on Monad —
  # only Celo has a Broker today.
  - name: Broker
    abi_file_path: abis/Broker.json
    handler: src/EventHandlers.ts
    events:
      - event: Swap

  - name: FPMMFactory
    abi_file_path: abis/FPMMFactory.json
    handler: src/EventHandlers.ts
    events:
      - event: FPMMDeployed

  - name: FPMM
    abi_file_path: abis/FPMM.json
    handler: src/EventHandlers.ts
    events:
      - event: Swap
      - event: Mint
      - event: Burn
      - event: Transfer
      - event: UpdateReserves
      - event: Rebalanced
      - event: TradingLimitConfigured
      - event: LiquidityStrategyUpdated
      - event: LPFeeUpdated
      - event: ProtocolFeeUpdated
      - event: RebalanceIncentiveUpdated
      - event: RebalanceThresholdUpdated

  - name: VirtualPool
    abi_file_path: abis/FPMM.json
    handler: src/EventHandlers.ts
    events:
      - event: Swap
      - event: Mint
      - event: Burn
      - event: UpdateReserves
      - event: Rebalanced

  - name: VirtualPoolFactory
    abi_file_path: abis/VirtualPoolFactory.json
    handler: src/EventHandlers.ts
    events:
      - event: VirtualPoolDeployed
      - event: PoolDeprecated

  - name: SortedOracles
    abi_file_path: abis/SortedOracles.json
    handler: src/EventHandlers.ts
    events:
      - event: OracleAdded
      - event: OracleRemoved
      - event: OracleReported
      - event: MedianUpdated
      - event: ReportExpirySet
      - event: TokenReportExpirySet

  # BiPoolManager — v2 exchange registry that VirtualPools wrap.
  # ExchangeCreated/Destroyed track the registry; BucketsUpdated emits the
  # post-reset reserve curve every `referenceRateResetFrequency` (typically
  # 360s on Celo). SpreadUpdated tracks per-exchange fee changes.
  - name: BiPoolManager
    abi_file_path: abis/BiPoolManager.json
    handler: src/EventHandlers.ts
    events:
      - event: ExchangeCreated
      - event: ExchangeDestroyed
      - event: BucketsUpdated
      - event: SpreadUpdated

  - name: OpenLiquidityStrategy
    abi_file_path: abis/OpenLiquidityStrategy.json
    handler: src/EventHandlers.ts
    events:
      - event: PoolAdded
      - event: PoolRemoved
      - event: RebalanceCooldownSet
      - event: LiquidityMoved

  - name: LiquityTroveManager
    abi_file_path: abis/liquity/TroveManager.json
    handler: src/EventHandlers.ts
    events:
      - event: TroveOperation(uint256 indexed _troveId, uint8 _operation, uint256 _annualInterestRate, uint256 _debtIncreaseFromRedist, uint256 _debtIncreaseFromUpfrontFee, int256 _debtChangeFromOperation, uint256 _collIncreaseFromRedist, int256 _collChangeFromOperation)
      - event: TroveUpdated(uint256 indexed _troveId, uint256 _debt, uint256 _coll, uint256 _stake, uint256 _annualInterestRate, uint256 _snapshotOfTotalCollRedist, uint256 _snapshotOfTotalDebtRedist)
      - event: BatchedTroveUpdated(uint256 indexed _troveId, address _interestBatchManager, uint256 _batchDebtShares, uint256 _coll, uint256 _stake, uint256 _snapshotOfTotalCollRedist, uint256 _snapshotOfTotalDebtRedist)
      - event: BatchUpdated(address indexed _interestBatchManager, uint8 _operation, uint256 _debt, uint256 _coll, uint256 _annualInterestRate, uint256 _annualManagementFee, uint256 _totalDebtShares, uint256 _debtIncreaseFromUpfrontFee)
      - event: Liquidation(uint256 _debtOffsetBySP, uint256 _debtRedistributed, uint256 _boldGasCompensation, uint256 _collGasCompensation, uint256 _collSentToSP, uint256 _collRedistributed, uint256 _collSurplus, uint256 _L_ETH, uint256 _L_boldDebt, uint256 _price)
      - event: Redemption(uint256 _attemptedBoldAmount, uint256 _actualBoldAmount, uint256 _ETHSent, uint256 _ETHFee, uint256 _price, uint256 _redemptionPrice)
      - event: RedemptionFeePaidToTrove(uint256 indexed _troveId, uint256 _ETHFee)

  - name: LiquityStabilityPool
    abi_file_path: abis/liquity/StabilityPool.json
    handler: src/EventHandlers.ts
    events:
      - event: DepositOperation(address indexed _depositor, uint8 _operation, uint256 _depositLossSinceLastOperation, int256 _topUpOrWithdrawal, uint256 _yieldGainSinceLastOperation, uint256 _yieldGainClaimed, uint256 _ethGainSinceLastOperation, uint256 _ethGainClaimed)
      - event: DepositUpdated(address indexed _depositor, uint256 _newDeposit, uint256 _stashedColl, uint256 _snapshotP, uint256 _snapshotS, uint256 _snapshotB, uint256 _snapshotScale)
      - event: StabilityPoolBoldBalanceUpdated(uint256 _newBalance)
      - event: StabilityPoolCollBalanceUpdated(uint256 _newBalance)
      - event: RebalanceExecuted(uint256 amountCollIn, uint256 amountStableOut)

  - name: LiquityTroveNFT
    abi_file_path: abis/liquity/TroveNFT.json
    handler: src/EventHandlers.ts
    events:
      - event: Transfer(address indexed from, address indexed to, uint256 indexed tokenId)

  - name: LiquityBorrowerOperations
    abi_file_path: abis/liquity/BorrowerOperations.json
    handler: src/EventHandlers.ts
    events:
      - event: ShutDown(uint256 _tcr)

  - name: LiquityCollateralRegistry
    abi_file_path: abis/liquity/CollateralRegistry.json
    handler: src/EventHandlers.ts
    events:
      - event: BaseRateUpdated(uint256 _baseRate)
      - event: LastFeeOpTimeUpdated(uint256 _lastFeeOpTime)
      - event: LiquidityStrategyUpdated(address indexed _liquidityStrategy)

  - name: CDPLiquidityStrategy
    abi_file_path: abis/liquity/CDPLiquidityStrategy.json
    handler: src/EventHandlers.ts
    events:
      - event: PoolAdded
      - event: PoolRemoved(address indexed pool)
      - event: LiquidityMoved(address indexed pool, uint8 indexed direction, address tokenGivenToPool, uint256 amountGivenToPool, address tokenTakenFromPool, uint256 amountTakenFromPool)
      - event: RebalanceCooldownSet(address indexed pool, uint32 cooldown)
      - event: RedemptionShortfallSubsidized(address indexed pool, uint256 shortfall)

  - name: ReserveTroveFactory
    abi_file_path: abis/liquity/ReserveTroveFactory.json
    handler: src/EventHandlers.ts
    events:
      - event: ReserveTroveCreated(address indexed addressesRegistry, uint256 indexed troveId, uint256 debtAmount, uint256 collateralAmount)

  - name: LiquityActivePool
    abi_file_path: abis/liquity/ActivePool.json
    handler: src/EventHandlers.ts
    events:
      - event: ActivePoolBoldDebtUpdated(uint256 _recordedDebtSum)
      - event: ActivePoolCollBalanceUpdated(uint256 _collBalance)

  - name: LiquityDefaultPool
    abi_file_path: abis/liquity/DefaultPool.json
    handler: src/EventHandlers.ts
    events:
      - event: DefaultPoolBoldDebtUpdated(uint256 _boldDebt)
      - event: DefaultPoolCollBalanceUpdated(uint256 _collBalance)

  - name: ERC20FeeToken
    abi_file_path: abis/ERC20.json
    handler: src/EventHandlers.ts
    events:
      - event: Transfer

  # Mento stablecoins. The Transfer-zero handler tracks mint/burn supply for
  # addresses in STABLES. The custody handler also listens on this contract
  # for lock/mint NTT manager transfers and filters to LOCK_AND_MINT_NTT_STABLES.
  # Address list lives under each chain's `contracts:` block and is drift-
  # checked by test/stables.test.ts.
  - name: StableToken
    abi_file_path: abis/ERC20.json
    handler: src/EventHandlers.ts
    events:
      - event: Transfer

  # Sky sUSDS — Ethereum reserve-yield accounting. Handlers apply topic-level
  # filters for tracked Mento reserve wallets, so only relevant reserve
  # movements reach the processing path.
  - name: Susds
    abi_file_path: abis/Susds.json
    handler: src/EventHandlers.ts
    events:
      - event: Transfer
      - event: Deposit
      - event: Withdraw

  # Circuit Breakers (BreakerBox + MedianDelta + ValueDelta).
  # MarketHoursBreaker is registered on-chain but emits no events; we
  # represent it as a Breaker row (kind=MARKET_HOURS) seeded by BreakerAdded.
  - name: BreakerBox
    abi_file_path: abis/BreakerBox.json
    handler: src/EventHandlers.ts
    events:
      - event: BreakerAdded
      - event: BreakerRemoved
      - event: BreakerStatusUpdated
      - event: RateFeedAdded
      - event: RateFeedRemoved
      - event: RateFeedDependenciesSet
      - event: BreakerTripped
      - event: ResetSuccessful
      - event: TradingModeUpdated

  - name: MedianDeltaBreaker
    abi_file_path: abis/MedianDeltaBreaker.json
    handler: src/EventHandlers.ts
    events:
      - event: DefaultCooldownTimeUpdated
      - event: RateFeedCooldownTimeUpdated
      - event: DefaultRateChangeThresholdUpdated
      - event: RateChangeThresholdUpdated
      - event: SmoothingFactorSet
      - event: MedianRateEMAReset

  - name: ValueDeltaBreaker
    abi_file_path: abis/ValueDeltaBreaker.json
    handler: src/EventHandlers.ts
    events:
      - event: DefaultCooldownTimeUpdated
      - event: RateFeedCooldownTimeUpdated
      - event: DefaultRateChangeThresholdUpdated
      - event: RateChangeThresholdUpdated
      - event: ReferenceValueUpdated

  # Bridge Flows — Wormhole NTT
  # Manager + Transceiver proxy addresses are derived from NttDeployHelper
  # addresses via CREATE nonce derivation. See scripts/generateNttAddresses.mjs
  # and config/nttAddresses.json. Helpers emit no events so static addresses
  # are required; `pnpm generate:ntt-addresses` keeps them in sync with
  # @mento-protocol/contracts when new bridged tokens ship.
  - name: WormholeNttManager
    abi_file_path: abis/wormhole/NttManager.json
    handler: src/EventHandlers.ts
    events:
      # The two TransferSent overloads — aliased here because Envio codegen
      # needs unique handler symbol names per contract.
      - event: TransferSent(bytes32 indexed recipient, bytes32 indexed refundAddress, uint256 amount, uint256 fee, uint16 recipientChain, uint64 msgSequence)
        name: TransferSentDetailed
      - event: TransferSent(bytes32 indexed digest)
        name: TransferSentDigest
      - event: TransferRedeemed(bytes32 indexed digest)
      - event: MessageAttestedTo(bytes32 digest, address transceiver, uint8 index)
      # Outbound queue/rate-limit/cancel events fire with only a sequence, not
      # a digest, so they cannot be correlated to BridgeTransfer without a
      # sequence→digest lookup. Deferred until that telemetry is needed.
      - event: InboundTransferQueued(bytes32 digest)

  - name: WormholeTransceiver
    abi_file_path: abis/wormhole/WormholeTransceiver.json
    handler: src/EventHandlers.ts
    events:
      - event: ReceivedMessage(bytes32 digest, uint16 emitterChainId, bytes32 emitterAddress, uint64 sequence)

