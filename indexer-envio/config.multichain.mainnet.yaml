# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: mento-multichain-mainnet
description: Mento v3 multichain mainnet indexer — Celo (42220) + Monad (143)
#
# ⚠️  BREAKING CHANGE — DEPLOYMENT CHECKLIST ⚠️
#
# This config introduces a NEW Envio deployment. Do NOT replace the existing
# Celo-only deployment in place. Deployment sequence:
#
# 1. Deploy as a NEW Envio hosted project (new endpoint, new DB).
#    Pool.id changes from "0x..." to "{chainId}-0x..." — no in-place migration.
#    Full reindex required.
#
# 2. Validate parity against the existing Celo endpoint:
#    pool count, swap counts for a fixed window, oracle snapshots on both chains.
#
# 3. Update dashboard consumers BEFORE cutover:
#    - Pool route params assume raw addresses → must handle "{chainId}-{address}"
#    - GraphQL queries filtering by Pool.id must use the new format
#    - Any hardcoded pool address references in the dashboard
#
# 4. Switch NEXT_PUBLIC_HASURA_URL only after (2) and (3) are done.
#
# 5. Keep the old Celo-only endpoint running for ≥1 week as rollback.
#
# 6. Per-chain RPC overrides: set ENVIO_RPC_URL_42220 and ENVIO_RPC_URL_143
#    independently. Do NOT use the generic ENVIO_RPC_URL in multichain mode —
#    it routes all chains to the same endpoint.

# ---------------------------------------------------------------------------
# Global contract definitions (shared ABI + handler across all networks)
# Network-level entries below reference these by name and specify addresses.
# ---------------------------------------------------------------------------
contracts:
  - name: FPMMFactory
    abi_file_path: abis/FPMMFactory.json
    handler: src/EventHandlers.ts
    events:
      - event: FPMMDeployed

  - name: FPMM
    abi_file_path: abis/FPMM.json
    handler: src/EventHandlers.ts
    events:
      - event: Swap
      - event: Mint
      - event: Burn
      - event: Transfer
      - event: UpdateReserves
      - event: Rebalanced
      - event: TradingLimitConfigured
      - event: LiquidityStrategyUpdated

  - name: VirtualPool
    abi_file_path: abis/FPMM.json
    handler: src/EventHandlers.ts
    events:
      - event: Swap
      - event: Mint
      - event: Burn
      - event: UpdateReserves
      - event: Rebalanced

  - name: VirtualPoolFactory
    abi_file_path: abis/VirtualPoolFactory.json
    handler: src/EventHandlers.ts
    events:
      - event: VirtualPoolDeployed
      - event: PoolDeprecated

  - name: SortedOracles
    abi_file_path: abis/SortedOracles.json
    handler: src/EventHandlers.ts
    events:
      - event: OracleReported
      - event: MedianUpdated
      - event: ReportExpirySet
      - event: TokenReportExpirySet

  - name: OpenLiquidityStrategy
    abi_file_path: abis/OpenLiquidityStrategy.json
    handler: src/EventHandlers.ts
    events:
      - event: PoolAdded
      - event: PoolRemoved
      - event: RebalanceCooldownSet
      - event: LiquidityMoved

  - name: ERC20FeeToken
    abi_file_path: abis/ERC20.json
    handler: src/EventHandlers.ts
    events:
      - event: Transfer

networks:
  # ---------------------------------------------------------------------------
  # Celo Mainnet (chain 42220)
  # ---------------------------------------------------------------------------
  - id: 42220
    start_block: ${ENVIO_START_BLOCK_CELO:-60664500}
    contracts:
      - name: FPMMFactory
        address:
          - 0xa849b475FE5a4B5C9C3280152c7a1945b907613b # proxy
      - name: FPMM
        address: [] # Dynamically registered via FPMMFactory.FPMMDeployed.contractRegister
      - name: VirtualPool
        address: [] # Dynamically registered via VirtualPoolFactory.VirtualPoolDeployed.contractRegister
      - name: VirtualPoolFactory
        address:
          - 0x22abd4ADF6aab38aC1022352d496A07Acee5aCB3
      - name: SortedOracles
        address:
          - "0xefB84935239dAcdecF7c5bA76d8dE40b077B7b33"
      - name: OpenLiquidityStrategy
        address:
          - 0x54e2Ae8c8448912E17cE0b2453bAFB7B0D80E40f
      - name: ERC20FeeToken
        address: [] # Dynamically registered from FPMMDeployed events

  # ---------------------------------------------------------------------------
  # Monad Mainnet (chain 143)
  # ---------------------------------------------------------------------------
  - id: 143 # Monad Mainnet — HyperSync: https://143.hypersync.xyz
    start_block: ${ENVIO_START_BLOCK_MONAD:-60730000} # SortedOracles ~60733096, FPMMFactory ~60747398
    contracts:
      - name: FPMMFactory
        address:
          - 0xa849b475FE5a4B5C9C3280152c7a1945b907613b # TransparentUpgradeableProxy:FPMMFactory
      - name: FPMM
        address: [] # Dynamically registered via FPMMFactory.FPMMDeployed.contractRegister
      - name: VirtualPool
        address: [] # Dynamically registered via VirtualPoolFactory.VirtualPoolDeployed.contractRegister
      - name: VirtualPoolFactory
        address: [] # Not yet deployed on Monad — add address when live
      - name: SortedOracles
        address:
          - "0x6f92C745346057a61b259579256159458a0a6A92" # TransparentUpgradeableProxy:SortedOracles
      - name: ERC20FeeToken
        address: [] # Dynamically registered from FPMMDeployed events
      - name: OpenLiquidityStrategy
        address:
          # CREATE2 deterministic — same address as Celo.
          # Verified deployed on Monad mainnet (eth_getCode returned bytecode).
          - 0x54e2Ae8c8448912E17cE0b2453bAFB7B0D80E40f

unordered_multichain_mode: true
preload_handlers: true
field_selection:
  transaction_fields:
    - hash
    - from
