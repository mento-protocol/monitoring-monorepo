# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: mento-reserve-yield-mainnet
description: |
  Ethereum-only reserve-yield indexer for sUSDS and stETH accounting.

  This is deliberately separate from config.multichain.mainnet.yaml so a fresh
  Ethereum replay cannot block the production Celo + Monad FPMM/CDP indexer.
  The handler entry point registers sparse token events only; it excludes the
  historical sUSDS onBlock heartbeat to avoid Envio v3 synthetic-batch stalls.

  Usage:
    pnpm indexer:reserve-yield:codegen
    pnpm indexer:reserve-yield:dev
    # Switch generated types back to the production config afterwards:
    pnpm indexer:codegen

handlers: null

contracts:
  - name: Susds
    abi_file_path: abis/Susds.json
    handler: src/EventHandlersReserveYield.ts
    events:
      - event: Transfer
      - event: Deposit
      - event: Withdraw

  - name: Steth
    abi_file_path: abis/ERC20.json
    handler: src/EventHandlersReserveYield.ts
    events:
      - event: Transfer

chains:
  - id: 1 # Ethereum Mainnet
    # Earliest known tracked stETH movement: block 19111760,
    # tx 0x297cbad231aa43b915ade1b699b8b0257babe6fff0b62e564d422daace021731.
    # Re-run docs/notes/reserve-yield-indexer.md log-derivation commands before
    # changing tracked reserve wallets or promoting a hosted reserve deployment.
    start_block: ${ENVIO_START_BLOCK_ETHEREUM_RESERVE_YIELD:-19111760}
    contracts:
      - name: Susds
        address:
          - 0xa3931d71877C0E7a3148CB7Eb4463524FEc27fbD
      - name: Steth
        address:
          - 0xae7ab96520DE3A18E5e111B5EaAb095312D7fE84

field_selection:
  transaction_fields:
    - hash
