      CELONGN: '0xAfD7EFA9660A7776A3DDA30127906cADFE21b0Fb' # keccak(CELONGN)
      CELOPHP: '0x36f01750932120B53f613E9eAFB7857dB586A583' # keccak(CELOPHP)
      CELOXOF: '0x84DC05912bC603c8810FaE64D4b72d347F057E79' # keccak(CELOXOF)
      CELOZAR: '0xbCd7aA5683Ac7Fa0Cf2F5F4733aB47a8E7957b99' # keccak(CELOZAR)

metrics:
  # Checks rate feed trading modes
  - source: BreakerBox.getRateFeedTradingMode(address rateFeed)(uint8)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [celo, celoSepolia]
    variants:
      # collateral/stable
      - [EUROCEUR] # axlEUROC/EURm
      - [CELOUSD] # celo/USDm
      - [USDCUSD] # usdc/USDm, axlUSDC/USDm
      - [USDTUSD] # usdt/USDm
      # stable/stable
      - [AUDUSD]
      - [BRLUSD]
      - [CADUSD]
      - [CHFUSD]
      - [COPUSD]
      - [EURUSD]
      - [EURXOF]
      - [GBPUSD]
      - [GHSUSD]
      - [JPYUSD]
      - [KESUSD]
      - [NGNUSD]
      - [PHPUSD]
      - [XOFUSD]
      - [ZARUSD]
      # celo/stable feeds registered in both Celo mainnet and Celo Sepolia BreakerBox
      - [CELOBRL]
      - [CELOEUR]
      - [CELOXOF]
  # Checks Celo Sepolia-only gas-payment rate feed trading modes.
  # These feeds are reported by Celo mainnet SortedOracles but are not registered
  # in the Celo mainnet BreakerBox.
  - source: BreakerBox.getRateFeedTradingMode(address rateFeed)(uint8)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [celoSepolia]
    variants:
      - [CELOAUD]
      - [CELOCAD]
      - [CELOCHF]
      - [CELOCOP]
      - [CELOETH]
      - [CELOGBP]
      - [CELOGHS]
      - [CELOJPY]
      - [CELOKES]
      - [CELONGN]
      - [CELOPHP]
      - [CELOZAR]

  # Trading limits state - tracks all three netflow limits
  # Netflow represents the net amount traded in/out, used to prevent price manipulation
  # netflow0: short-term L0 limit, netflow1: medium-term L1 limit, netflowGlobal: lifetime limit
  - source: >-
      Broker.tradingLimitsState(bytes32 limitId)(
        uint32 lastUpdated0,
        uint32 lastUpdated1,
        int48 netflow0,
        int48 netflow1,
        int48 netflowGlobal
      )
    schedule: 0/10 * * * * *
    type: gauge
    chains: [celo]
    variants:
      # USDm limits
      - [CUSD_CAUD_POOL_CUSD_LIMIT]
      - [CUSD_CBRL_POOL_CUSD_LIMIT]
      - [CUSD_CCAD_POOL_CUSD_LIMIT]
      - [CUSD_CCHF_POOL_CUSD_LIMIT]
      - [CUSD_CCOP_POOL_CUSD_LIMIT]
      - [CUSD_CEUR_POOL_CUSD_LIMIT]
      - [CUSD_CGBP_POOL_CUSD_LIMIT]
      - [CUSD_CGHS_POOL_CUSD_LIMIT]
      - [CUSD_CJPY_POOL_CUSD_LIMIT]
      - [CUSD_CKES_POOL_CUSD_LIMIT]
      - [CUSD_CNGN_POOL_CUSD_LIMIT]
      - [CUSD_CPHP_POOL_CUSD_LIMIT]
      - [CUSD_EXOF_POOL_CUSD_LIMIT]
      - [CUSD_CZAR_POOL_CUSD_LIMIT]
      - [CUSD_CELO_POOL_CUSD_LIMIT]
      - [CUSD_USDC_POOL_CUSD_LIMIT]
      - [CUSD_AXLUSDC_POOL_CUSD_LIMIT]
      - [CUSD_USDT_POOL_CUSD_LIMIT]
      # Non-USDm limits
      - [CUSD_CAUD_POOL_CAUD_LIMIT]
      - [CUSD_CBRL_POOL_CBRL_LIMIT]
      - [CUSD_CCAD_POOL_CCAD_LIMIT]
      - [CUSD_CCHF_POOL_CCHF_LIMIT]
      - [CUSD_CCOP_POOL_CCOP_LIMIT]
      - [CUSD_CEUR_POOL_CEUR_LIMIT]
      - [CUSD_CGBP_POOL_CGBP_LIMIT]
      - [CUSD_CGHS_POOL_CGHS_LIMIT]
      - [CUSD_CJPY_POOL_CJPY_LIMIT]
      - [CUSD_CKES_POOL_CKES_LIMIT]
      - [CUSD_CNGN_POOL_CNGN_LIMIT]
      - [CUSD_CPHP_POOL_CPHP_LIMIT]
      - [CUSD_EXOF_POOL_EXOF_LIMIT]
      - [CUSD_CZAR_POOL_CZAR_LIMIT]
      # axlEUROC/EURm pool
      - [AXLEUROC_CEUR_POOL_CEUR_LIMIT]
      - [AXLEUROC_CEUR_POOL_AXLEUROC_LIMIT]

  # Trading limits configuration - defines the trading limit thresholds
  # The config changes rarely, so we poll hourly
  # Returns: timestep0, timestep1 (time windows), limit0, limit1, limitGlobal (thresholds), flags (enabled status)
  - source: >-
      Broker.tradingLimitsConfig(bytes32 limitId)(
        uint32 timestep0,
        uint32 timestep1,
        int48 limit0,
        int48 limit1,
        int48 limitGlobal,
        uint8 flags
      )
    schedule: 0 0 * * * *
    type: gauge
    chains: [celo]
    variants:
      # USDm limits
      - [CUSD_CAUD_POOL_CUSD_LIMIT]
      - [CUSD_CBRL_POOL_CUSD_LIMIT]
      - [CUSD_CCAD_POOL_CUSD_LIMIT]
      - [CUSD_CCHF_POOL_CUSD_LIMIT]
      - [CUSD_CCOP_POOL_CUSD_LIMIT]
      - [CUSD_CEUR_POOL_CUSD_LIMIT]
      - [CUSD_CGBP_POOL_CUSD_LIMIT]
      - [CUSD_CGHS_POOL_CUSD_LIMIT]
      - [CUSD_CJPY_POOL_CUSD_LIMIT]
      - [CUSD_CKES_POOL_CUSD_LIMIT]
      - [CUSD_CNGN_POOL_CUSD_LIMIT]
      - [CUSD_CPHP_POOL_CUSD_LIMIT]
      - [CUSD_EXOF_POOL_CUSD_LIMIT]
      - [CUSD_CZAR_POOL_CUSD_LIMIT]
      - [CUSD_CELO_POOL_CUSD_LIMIT]
      - [CUSD_USDC_POOL_CUSD_LIMIT]
      - [CUSD_AXLUSDC_POOL_CUSD_LIMIT]
      - [CUSD_USDT_POOL_CUSD_LIMIT]
      # Non-USDm limits
      - [CUSD_CAUD_POOL_CAUD_LIMIT]
      - [CUSD_CBRL_POOL_CBRL_LIMIT]
      - [CUSD_CCAD_POOL_CCAD_LIMIT]
      - [CUSD_CCHF_POOL_CCHF_LIMIT]
      - [CUSD_CCOP_POOL_CCOP_LIMIT]
      - [CUSD_CEUR_POOL_CEUR_LIMIT]
      - [CUSD_CGBP_POOL_CGBP_LIMIT]
      - [CUSD_CGHS_POOL_CGHS_LIMIT]
      - [CUSD_CJPY_POOL_CJPY_LIMIT]
      - [CUSD_CKES_POOL_CKES_LIMIT]
      - [CUSD_CNGN_POOL_CNGN_LIMIT]
      - [CUSD_CPHP_POOL_CPHP_LIMIT]
      - [CUSD_EXOF_POOL_EXOF_LIMIT]
      - [CUSD_CZAR_POOL_CZAR_LIMIT]
      # axlEUROC/EURm pool
      - [AXLEUROC_CEUR_POOL_CEUR_LIMIT]
      - [AXLEUROC_CEUR_POOL_AXLEUROC_LIMIT]

  # Fetch actual median exchange rates from oracles
  # Returns (rate, denominator) - rate is the exchange rate multiplied by denominator (usually 1e24)
  - source: SortedOracles.medianRate(address token)(uint256 rate,uint256 denominator)
    schedule: 0 * * * * *
    type: gauge
    chains: [celo]
    variants:
      # stable/stable rate feeds for USD conversion
      - [AUDUSD]
      - [BRLUSD]
      - [CADUSD]
      - [CHFUSD]
      - [COPUSD]
      - [EURUSD]
      - [GBPUSD]
      - [GHSUSD]
      - [JPYUSD]
      - [KESUSD]
      - [NGNUSD]
      - [PHPUSD]
      - [XOFUSD]
      - [ZARUSD]

  # Checks for rate feed freshness
  # Note: We only care about isExpired in Grafana, but must declare both for proper ABI decoding
  - source: SortedOracles.isOldestReportExpired(address rateFeed)(bool isExpired,address oracle)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [celo, celoSepolia]
    variants:
      # collateral/stable
      - [EUROCEUR] # axlEUROC/EURm
      - [CELOUSD] # celo/USDm
      - [USDCUSD] # usdc/USDm, axlUSDC/USDm
      - [USDTUSD] # usdt/USDm

      # stable/stable
      - [AUDUSD]
      - [BRLUSD]
      - [CADUSD]
      - [CHFUSD]
      - [COPUSD]
      - [EURUSD]
      - [EURXOF]
      - [GBPUSD]
      - [GHSUSD]
      - [JPYUSD]
      - [KESUSD]
      - [NGNUSD]
      - [PHPUSD]
      - [XOFUSD]
      - [ZARUSD]

      # celo/stable (for gas payments)
      - [CELOAUD]
      - [CELOBRL]
      - [CELOCAD]
      - [CELOCHF]
      - [CELOCOP]
      - [CELOETH]
      - [CELOEUR]
      - [CELOGBP]
      - [CELOGHS]
      - [CELOJPY]
      - [CELOKES]
      - [CELONGN]
      - [CELOPHP]
      - [CELOXOF]
      - [CELOZAR]

  # Monad rate feed freshness. Monad SortedOracles reports its own (smaller) set
  # of feeds, so this is a separate entry from the Celo one above.
  - source: SortedOracles.isOldestReportExpired(address rateFeed)(bool isExpired,address oracle)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [monad, monadTestnet]
    variants:
      - [USDCUSD]
      - [AUSDUSD]
      - [USDTUSD]
      - [GBPUSD]
      - [EURUSD]
      - [JPYUSD]
      - [CHFUSD]

  # Monad rate feed trading modes (BreakerBox), for the Monad feed set.
  - source: BreakerBox.getRateFeedTradingMode(address rateFeed)(uint8)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [monad, monadTestnet]
    variants:
      - [USDCUSD]
      - [AUSDUSD]
      - [USDTUSD]
      - [GBPUSD]
      - [EURUSD]
      - [JPYUSD]
      - [CHFUSD]

  # Checks if wallets or contracts of interest have enough CELO to pay for transactions
  - source: CELOToken.balanceOf(address owner)(uint256)
    schedule: 0 * * * * *
    type: gauge
    chains: [celo]
    variants:
      # Do signer wallets have enough CELO to pay for relay() transactions?
      # Does the reserve have enough CELO for swap operations?
      - [RelayerSignerAUDUSD]
      - [RelayerSignerBRLUSD]
      - [RelayerSignerCADUSD]
      - [RelayerSignerCELOAUD]
      - [RelayerSignerCELOCAD]
      - [RelayerSignerCELOCHF]
      - [RelayerSignerCELOETH]
      - [RelayerSignerCELOCOP]
      - [RelayerSignerCELOGBP]
      - [RelayerSignerCELOGHS]
      - [RelayerSignerCELOJPY]
      - [RelayerSignerCELOKES]
      - [RelayerSignerCELONGN]
      - [RelayerSignerCELOPHP]
      - [RelayerSignerCELOXOF]
      - [RelayerSignerCELOZAR]
      - [RelayerSignerCHFUSD]
      - [RelayerSignerCOPUSD]
      - [RelayerSignerEURUSD]
      - [RelayerSignerEURXOF]
      - [RelayerSignerGBPUSD]
      - [RelayerSignerGHSUSD]
      - [RelayerSignerJPYUSD]
      - [RelayerSignerKESUSD]
      - [RelayerSignerNGNUSD]
      - [RelayerSignerPHPUSD]
      - [RelayerSignerUSDTUSD]
      - [RelayerSignerXOFUSD]
      - [RelayerSignerZARUSD]
      - [Reserve]

  - source: CELOToken.balanceOf(address owner)(uint256)
    schedule: 0 * * * * *
    type: gauge
    chains: [celoSepolia]
    variants:
      - [RelayerSignerAUDUSD]
      - [RelayerSignerBRLUSD]
      - [RelayerSignerCADUSD]
      - [RelayerSignerCELOAUD]
      - [RelayerSignerCELOCAD]
      - [RelayerSignerCELOCHF]
      - [RelayerSignerCELOETH]
      - [RelayerSignerCELOCOP]
      - [RelayerSignerCELOGBP]
      - [RelayerSignerCELOGHS]
      - [RelayerSignerCELOJPY]
      - [RelayerSignerCELOKES]
      - [RelayerSignerCELONGN]
      - [RelayerSignerCELOPHP]
      - [RelayerSignerCELOXOF]
      - [RelayerSignerCELOZAR]
      - [RelayerSignerCHFUSD]
      - [RelayerSignerCOPUSD]
      - [RelayerSignerEUROCEUR]
      - [RelayerSignerEURUSD]
      - [RelayerSignerEURXOF]
      - [RelayerSignerGBPUSD]
      - [RelayerSignerGHSUSD]
      - [RelayerSignerJPYUSD]
      - [RelayerSignerKESUSD]
      - [RelayerSignerNGNUSD]
      - [RelayerSignerPHPUSD]
      - [RelayerSignerUSDTUSD]
      - [RelayerSignerXOFUSD]
      - [RelayerSignerZARUSD]

  # Native gas-token balance for non-ERC20 native tokens (e.g. MON on Monad).
  # Uses eth_getBalance under the hood instead of an ERC20 balanceOf call.
  - source: Native.balanceOf(address owner)(uint256)
    schedule: 0 * * * * *
    type: gauge
    chains: [monad, monadTestnet]
    variants:
      - [RelayerSignerAUSDUSD]
      - [RelayerSignerEURUSD]
      - [RelayerSignerGBPUSD]
      - [RelayerSignerUSDCUSD]
      - [RelayerSignerUSDTUSD]
      - [RelayerSignerCHFUSD]
      - [RelayerSignerJPYUSD]

  # Does the reserve have enough USDC for swap operations?
  - source: USDC.balanceOf(address owner)(uint256)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [celo]
    variants:
      - [Reserve]

  # Does the reserve have enough USDT for swap operations?
  - source: USDT.balanceOf(address owner)(uint256)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [celo]
    variants:
      - [Reserve]

  # Does the reserve have enough axlUSDC for swap operations?
  - source: axlUSDC.balanceOf(address owner)(uint256)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [celo]
    variants:
      - [Reserve]

  # Monad ReserveV2 balances (issue #707). Same gauge names as Celo
  # (USDC_balanceOf, ...) but distinct series via the `chain` label, so the
  # critical-deviation rebalance annotation can render a per-chain suffix.
  - source: USDC.balanceOf(address owner)(uint256)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [monad]
    variants:
      - [Reserve]

  - source: USDT0.balanceOf(address owner)(uint256)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [monad]
    variants:
      - [Reserve]

  - source: AUSD.balanceOf(address owner)(uint256)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [monad]
    variants:
      - [Reserve]

