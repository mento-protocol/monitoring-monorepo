      CELOBRL: '0x5C1EFDf739883E4B97D879ac149CC0B6FB6978d1' # keccak(CELOBRL)
      CELOCAD: '0x0e51743ccED754f4e718945E524Faf21bb53902C' # keccak(CELOCAD)
      CELOCHF: '0xb2c0010688BC18e10Bea9c68d83309AaB686515A' # keccak(CELOCHF)
      CELOCOP: '0xbEa1FEDf828261cC79ea68f22f7A0A60107498DB' # keccak(CELOCOP)
