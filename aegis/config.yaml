      CELOGBP: '0x57D8B6da3057Ce2a40f9501f9891BB7388048D98' # keccak(CELOGBP)
      CELOGHS: '0x663F1D38e2c176Ae5A72677E7A36c983321a0595' # keccak(CELOGHS)
