# Grafana Cloud BasicAuth secrets are fetched at runtime by `entrypoint.sh`
# inside the deployed Alloy container — see Dockerfile + entrypoint.sh here.
# The previous flow rendered secrets into agent.yaml on the Cloud Build VM
# and shipped the plaintext via `gcloud app deploy`, which retained the
# rendered file indefinitely in (a) the App Engine source staging bucket
# and (b) the container image layer. Runtime fetch keeps the secrets in
# Secret Manager only.
#
# The effective App Engine version identity needs Secret Manager access.
# Terraform currently grants the expected AppSpot principal, but
# `grafana-agent.yaml` does not pin `service_account` and therefore inherits
# the mutable app-level default. Verify it before deploy; issue #1473 tracks
# a pinned or fail-closed identity design.
steps:
  - name: gcr.io/cloud-builders/gcloud
    args: [app, deploy, --quiet, grafana-agent.yaml]
