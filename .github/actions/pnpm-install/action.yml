name: pnpm install
description: Setup pnpm + Node + install deps (frozen lockfile)

# Composite action used by .github/workflows/ci.yml to DRY the setup sequence.
# Caller is responsible for `actions/checkout` before invoking this action.
# Third-party actions pinned to commit SHAs per the policy in
# .github/workflows/claude.yml — update via Dependabot (.github/dependabot.yml).

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version-file: .node-version
        cache: pnpm
    - shell: bash
      run: pnpm install --frozen-lockfile
