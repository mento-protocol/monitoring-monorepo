name: Supply Chain

# Five gates that protect the dependency supply chain:
#
# 1. npm advisory audit — blocks merges when a high/critical advisory exists
#    against any package in the root or standalone deploy lockfiles. The
#    governance-watchdog high-audit leg is duplicated in the required Code
#    Quality job so that deploy lockfile stays covered by a required check.
#
# 2. lockfile-lint — validates pnpm-lock.yaml structural integrity for the root
#    workspace lockfile and the package-local Cloud Build lockfiles:
#    a) Every package has a sha512 integrity hash (pnpm cannot verify a
#       tarball without it).
#    b) No custom registry is configured in .npmrc or pnpm-workspace.yaml.
#       pnpm v9 no longer embeds resolved: URLs in the lockfile (unlike npm/
#       yarn), so registry validation must be done via the registry config
#       files instead. This catches the same class of "poisoned mirror" attacks
#       that lockfile-lint(1) was designed for — a rogue `registry=` line that
#       silently redirects all installs to an attacker-controlled server.
#
# 3. dependency version-skew check — validates every manifest entry for a
#    cataloged package is either "catalog:" or the exact catalog version. This
#    keeps standalone deploy roots aligned with workspace-only catalog consumers.
#
# 4. moderate advisory report — a weekly non-blocking audit that opens or
#    updates a labeled GitHub issue for sub-high advisories, so stale
#    resolution-time override floors stay visible without blocking merges.
#
# This workflow also hosts the repo's scheduled-report slot: a dedicated
# weekly context-staleness job runs scripts/check-agent-context.mjs so the
# canonical-context last_verified policy — which expires with time, not with
# a diff — is evaluated on a calendar cadence instead of only when a PR
# happens to touch context files. It is a separate job from the advisory
# report so a stale doc can never abort supply-chain tracking.
#
# 5. override prune report — a weekly non-blocking report (scripts/
#    override-prune-report.mjs) that flags `pnpm.overrides` entries whose
#    floor may already be satisfied by natural resolution, and
#    `minimumReleaseAgeExclude` entries older than a configurable age.
#    Report-only: it never edits config; pruning an entry is always a
#    follow-up, human-reviewed PR.
#
# What this does NOT cover: sigstore attestations / SLSA provenance. pnpm 10
# has no `audit signatures` equivalent, and `npm audit signatures` requires a
# package-lock.json (we use pnpm-lock.yaml). If we ever want that layer,
# socket.dev or snyk are the candidates — tracked separately.

on:
  workflow_dispatch:
  # Advisory workflow — NOT in the branch ruleset's required checks (only
  # `ci`, `Code Quality`, and the Vercel checks are), so a `paths:` filter
  # is safe here: a skipped run cannot leave a *required* check pending.
  #
  # Both gates only have new information to add when the dependency graph
  # changes: `pnpm audit` scans the whole lockfile (a PR that doesn't touch
  # deps can only surface a CVE that was already disclosed — which the daily
  # cron below already catches within 24h), and lockfile-lint validates the
  # lockfile structure. So trigger per-PR only when a dependency manifest
  # changes; the daily cron remains the backstop for time-based disclosures.
  #
  # `**/.npmrc` (not just root) is load-bearing for security: lockfile-lint
  # recursively scans EVERY `.npmrc` for a poisoned `registry=` line, so a PR
  # adding a package-local `.npmrc` (e.g. ui-dashboard/.npmrc) must trigger
  # the gate. `patches/**` is load-bearing too: pnpm stores patched dependency
  # hashes in pnpm-lock.yaml, so patch-only edits must be treated as dependency
  # graph changes and routed through the same supply-chain surface. Residual
  # gap: GitHub's `paths:` filter only evaluates the first 300 changed files,
  # so a >300-file PR whose only dep change falls outside that window will skip
  # the per-PR run — caught by the daily cron within 24h (the same accepted
  # disclosure-timing window as a non-dep PR).
  pull_request:
    branches: [main]
    paths:
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/pnpm-workspace.yaml"
      - "**/.npmrc"
      - patches/**
      # The gate itself — changes to the workflow or the lockfile-lint
      # scripts must self-trigger a run (same pattern as the other gates).
      - .github/workflows/supply-chain.yml
      - scripts/pnpm-audit-high-gate.mjs
      - scripts/pnpm-audit-high-gate.test.mjs
      - scripts/lockfile-lint.mjs
      - scripts/lockfile-lint.test.mjs
      - scripts/version-skew-check.mjs
      - scripts/version-skew-check.test.mjs
  schedule:
    # Daily run so a newly-disclosed CVE against a pinned dep is caught
    # within 24h. Failures are reported to Slack via
    # notify-slack-on-main-failure.yml.
    - cron: 17 6 * * *
    # Weekly trigger for the non-blocking moderate-advisory report job below.
    # The blocking audit/lockfile/version-skew jobs also run on this cron; the
    # duplicate Monday run is harmless.
    - cron: 17 7 * * 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  audit:
    name: npm advisory audit
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          # `cache: pnpm` would require a warmed pnpm store, but this workflow
          # never runs `pnpm install` — just `pnpm audit`. The post-step fails
          # cache-path validation (##[error]Path Validation Error) and flips
          # the job red. Audit is sub-second against the hosted advisory DB
          # so the cache would save nothing useful anyway.
      # Fail closed: no `--ignore-registry-errors`. That flag exits 0 on any
      # registry error — transient 5xx *and* persistent auth/network failures
      # — so an npm outage or misconfig would silently let advisories through.
      # The gate parses pnpm's JSON output so advisory findings can be reported
      # clearly while registry failures still stop the job. A rare transient
      # blip → re-run the job manually.
      - name: pnpm audit high gate self-tests
        run: node scripts/pnpm-audit-high-gate.test.mjs
      - name: pnpm audit (high+ only)
        run: node scripts/pnpm-audit-high-gate.mjs --dir . --label root
      - name: pnpm audit handler deploy lockfile (high+ only)
        run: node scripts/pnpm-audit-high-gate.mjs --dir alerts/infra/onchain-event-handler --label alerts/infra/onchain-event-handler
      - name: pnpm audit on-call announcer deploy lockfile (high+ only)
        run: node scripts/pnpm-audit-high-gate.mjs --dir alerts/infra/oncall-announcer --label alerts/infra/oncall-announcer
      - name: pnpm audit governance-watchdog deploy lockfile (high+ only)
        run: node scripts/pnpm-audit-high-gate.mjs --dir governance-watchdog --label governance-watchdog

  lockfile-lint:
    name: lockfile integrity + registry check
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          # No pnpm install — the lint script is pure Node.js (zero deps).
          # This makes the job sub-30s: checkout (~5s) + node setup (~5s) +
          # script (~1s). pnpm/action-setup is not needed either.
      - name: lockfile-lint self-tests
        # Runs the fixture suite that exercises the parser logic against
        # synthetic lockfiles. Zero external deps — same Node.js binary.
        run: node scripts/lockfile-lint.test.mjs
      - name: lockfile integrity + registry check
        # scripts/lockfile-lint.mjs validates:
        #   1. Every package in pnpm-lock.yaml packages: has a sha512 integrity
        #      hash (prevents tampered-tarball installs).
        #   2. No custom registry= in any .npmrc or registries: in
        #      pnpm-workspace.yaml (prevents registry-redirect attacks).
        run: node scripts/lockfile-lint.mjs
      - name: handler lockfile integrity + registry check
        # Same gate for the package-local lockfile Cloud Build uses as the
        # on-chain handler deploy source of truth.
        run: LOCKFILE_LINT_ROOT=alerts/infra/onchain-event-handler node scripts/lockfile-lint.mjs
      - name: on-call announcer lockfile integrity + registry check
        # Same gate for the package-local lockfile Cloud Build uses as the
        # on-call announcer deploy source of truth.
        run: LOCKFILE_LINT_ROOT=alerts/infra/oncall-announcer node scripts/lockfile-lint.mjs
      - name: governance-watchdog lockfile integrity + registry check
        # Same gate for the package-local lockfile Cloud Build uses as the
        # governance-watchdog deploy source of truth.
        run: LOCKFILE_LINT_ROOT=governance-watchdog node scripts/lockfile-lint.mjs
      - name: version-skew self-tests
        run: node scripts/version-skew-check.test.mjs
      - name: dependency version-skew check
        # Every declared version of a cataloged package (currently viem)
        # must be "catalog:" or exactly the catalog version.
        run: node scripts/version-skew-check.mjs

  context-staleness-report:
    name: context staleness report (scheduled)
    # Same weekly cron + default-branch manual dispatch gate as the moderate
    # advisory report, but its own job on purpose: last_verified expires with
    # time, not with a diff — a canonical doc can pass its 90-day window
    # without any PR touching context files, so the path-filtered ci.yml
    # scripts job alone can never catch calendar expiry. Isolating the check
    # means a stale doc fails only this job (surfacing via
    # notify-slack-on-main-failure.yml like the other scheduled gates) and
    # never aborts the advisory-report steps next door.
    if: >-
      github.event.schedule == '17 7 * * 1' ||
      (github.event_name == 'workflow_dispatch' &&
        github.ref_name == github.event.repository.default_branch)
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          # No pnpm install — scripts/check-agent-context.mjs is pure Node.js
          # (node builtins + a sibling helper module), same sub-30s pattern
          # as the lockfile-lint job.
      - name: Agent context staleness check
        run: node scripts/check-agent-context.mjs

  moderate-advisory-report:
    name: moderate advisory report (non-blocking)
    # Weekly cron + default-branch manual dispatch only — never on pull_request,
    # so this job can never block a merge. The manual branch guard matters
    # because this job mutates the canonical security-advisories issue.
    if: >-
      github.event.schedule == '17 7 * * 1' ||
      (github.event_name == 'workflow_dispatch' &&
        github.ref_name == github.event.repository.default_branch)
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          # No pnpm install — same as the blocking audit job. Audit queries the
          # hosted advisory DB directly from the committed lockfile.
      - name: pnpm audit (moderate+, report only)
        # Exit 1 means advisories found, which is the expected report case.
        # The script step below fails if pnpm returns a registry error payload.
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/audit-reports
          pnpm audit --audit-level=moderate --json > /tmp/audit-reports/root.json || true
          pnpm --dir alerts/infra/onchain-event-handler audit --audit-level=moderate --json > /tmp/audit-reports/alerts-onchain-event-handler.json || true
          pnpm --dir alerts/infra/oncall-announcer audit --audit-level=moderate --json > /tmp/audit-reports/alerts-oncall-announcer.json || true
          pnpm --dir governance-watchdog audit --audit-level=moderate --json > /tmp/audit-reports/governance-watchdog.json || true
      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "security-advisories" --color "d73a4a" --description "Open npm advisories below the blocking high gate" --force
          gh label create "dependencies" --color "0366d6" --description "Dependency updates and supply-chain advisory tracking" --force
      - name: Open, update, or close the advisory issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const reportSpecs = [
              ["root", "/tmp/audit-reports/root.json"],
              [
                "alerts/infra/onchain-event-handler",
                "/tmp/audit-reports/alerts-onchain-event-handler.json",
              ],
              [
                "alerts/infra/oncall-announcer",
                "/tmp/audit-reports/alerts-oncall-announcer.json",
              ],
              ["governance-watchdog", "/tmp/audit-reports/governance-watchdog.json"],
            ];
            const advisoriesByKey = new Map();

            for (const [lockfile, path] of reportSpecs) {
              const raw = fs.readFileSync(path, "utf8");
              let report;
              try {
                report = JSON.parse(raw);
              } catch (error) {
                core.setFailed(
                  `pnpm audit for ${lockfile} did not produce JSON: ${raw.slice(0, 500)}`,
                );
                return;
              }
              if (report.error) {
                core.setFailed(
                  `pnpm audit failed for ${lockfile}: ` +
                    `${report.error.message ?? JSON.stringify(report.error)}`,
                );
                return;
              }

              for (const advisory of Object.values(report.advisories ?? {})) {
                const id = advisory.github_advisory_id ?? advisory.url ?? advisory.id;
                const findingPath = advisory.findings?.[0]?.paths?.[0] ?? "unknown";
                const key = `${id}:${advisory.module_name}:${findingPath}`;
                const existing = advisoriesByKey.get(key);
                if (existing) {
                  existing.lockfiles.push(lockfile);
                  continue;
                }
                advisoriesByKey.set(key, {
                  ...advisory,
                  id,
                  path: findingPath,
                  lockfiles: [lockfile],
                });
              }
            }

            const advisories = Array.from(advisoriesByKey.values());
            const marker = "<!-- supply-chain-moderate-audit -->";
            const labels = ["security-advisories", "dependencies"];
            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;
            const checkedAt = new Date().toISOString();

            const lines = advisories.map((advisory) => {
              const lockfiles = advisory.lockfiles.map((lockfile) => `\`${lockfile}\``).join(", ");
              return (
                `- **${advisory.module_name}** (${advisory.severity}) ${advisory.id}: ` +
                `${advisory.title}\n` +
                `  - vulnerable \`${advisory.vulnerable_versions}\`, ` +
                `patched \`${advisory.patched_versions}\`\n` +
                `  - lockfiles: ${lockfiles}\n` +
                `  - path: \`${advisory.path}\``
              );
            });

            const body =
              `**Last checked:** ${checkedAt}\n` +
              `[Workflow run](${runUrl})\n\n` +
              `\`pnpm audit --audit-level=moderate\` on the root and standalone ` +
              `deploy lockfiles reports:\n\n` +
              `${lines.join("\n")}\n\n` +
              `**Rule:** override floors in \`package.json\` \`pnpm.overrides\` ` +
              `only act at lockfile (re)resolution. If an advisory's patch line ` +
              `supersedes a floor, bump the override and run \`pnpm install\` to ` +
              `re-resolve. Prefer range-scoped exact pins ` +
              `(\`pkg@<x.y.z: x.y.z\`) for anything with major-incompat risk.\n\n` +
              marker;

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                labels: "security-advisories",
                per_page: 100,
              },
            );
            const existing = issues.find(
              (issue) => issue.body && issue.body.includes(marker),
            );

            if (advisories.length === 0) {
              if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: `Audit is clean as of ${checkedAt} — closing. ([run](${runUrl}))`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: "closed",
                });
              }
              return;
            }

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "Supply chain: moderate npm advisories",
                body,
                labels,
              });
            }

  override-prune-report:
    name: override prune report (non-blocking)
    # Weekly cron + default-branch manual dispatch only — never on pull_request,
    # so this job can never block a merge. The manual branch guard matters
    # because this job mutates the canonical override-prune-report issue.
    if: >-
      github.event.schedule == '17 7 * * 1' ||
      (github.event_name == 'workflow_dispatch' &&
        github.ref_name == github.event.repository.default_branch)
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history required: the minimumReleaseAgeExclude age check
          # runs `git blame` on pnpm-workspace.yaml. A default depth-1
          # shallow clone attributes every line to the boundary (HEAD)
          # commit, so every entry would read as "just changed" and the
          # `stale` verdict could never fire.
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          # No pnpm install — scripts/override-prune-report.mjs is pure
          # Node.js (zero deps) and reads only the committed lockfiles.
      - name: override-prune-report self-tests
        run: node scripts/override-prune-report.test.mjs
      - name: Generate override prune report
        run: node scripts/override-prune-report.mjs > /tmp/override-prune-report.md
      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "dependencies" --color "0366d6" --description "Dependency updates and supply-chain advisory tracking" --force
      - name: Open or update the override prune report issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- supply-chain-override-prune-report -->";
            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;
            const checkedAt = new Date().toISOString();
            const report = fs.readFileSync("/tmp/override-prune-report.md", "utf8");

            const body =
              `**Last checked:** ${checkedAt}\n` +
              `[Workflow run](${runUrl})\n\n` +
              `${report}\n` +
              marker;

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                labels: "dependencies",
                per_page: 100,
              },
            );
            const existing = issues.find(
              (issue) => issue.body && issue.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "Supply chain: override prune report",
                body,
                labels: ["dependencies"],
              });
            }
