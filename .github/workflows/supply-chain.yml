name: Supply Chain

# Block merges when a high/critical npm advisory exists against a package in
# the lockfile. Catches the common case — a known-vulnerable transitive dep
# that a PR pulls in via a version bump — before it ships to prod.
#
# What this does NOT cover: sigstore attestations / SLSA provenance. pnpm 10
# has no `audit signatures` equivalent, and `npm audit signatures` requires a
# package-lock.json (we use pnpm-lock.yaml). If we ever want that layer,
# socket.dev or snyk are the candidates — tracked separately.

on:
  workflow_dispatch:
  # Run on every PR (no `paths:` filter) so this can serve as a required
  # branch-protection check. With a paths filter, PRs that don't touch deps
  # never trigger the workflow at all, and the required check stays pending
  # forever — blocking unrelated merges. `pnpm audit` is sub-second, so the
  # wasted CI on non-dep PRs is just checkout + node setup (~20s).
  pull_request:
    branches: [main]
  schedule:
    # Daily run so a newly-disclosed CVE against a pinned dep pages us even
    # without a PR in flight.
    - cron: 17 6 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  audit:
    name: npm advisory audit
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          # `cache: pnpm` would require a warmed pnpm store, but this workflow
          # never runs `pnpm install` — just `pnpm audit`. The post-step fails
          # cache-path validation (##[error]Path Validation Error) and flips
          # the job red. Audit is sub-second against the hosted advisory DB
          # so the cache would save nothing useful anyway.
      # Fail closed: no `--ignore-registry-errors`. That flag exits 0 on any
      # registry error — transient 5xx *and* persistent auth/network failures
      # — so an npm outage or misconfig would silently let advisories through.
      # Both registry errors and advisory findings share exit code 1 in pnpm,
      # so a bash retry loop can't distinguish them without delaying real
      # blocks. A rare transient blip → re-run the job manually.
      - name: pnpm audit (high+ only)
        run: pnpm audit --audit-level=high
