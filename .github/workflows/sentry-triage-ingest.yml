name: Sentry Triage Ingest

# Stage A of the Sentry triage pipeline (ADR 0036,
# docs/adr/0036-sentry-triage-pipeline.md): a deterministic, no-LLM ingest that
# turns every new/regressed Sentry issue across the `mento-labs` org (6
# projects, 4 repos) into exactly one labeled GitHub queue issue in this repo,
# idempotent by Sentry short ID. Read-only against Sentry — GET only, never
# resolves/archives/assigns.
#
# Inert until Terraform provisions `secrets.SENTRY_TRIAGE_TOKEN` (a read-only
# Sentry token) and the kill switch `vars.SENTRY_TRIAGE_ENABLED` is flipped to
# the literal string `true` (tracked in #1276; runbook in
# docs/notes/sentry-triage-pipeline.md). Both guards fail safe: this workflow
# merges and runs on schedule immediately, but every run no-ops until an
# operator turns it on — first the kill-switch step below (repo variable),
# then a second no-op inside scripts/sentry-triage-ingest.mjs itself if the
# token secret is still missing (defense in depth; see the script's
# `resolveTokenGuard`).
#
# Advisory only: `schedule` / `workflow_dispatch` triggers can never satisfy a
# required PR status check (see supply-chain.yml's note that only `ci`,
# `Code Quality`, and the Vercel checks are in the branch ruleset), so this
# workflow is intentionally not registered as a required check anywhere.
#
# Failures (including inside the ingest script itself) surface through
# notify-slack-on-main-failure.yml like every other schedule-only workflow —
# this workflow's name is registered in that file's `workflow_run.workflows`
# list. Per the queue contract, an absent run-record comment on the tracker
# issue (#1282) is a second, independent staleness signal on top of that.

on:
  schedule:
    # Once per weekday, 45 min before the agent workflow (0 8 * * 1-5) so the
    # queue is fresh for the single daily triage run — org-wide volume (~4-5
    # new Sentry issues/day) doesn't need push-based latency, and one weekday
    # digest keeps Slack quiet. Off-the-hour to dodge cron contention on
    # GitHub's scheduler.
    - cron: 15 7 * * 1-5
  workflow_dispatch:
    # checkov:skip=CKV_GHA_7: lookback_days only widens the Sentry firstSeen
    # search window for backfill after an outage or at first activation. It is
    # validated to ^[0-9]+$ below before use (the script additionally enforces
    # the 1-90 range and fails loud) and cannot affect any build/deploy
    # output. Same skip pattern as sentry-triage-agent.yml's issue_number.
    inputs:
      lookback_days:
        description: firstSeen lookback window in days (integer 1-90). Leave blank for the default 8. Widen to backfill after an outage.
        required: false
        type: string

permissions:
  issues: write
  contents: read

concurrency:
  group: sentry-triage-ingest
  cancel-in-progress: false

jobs:
  ingest:
    name: Ingest Sentry issues into the triage queue
    # Main-only guard: schedule always runs on the default branch, but
    # workflow_dispatch can be pointed at any ref — without this, a manual
    # run from an experimental branch would execute unreviewed script code
    # with SENTRY_TRIAGE_TOKEN and `issues: write`. Same pattern as
    # terraform-deploy-queue-watch.yml.
    if: github.ref == 'refs/heads/main'
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 15
    steps:
      - name: Check kill switch
        id: killswitch
        env:
          ENABLED: ${{ vars.SENTRY_TRIAGE_ENABLED }}
        run: |
          set -euo pipefail
          if [ "$ENABLED" != "true" ]; then
            echo "::notice::SENTRY_TRIAGE_ENABLED repo variable is not the literal string 'true' — skipping Sentry triage ingest. No Sentry or GitHub API calls were made."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.killswitch.outputs.enabled == 'true'

      - uses: ./.github/actions/pnpm-install
        if: steps.killswitch.outputs.enabled == 'true'

      - name: Run ingest
        if: steps.killswitch.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          # Empty/unset when the Terraform secret (#1276) hasn't been created
          # yet — scripts/sentry-triage-ingest.mjs's resolveTokenGuard() logs
          # a ::notice:: and exits 0 in that case, no network calls made.
          SENTRY_TRIAGE_TOKEN: ${{ secrets.SENTRY_TRIAGE_TOKEN }}
          # Optional workflow_dispatch backfill override. Never interpolated
          # into the shell command — validated to a bare integer here, with
          # the 1-90 range enforced (fail-loud) inside the script.
          DISPATCH_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days }}
        run: |
          set -euo pipefail
          if [ -n "${DISPATCH_LOOKBACK_DAYS:-}" ]; then
            if [[ "${DISPATCH_LOOKBACK_DAYS}" =~ ^[0-9]+$ ]]; then
              export SENTRY_TRIAGE_LOOKBACK_DAYS="${DISPATCH_LOOKBACK_DAYS}"
            else
              echo "::error::workflow_dispatch input lookback_days must be a plain integer"
              exit 1
            fi
          fi
          pnpm sentry:ingest
