name: Indexer Envio

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - indexer-envio/**
      - shared-config/**
      - pnpm-lock.yaml
      - package.json
      - pnpm-workspace.yaml
      - .node-version
      - .github/workflows/indexer-envio.yml
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  quality:
    name: Quality Checks (indexer-envio)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Detect indexer-related changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            indexer:
              - indexer-envio/**
              - shared-config/**
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/indexer-envio.yml
      - name: No indexer changes
        if: steps.changes.outputs.indexer != 'true'
        run: echo "No indexer-related changes; skipping indexer quality checks."
      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.indexer == 'true'
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.indexer == 'true'
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        if: steps.changes.outputs.indexer == 'true'
        run: pnpm install --frozen-lockfile
      - name: Validate all Envio configs (codegen)
        if: steps.changes.outputs.indexer == 'true'
        # Run codegen against every config file to catch schema/config drift early.
        # config.multichain.mainnet.yaml is run last — its output is used by
        # typecheck + tests below.
        # ENVIO_STRICT_START_BLOCK=true ensures the startup guard throws (not warns)
        # if start-block env vars are misconfigured, catching the issue before deploy.
        env:
          ENVIO_STRICT_START_BLOCK: "true"
        run: |
          pnpm --filter @mento-protocol/indexer-envio codegen --config config.multichain.testnet.yaml
          pnpm --filter @mento-protocol/indexer-envio codegen --config config.multichain.mainnet.yaml
      - name: Link generated package
        if: steps.changes.outputs.indexer == 'true'
        # pnpm install runs before generated/ exists, so the workspace symlink for
        # the optional `link:generated` dep is missing. Re-running install after
        # codegen creates the symlink so typecheck and tests can resolve it.
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        if: steps.changes.outputs.indexer == 'true'
        run: pnpm --filter @mento-protocol/indexer-envio typecheck
      - name: Test
        if: steps.changes.outputs.indexer == 'true'
        run: pnpm --filter @mento-protocol/indexer-envio test
