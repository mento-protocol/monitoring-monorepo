name: Trunk

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# See ci.yml for the concurrency rationale: PR runs cancel on new pushes
# to the same PR ref; push/dispatch events use a SHA-unique group so they
# never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

permissions: read-all

jobs:
  trunk:
    name: Code Quality
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check GitHub Actions pins
        run: node scripts/check-github-action-pins.mjs
      - uses: ./.trunk/setup-ci
      - name: pnpm audit high gate self-tests
        run: node scripts/pnpm-audit-high-gate.test.mjs
      - name: pnpm audit governance-watchdog deploy lockfile (high+ only)
        run: node scripts/pnpm-audit-high-gate.mjs --dir governance-watchdog --label governance-watchdog
      - name: Cache Trunk artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/trunk
          # Trunk stores downloaded tool binaries here, so the key must keep
          # architectures separate. Cross-arch restores caused `execve failed:
          # Text file busy` on PR #821.
          key: trunk-${{ runner.arch }}-${{ runner.os }}-${{ hashFiles('.trunk/trunk.yaml') }}
      - name: Run Trunk
        run: ./tools/trunk check --ci --all
      - uses: Kesin11/actions-timeline@7bf79990b7c09f5dfb570ac30b814ca597bd538e # v3.1.1
        if: always()
