name: Trunk

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# See ci.yml for the concurrency rationale: PR runs cancel on new pushes
# to the same PR ref; push/dispatch events use a SHA-unique group so they
# never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

permissions: read-all

jobs:
  trunk:
    name: Code Quality
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: ./.trunk/setup-ci
      - uses: trunk-io/trunk-action@04ba50e7658c81db7356da96657e6e77f220bfa3 # v1.3.1
        with:
          arguments: --all
          # The action's internal ~/.cache/trunk key is
          # `trunk-<cache-key>-<runner.os>-<hash of .trunk/trunk.yaml>` — no
          # architecture component. Without an arch discriminator, a
          # runner-architecture change restores the other arch's tool cache
          # (same key, immutable entry), trunk re-downloads the right tools
          # over the restored binaries every run, and the download-then-exec
          # overlap surfaces as `execve failed: Text file busy` (seen on the
          # ARM compat PR #821). Keying on runner.arch gives each
          # architecture its own cache lineage.
          cache-key: ${{ runner.arch }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()
