name: CI

# Aggregate workflow fanning out to package-scoped quality jobs gated on
# path changes. The `ci` sentinel aggregates the results so branch
# protection needs only one required check (`CI / ci`) instead of one per
# package. A PR that only touches ui-dashboard/ runs only the `ui` job;
# irrelevant jobs skip cleanly (GitHub hides them from the checks list).
#
# Third-party actions are pinned to commit SHAs per the policy in
# .github/workflows/claude.yml — update via Dependabot
# (.github/dependabot.yml).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  changes:
    name: Detect changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 2
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      indexer: ${{ steps.filter.outputs.indexer }}
      bridge: ${{ steps.filter.outputs.bridge }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            ui:
              - ui-dashboard/**
              - shared-config/**
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            # shared-config/** is included in the indexer filter because
            # indexer-envio/test/fx-calendar.test.ts and
            # indexer-envio/test/deployment-namespaces.test.ts deep-equal
            # the vendored copies in indexer-envio/config/*.json against the
            # shared-config originals (the indexer builds outside the pnpm
            # workspace — see indexer-envio/src/healthScore.ts). The indexer
            # does NOT import shared-config at runtime.
            indexer:
              - indexer-envio/**
              - shared-config/**
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            bridge:
              - metrics-bridge/**
              - cloudbuild.yaml
              - .gcloudignore
              - .node-version
              - pnpm-workspace.yaml
              - pnpm-lock.yaml
              - package.json
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**

  ui:
    name: Quality Checks (ui-dashboard)
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: Typecheck
        run: pnpm --filter @mento-protocol/ui-dashboard typecheck
      # ESLint runs in the `Code Quality` (Trunk) workflow — not duplicated here.
      - name: Test with coverage
        run: pnpm --filter @mento-protocol/ui-dashboard test:coverage
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          fail_ci_if_error: false
          flags: ui-dashboard
          directory: ui-dashboard/coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  indexer:
    name: Quality Checks (indexer-envio)
    needs: changes
    if: needs.changes.outputs.indexer == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: Validate all Envio configs (codegen)
        # Run codegen against every config file to catch schema/config drift early.
        # config.multichain.mainnet.yaml is run last — its output is used by
        # typecheck + tests below. ENVIO_STRICT_START_BLOCK=true ensures the
        # startup guard throws (not warns) if start-block env vars are
        # misconfigured, catching the issue before deploy.
        env:
          ENVIO_STRICT_START_BLOCK: "true"
        run: |
          pnpm --filter @mento-protocol/indexer-envio codegen --config config.multichain.testnet.yaml
          pnpm --filter @mento-protocol/indexer-envio codegen --config config.multichain.mainnet.yaml
      - name: Link generated package
        # pnpm install ran before generated/ existed, so the workspace symlink
        # for the optional `link:generated` dep is missing. Re-running install
        # after codegen creates the symlink so typecheck and tests resolve it.
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter @mento-protocol/indexer-envio typecheck
      - name: Test
        run: pnpm --filter @mento-protocol/indexer-envio test

  bridge:
    name: Quality Checks (metrics-bridge)
    needs: changes
    if: needs.changes.outputs.bridge == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: Typecheck
        run: pnpm --filter @mento-protocol/metrics-bridge typecheck
      # ESLint runs in the `Code Quality` (Trunk) workflow — not duplicated here.
      - name: Test
        run: pnpm --filter @mento-protocol/metrics-bridge test

  ci:
    name: ci
    needs: [changes, ui, indexer, bridge]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: ui,indexer,bridge
