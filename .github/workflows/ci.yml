name: CI

# Aggregate workflow fanning out to package-scoped quality jobs gated on
# path changes. The `ci` sentinel aggregates the results so branch
# protection needs only one required check (`CI / ci`) instead of one per
# package. A PR that only touches ui-dashboard/ runs only the `ui` job;
# irrelevant jobs skip cleanly (GitHub hides them from the checks list).
#
# Third-party actions are pinned to commit SHAs per the policy in
# .github/workflows/claude.yml — update via Dependabot
# (.github/dependabot.yml).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Concurrency: on PRs, group by ref so new pushes to a PR cancel in-flight
# runs. On push to main (or any non-PR event), group by SHA so each commit
# gets its own run and main-branch runs never cancel each other. Prevents
# a fast-follow merge from cancelling a still-running main CI — important
# because main CI acts as the quality gate for the trust-main deploys.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

permissions: read-all

jobs:
  changes:
    name: Detect changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 2
    permissions:
      contents: read
      actions: read
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      ui: ${{ steps.filter.outputs.ui }}
      indexer: ${{ steps.filter.outputs.indexer }}
      bridge: ${{ steps.filter.outputs.bridge }}
      aegis: ${{ steps.filter.outputs.aegis }}
      codeHealth: ${{ steps.filter.outputs.codeHealth }}
      rootScripts: ${{ steps.filter.outputs.rootScripts }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            # scripts/eslint-baseline-diff.mjs is the per-package lint
            # wrapper. Any change to it needs to re-run every package's lint
            # so a broken wrapper can't merge silently — see PR-423 codex
            # finding (Run package lint when the lint gate changes).
            shared:
              - shared-config/**
              - scripts/eslint-baseline-diff.mjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            ui:
              - ui-dashboard/**
              - shared-config/**
              - scripts/eslint-baseline-diff.mjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            # shared-config/** is included in the indexer filter because
            # indexer-envio/test/fx-calendar.test.ts and
            # indexer-envio/test/deployment-namespaces.test.ts deep-equal
            # the vendored copies in indexer-envio/config/*.json against the
            # shared-config originals (the indexer builds outside the pnpm
            # workspace — see indexer-envio/src/healthScore.ts). The indexer
            # does NOT import shared-config at runtime.
            indexer:
              - indexer-envio/**
              - shared-config/**
              - scripts/eslint-baseline-diff.mjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            bridge:
              - metrics-bridge/**
              - shared-config/**
              - scripts/eslint-baseline-diff.mjs
              - cloudbuild.yaml
              - .gcloudignore
              - .node-version
              - pnpm-workspace.yaml
              - pnpm-lock.yaml
              - package.json
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            aegis:
              - aegis/**
              - scripts/eslint-baseline-diff.mjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .gitmodules
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            # Code-health policy files. A PR that touches ONLY the dep-cruiser
            # rules or a package's knip config would otherwise leave all four
            # package filters false → the cross-package `deps` job would skip
            # → blocking architecture rule changes ship unvalidated. This
            # filter fires the `deps` job whenever the policy itself moves.
            codeHealth:
              - .dependency-cruiser.cjs
              - "*/knip.json"
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            # Root scripts ESLint job. Per-package lint runs inside each
            # workspace and never reaches repo-root scripts/*. This filter
            # fires the standalone scripts-lint job so `no-undef`, unused
            # imports, and syntax issues in build/quality scripts can't
            # merge unnoticed — see PR-423 codex finding (Keep root scripts
            # under ESLint).
            rootScripts:
              - scripts/**/*.mjs
              - scripts/**/*.cjs
              - scripts/**/*.js
              - scripts/**/*.sh
              - eslint.config.mjs
              - .dependency-cruiser.cjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  shared:
    name: Quality Checks (shared-config)
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: Resolve main baseline (PR baseline-growth check)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # Fail closed if origin/main can't be reached — a silently-empty
          # main baseline would skip the merge-base growth check and let a
          # hand-grown HEAD baseline pass. Explicit refspec ensures
          # refs/remotes/origin/main is updated regardless of the remote's
          # configured fetch refmap.
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          # Only tolerate a genuinely missing baseline file on main
          # (package didn't exist there yet) — not a missing ref or
          # ls-tree failure.
          if git ls-tree --name-only origin/main -- shared-config/eslint-baseline.json | grep -q .; then
            git show origin/main:shared-config/eslint-baseline.json > /tmp/main-baseline-shared-config.json
          else
            : > /tmp/main-baseline-shared-config.json
          fi
          echo "ESLINT_BASELINE_MAIN=/tmp/main-baseline-shared-config.json" >> "$GITHUB_ENV"
      - name: Typecheck
        run: pnpm --filter @mento-protocol/monitoring-config typecheck
      - name: Lint
        run: pnpm --filter @mento-protocol/monitoring-config lint
      - name: Knip (dead-code / dep hygiene, blocking)
        run: pnpm --filter @mento-protocol/monitoring-config knip
      - name: Test with coverage
        run: pnpm --filter @mento-protocol/monitoring-config test:coverage
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          fail_ci_if_error: false
          flags: monitoring-config
          directory: shared-config/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  ui:
    name: Quality Checks (ui-dashboard)
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # react-doctor --diff needs the base ref's history to compute the
          # changed-files set against origin/${{ github.base_ref }}.
          fetch-depth: 0
      - uses: ./.github/actions/pnpm-install
      - name: Resolve main baseline (PR baseline-growth check)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # ui-dashboard uses checkout fetch-depth=0, so origin/main is
          # already available without an extra fetch. Still guard against
          # the missing-file case.
          if git ls-tree --name-only origin/main -- ui-dashboard/eslint-baseline.json | grep -q .; then
            git show origin/main:ui-dashboard/eslint-baseline.json > /tmp/main-baseline-ui-dashboard.json
          else
            : > /tmp/main-baseline-ui-dashboard.json
          fi
          echo "ESLINT_BASELINE_MAIN=/tmp/main-baseline-ui-dashboard.json" >> "$GITHUB_ENV"
      - name: Typecheck
        run: pnpm --filter @mento-protocol/ui-dashboard typecheck
      - name: Lint
        # Diff-aware baseline check: prune-only, fails on any new or stale tuple.
        # Trunk no longer runs ESLint — this is the CI ESLint source of truth.
        run: pnpm --filter @mento-protocol/ui-dashboard lint
      - name: Knip (dead-code / dep hygiene, blocking)
        run: pnpm --filter @mento-protocol/ui-dashboard knip
      - name: React Doctor (diff vs base)
        # PR-only: scans files changed vs the PR base and fails on any
        # warning/error in those files. The full-score floor below keeps the
        # dashboard at 100 / 100; accepted project-wide silences live in
        # ui-dashboard/react-doctor.config.json.
        #
        # `git switch -c` reattaches HEAD to a named branch:
        # actions/checkout for PRs leaves us on a detached merge commit, and
        # react-doctor's `getDiffInfo` returns null when
        # `git rev-parse --abbrev-ref HEAD` is "HEAD", silently falling back
        # to a full scan that would surface the entire backlog.
        if: github.event_name == 'pull_request'
        run: |
          git switch -c __react_doctor_scan
          pnpm --filter @mento-protocol/ui-dashboard react-doctor --diff origin/${{ github.base_ref }} --fail-on warning --annotations --offline
      - name: React Doctor score floor
        run: |
          score="$(pnpm --filter @mento-protocol/ui-dashboard react-doctor --full --score --offline | tail -n 1 | tr -d '[:space:]')"
          if [ "$score" != "100" ]; then
            echo "Expected ui-dashboard react-doctor score 100, got ${score}" >&2
            exit 1
          fi
      - name: Test with coverage
        run: pnpm --filter @mento-protocol/ui-dashboard test:coverage
      - name: Install Playwright Chromium
        run: pnpm --filter @mento-protocol/ui-dashboard exec playwright install --with-deps chromium
      - name: Browser interaction tests
        run: pnpm --filter @mento-protocol/ui-dashboard test:browser
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          fail_ci_if_error: false
          flags: ui-dashboard
          directory: ui-dashboard/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  indexer:
    name: Quality Checks (indexer-envio)
    needs: changes
    if: needs.changes.outputs.indexer == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    permissions:
      checks: write
      contents: read
      actions: read
    # Job-level env so it's visible to both typecheck and tests. Tests import
    # EventHandlers.ts, which triggers runStartupChecks() at module load — with
    # strict=true, a start-block misconfiguration throws and fails CI before
    # reaching deploy. Codegen doesn't import EventHandlers, so the var is
    # inert there; scoping it to the job keeps the intent in one place.
    env:
      ENVIO_STRICT_START_BLOCK: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      # Envio codegen output is deterministic on (envio version, config*.yaml,
      # schema.graphql, abis). v3 emits to `.envio/types.d.ts`, which the
      # tracked `envio-env.d.ts` triple-slash references — both `tsc` and
      # vitest depend on it being present. Cache the .envio/ dir keyed on
      # those inputs so PRs that don't touch indexer configs skip the 2-3
      # minute codegen pass entirely. src/** is intentionally NOT in the key
      # — handler code doesn't affect codegen output, and including it would
      # invalidate the cache on every indexer PR (the common case), defeating
      # the cache.
      - name: Cache Envio .envio/
        id: cache-generated
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: indexer-envio/.envio
          key: envio-generated-v3-${{ runner.os }}-${{ hashFiles('indexer-envio/config*.yaml', 'indexer-envio/schema.graphql', 'indexer-envio/package.json', 'indexer-envio/abis/**', 'indexer-envio/scripts/**') }}
      - name: Validate all Envio configs (codegen)
        # Run codegen against every config file to catch schema/config drift
        # early. config.multichain.mainnet.yaml is run last — its output is
        # used by typecheck + tests below.
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          pnpm --filter @mento-protocol/indexer-envio codegen --config config.multichain.testnet.yaml
          pnpm --filter @mento-protocol/indexer-envio codegen --config config.multichain.mainnet.yaml
      - name: Resolve main baseline (PR baseline-growth check)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          if git ls-tree --name-only origin/main -- indexer-envio/eslint-baseline.json | grep -q .; then
            git show origin/main:indexer-envio/eslint-baseline.json > /tmp/main-baseline-indexer-envio.json
          else
            : > /tmp/main-baseline-indexer-envio.json
          fi
          echo "ESLINT_BASELINE_MAIN=/tmp/main-baseline-indexer-envio.json" >> "$GITHUB_ENV"
      - name: Typecheck
        run: pnpm --filter @mento-protocol/indexer-envio typecheck
      - name: Lint
        # Diff-aware baseline check: prune-only, fails on any new or stale tuple.
        run: pnpm --filter @mento-protocol/indexer-envio lint
      - name: Knip (dead-code / dep hygiene, blocking)
        run: pnpm --filter @mento-protocol/indexer-envio knip
      - name: Test with coverage
        run: pnpm --filter @mento-protocol/indexer-envio test:coverage
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          fail_ci_if_error: false
          flags: indexer-envio
          directory: indexer-envio/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  bridge:
    name: Quality Checks (metrics-bridge)
    needs: changes
    if: needs.changes.outputs.bridge == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: Resolve main baseline (PR baseline-growth check)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          if git ls-tree --name-only origin/main -- metrics-bridge/eslint-baseline.json | grep -q .; then
            git show origin/main:metrics-bridge/eslint-baseline.json > /tmp/main-baseline-metrics-bridge.json
          else
            : > /tmp/main-baseline-metrics-bridge.json
          fi
          echo "ESLINT_BASELINE_MAIN=/tmp/main-baseline-metrics-bridge.json" >> "$GITHUB_ENV"
      - name: Typecheck
        run: pnpm --filter @mento-protocol/metrics-bridge typecheck
      - name: Lint
        # Diff-aware baseline check: prune-only, fails on any new or stale tuple.
        run: pnpm --filter @mento-protocol/metrics-bridge lint
      - name: Knip (dead-code / dep hygiene, blocking)
        run: pnpm --filter @mento-protocol/metrics-bridge knip
      - name: Test with coverage
        run: pnpm --filter @mento-protocol/metrics-bridge test:coverage
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          fail_ci_if_error: false
          flags: metrics-bridge
          directory: metrics-bridge/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  aegis:
    name: Quality Checks (aegis)
    needs: changes
    if: needs.changes.outputs.aegis == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read
      actions: read
    env:
      FOUNDRY_PROFILE: ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - uses: ./.github/actions/pnpm-install
      - name: Typecheck
        run: pnpm --filter @mento-protocol/aegis typecheck
      - name: Build
        run: pnpm --filter @mento-protocol/aegis build
      - name: Lint
        run: pnpm --filter @mento-protocol/aegis lint
      - name: Jest tests
        run: pnpm --filter @mento-protocol/aegis test
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1
        with:
          version: stable
      - name: Forge tests
        working-directory: aegis
        run: forge test -vvv
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  scripts:
    name: Lint + test root scripts
    needs: changes
    if: needs.changes.outputs.rootScripts == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: ESLint root scripts
        run: pnpm lint:scripts
      - name: Agent quality-gate routing regression suite
        # Verifies the path-to-command mapping in scripts/agent-quality-gate.sh.
        # Without this in CI, a routing regression only fails locally (pre-push)
        # and could merge if a contributor bypasses the local gate.
        run: pnpm agent:quality-gate:test
      - name: ESLint baseline-diff semantic suite
        # Direct behavioral coverage of scripts/eslint-baseline-diff.mjs
        # (matching, growth detection, line-proximity absorption, merge-base
        # check). The wrapper is now load-bearing CI policy; routing tests
        # alone don't prove it behaves correctly.
        run: node scripts/eslint-baseline-diff.test.mjs
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  deps:
    name: Code Health (cross-package)
    needs: changes
    # Run on any workspace change. dep-cruiser is monorepo-wide — the rules
    # for "shared-config must stay a leaf" and "indexer-envio is isolated"
    # only fire when there's a path between packages, so we want every
    # workspace edit to recheck the architecture. Also fires on `codeHealth`
    # (dep-cruiser config + knip configs) so a PR that only edits the
    # rule file is validated against the codebase before merge.
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.indexer == 'true' || needs.changes.outputs.bridge == 'true' || needs.changes.outputs.aegis == 'true' || needs.changes.outputs.codeHealth == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: dependency-cruiser (cross-package boundaries, blocking)
        run: pnpm code-health:deps
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  ci:
    name: ci
    needs: [changes, shared, ui, indexer, bridge, aegis, deps, scripts]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      actions: read
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: shared,ui,indexer,bridge,aegis,deps,scripts
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()
