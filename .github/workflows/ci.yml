name: CI

# Aggregate workflow fanning out to package-scoped quality jobs gated on
# path changes. The `ci` sentinel aggregates the results so branch
# protection needs only one required check (`CI / ci`) instead of one per
# package. A PR that only touches ui-dashboard/ runs only the `ui` job;
# irrelevant jobs skip cleanly (GitHub hides them from the checks list).
#
# Third-party actions are pinned to commit SHAs per the policy in
# .github/workflows/claude.yml — update via Dependabot
# (.github/dependabot.yml).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Concurrency: on PRs, group by ref so new pushes to a PR cancel in-flight
# runs. On push to main (or any non-PR event), group by SHA so each commit
# gets its own run and main-branch runs never cancel each other. Prevents
# a fast-follow merge from cancelling a still-running main CI — important
# because main CI acts as the quality gate for the trust-main deploys.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

permissions: read-all

jobs:
  changes:
    name: Detect changes
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 2
    permissions:
      contents: read
      actions: read
      # dorny/paths-filter reads PR file lists through the Pulls API.
      pull-requests: read
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      ui: ${{ steps.filter.outputs.ui }}
      indexer: ${{ steps.filter.outputs.indexer }}
      bridge: ${{ steps.filter.outputs.bridge }}
      integrationProbes: ${{ steps.filter.outputs.integrationProbes }}
      aegis: ${{ steps.filter.outputs.aegis }}
      alerts: ${{ steps.filter.outputs.alerts }}
      govWatchdog: ${{ steps.filter.outputs.govWatchdog }}
      terraform: ${{ steps.filter.outputs.terraform }}
      codeHealth: ${{ steps.filter.outputs.codeHealth }}
      rootScripts: ${{ steps.filter.outputs.rootScripts }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            # scripts/eslint-baseline-diff.mjs is the per-package lint
            # wrapper. Any change to it needs to re-run every package's lint
            # so a broken wrapper can't merge silently — see PR-423 codex
            # finding (Run package lint when the lint gate changes).
            shared:
              - shared-config/**
              - scripts/eslint-baseline-diff.mjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            ui:
              - ui-dashboard/**
              - shared-config/**
              - scripts/eslint-baseline-diff.mjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            # shared-config/** is included in the indexer filter because
            # indexer-envio/test/fx-calendar.test.ts and
            # indexer-envio/test/deployment-namespaces.test.ts deep-equal
            # the vendored copies in indexer-envio/config/*.json against the
            # shared-config originals (the indexer builds outside the pnpm
            # workspace — see indexer-envio/src/healthScore.ts). The indexer
            # does NOT import shared-config at runtime.
            indexer:
              - indexer-envio/**
              - shared-config/**
              - scripts/eslint-baseline-diff.mjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            bridge:
              - metrics-bridge/**
              - shared-config/**
              - scripts/eslint-baseline-diff.mjs
              - cloudbuild.yaml
              - .gcloudignore
              - .node-version
              - pnpm-workspace.yaml
              - pnpm-lock.yaml
              - package.json
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            integrationProbes:
              - integration-probes/**
              - shared-config/**
              - scripts/eslint-baseline-diff.mjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/workflows/integration-probes.yml
              - .github/actions/pnpm-install/**
            aegis:
              - aegis/**
              - scripts/eslint-baseline-diff.mjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .gitmodules
              - .github/workflows/ci.yml
              - .github/workflows/aegis-app-engine.yml
              - .github/actions/pnpm-install/**
            terraform:
              - terraform/**
              - alerts/rules/**
              - alerts/infra/**
              - aegis/terraform/**
              - governance-watchdog/**
              - terraform.stacks.json
              - scripts/tf-stacks.mjs
              - .github/workflows/alerts-infra.yml
              - .github/workflows/infra.yml
              - .github/workflows/ci.yml
            alerts:
              - alerts/infra/onchain-event-handler/**
              - alerts/infra/oncall-announcer/**
              - alerts/infra/scripts/**
              # Listener filter feeds into the handler — a regression like
              # dropping blockHash from the QuickNode filter would silently
              # break cross-chain chain detection in the handler, and the
              # 38 vitest cases cover that behavior. Trigger the alerts job
              # on listener + channel changes too.
              - alerts/infra/onchain-event-listeners/**
              - alerts/infra/channels/**
              - alerts/infra/*.tf
              - shared-config/**
              - scripts/eslint-baseline-diff.mjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            # Governance Watchdog Cloud Function. Deploys as a standalone
            # source root (package-local pnpm-lock.yaml), so its quality job
            # installs from that lockfile like the alerts functions.
            govWatchdog:
              - governance-watchdog/**
              - scripts/eslint-baseline-diff.mjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            # Code-health policy files. A PR that touches ONLY the dep-cruiser
            # rules or a package's knip config would otherwise leave all four
            # package filters false → the cross-package `deps` job would skip
            # → blocking architecture rule changes ship unvalidated. This
            # filter fires the `deps` job whenever the policy itself moves.
            codeHealth:
              - .dependency-cruiser.cjs
              - "*/knip.json"
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
            # Root scripts ESLint job. Per-package lint runs inside each
            # workspace and never reaches repo-root scripts/*. This filter
            # fires the standalone scripts-lint job so `no-undef`, unused
            # imports, and syntax issues in build/quality scripts can't
            # merge unnoticed — see PR-423 codex finding (Keep root scripts
            # under ESLint).
            rootScripts:
              - scripts/**/*.mjs
              - scripts/**/*.cjs
              - scripts/**/*.js
              - scripts/**/*.sh
              - terraform.stacks.json
              - eslint.config.mjs
              - .dependency-cruiser.cjs
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ci.yml
              - .github/actions/pnpm-install/**
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  shared:
    name: Quality Checks (shared-config)
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: Resolve main baseline (PR baseline-growth check)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # Fail closed if origin/main can't be reached — a silently-empty
          # main baseline would skip the merge-base growth check and let a
          # hand-grown HEAD baseline pass. Explicit refspec ensures
          # refs/remotes/origin/main is updated regardless of the remote's
          # configured fetch refmap.
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          # Only tolerate a genuinely missing baseline file on main
          # (package didn't exist there yet) — not a missing ref or
          # ls-tree failure.
          if git ls-tree --name-only origin/main -- shared-config/eslint-baseline.json | grep -q .; then
            git show origin/main:shared-config/eslint-baseline.json > /tmp/main-baseline-shared-config.json
          else
            : > /tmp/main-baseline-shared-config.json
          fi
          echo "ESLINT_BASELINE_MAIN=/tmp/main-baseline-shared-config.json" >> "$GITHUB_ENV"
      - name: Typecheck
        run: pnpm --filter @mento-protocol/monitoring-config typecheck
      - name: Lint
        run: pnpm --filter @mento-protocol/monitoring-config lint
      - name: Knip (dead-code / dep hygiene, blocking)
        run: pnpm --filter @mento-protocol/monitoring-config knip
      - name: Test with coverage
        run: pnpm --filter @mento-protocol/monitoring-config test:coverage
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          flags: monitoring-config
          directory: shared-config/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  ui:
    name: Quality Checks (ui-dashboard)
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # react-doctor --diff needs the base ref's history to compute the
          # changed-files set against origin/${{ github.base_ref }}.
          fetch-depth: 0
      - uses: ./.github/actions/pnpm-install
      - name: Resolve main baseline (PR baseline-growth check)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # ui-dashboard uses checkout fetch-depth=0, so origin/main is
          # already available without an extra fetch. Still guard against
          # the missing-file case.
          if git ls-tree --name-only origin/main -- ui-dashboard/eslint-baseline.json | grep -q .; then
            git show origin/main:ui-dashboard/eslint-baseline.json > /tmp/main-baseline-ui-dashboard.json
          else
            : > /tmp/main-baseline-ui-dashboard.json
          fi
          echo "ESLINT_BASELINE_MAIN=/tmp/main-baseline-ui-dashboard.json" >> "$GITHUB_ENV"
      - name: Typecheck
        run: pnpm --filter @mento-protocol/ui-dashboard typecheck
      - name: Lint
        # Diff-aware baseline check: prune-only, fails on any new or stale tuple.
        # Trunk no longer runs ESLint — this is the CI ESLint source of truth.
        run: pnpm --filter @mento-protocol/ui-dashboard lint
      - name: Knip (dead-code / dep hygiene, blocking)
        run: pnpm --filter @mento-protocol/ui-dashboard knip
      - name: React Doctor (diff vs base)
        # PR-only: scans files changed vs the PR base and fails on any
        # warning/error in those files. The full-score floor below keeps the
        # dashboard at 100 / 100; accepted project-wide silences live in
        # ui-dashboard/react-doctor.config.json.
        #
        # `git switch -c` reattaches HEAD to a named branch:
        # actions/checkout for PRs leaves us on a detached merge commit, and
        # react-doctor's `getDiffInfo` returns null when
        # `git rev-parse --abbrev-ref HEAD` is "HEAD", silently falling back
        # to a full scan that would surface the entire backlog.
        if: github.event_name == 'pull_request'
        run: |
          git switch -c __react_doctor_scan
          pnpm --filter @mento-protocol/ui-dashboard react-doctor --diff origin/${{ github.base_ref }} --fail-on warning --annotations --offline
      - name: React Doctor score floor
        run: |
          score="$(pnpm --filter @mento-protocol/ui-dashboard react-doctor --full --score --offline | tail -n 1 | tr -d '[:space:]')"
          if [ "$score" != "100" ]; then
            echo "Expected ui-dashboard react-doctor score 100, got ${score}" >&2
            exit 1
          fi
      - name: Test with coverage
        run: pnpm --filter @mento-protocol/ui-dashboard test:coverage
      - name: Cache Playwright Chromium
        # `playwright install chromium` re-downloads ~130 MB on every run
        # otherwise (~84s of uncached CI time). The cache key hashes BOTH
        # `ui-dashboard/package.json` (the version range, e.g. `^1.60.0`)
        # AND `pnpm-lock.yaml` (the resolved version pnpm actually picks).
        # Keying on package.json alone misses lockfile-only
        # `@playwright/test` updates within the caret range — in that case
        # the key would stay constant while the Chromium revision Playwright
        # wants flips, so every run restores the stale cache, the install
        # step re-downloads, but actions/cache won't re-save under the
        # already-hit key, so the next run re-downloads again indefinitely.
        # Hashing the lockfile makes the key flip on any real Playwright
        # version bump. Mirrors the proven step in lighthouse.yml.
        #
        # `runner.arch` is in the key so a runner-architecture change (e.g.
        # an ARM migration) can never restore another arch's Chromium —
        # binaries are arch-specific, and `playwright install` validates
        # version, not architecture, so a cross-arch restore would pass
        # validation and then die with an exec-format error.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.arch }}-${{ hashFiles('ui-dashboard/package.json', 'pnpm-lock.yaml') }}
          # `restore-keys` lets an unrelated lockfile or `package.json`
          # edit still reuse the most recent chromium cache instead of
          # triggering a ~130 MB fresh download. `playwright install` then
          # fast-validates the existing binary against the version it wants
          # (no-op on match, re-download only on a real Playwright version
          # bump). `--with-deps` still installs OS libraries (fast).
          restore-keys: |
            playwright-chromium-${{ runner.arch }}-
      - name: Install Playwright Chromium
        run: pnpm --filter @mento-protocol/ui-dashboard exec playwright install --with-deps chromium
      - name: Browser interaction tests
        run: pnpm --filter @mento-protocol/ui-dashboard test:browser
      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-snapshot-diffs
          path: ui-dashboard/test-results/
          retention-days: 7
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          flags: ui-dashboard
          directory: ui-dashboard/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  indexer:
    name: Quality Checks (indexer-envio)
    needs: changes
    if: needs.changes.outputs.indexer == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    permissions:
      checks: write
      contents: read
      actions: read
    # Job-level env so it's visible to both typecheck and tests. Tests import
    # EventHandlers.ts, which triggers runStartupChecks() at module load — with
    # strict=true, a start-block misconfiguration throws and fails CI before
    # reaching deploy. Codegen doesn't import EventHandlers, so the var is
    # inert there; scoping it to the job keeps the intent in one place.
    env:
      ENVIO_STRICT_START_BLOCK: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      # Envio codegen output is deterministic on (envio version, config*.yaml,
      # schema.graphql, abis). v3 emits to `.envio/types.d.ts`, which the
      # tracked `envio-env.d.ts` triple-slash references — both `tsc` and
      # vitest depend on it being present. Cache the .envio/ dir keyed on
      # those inputs so PRs that don't touch indexer configs skip the 2-3
      # minute codegen pass entirely. src/** is intentionally NOT in the key
      # — handler code doesn't affect codegen output, and including it would
      # invalidate the cache on every indexer PR (the common case), defeating
      # the cache.
      - name: Cache Envio .envio/
        id: cache-generated
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: indexer-envio/.envio
          key: envio-generated-v3-${{ runner.os }}-${{ hashFiles('indexer-envio/config*.yaml', 'indexer-envio/schema.graphql', 'indexer-envio/package.json', 'indexer-envio/abis/**', 'indexer-envio/scripts/**') }}
      - name: Validate YAML address drift
        # Every hex address in config*.yaml must resolve to either
        # @mento-protocol/contracts, indexer-envio/config/nttAddresses.json,
        # or the inline ALLOWLIST. Runs before codegen so address drift
        # (e.g. an upstream rename of StabilityPool proxy/impl) fails loud
        # in <1s instead of going undetected until indexing breaks.
        # The script reads only the committed YAMLs + package files — no
        # untrusted PR input is interpolated into shell.
        run: pnpm --filter @mento-protocol/indexer-envio check:yaml-addresses
      - name: Validate all Envio configs (codegen)
        # Run codegen against every config file to catch schema/config drift
        # early. config.multichain.mainnet.yaml is run last — its output is
        # used by typecheck + tests below.
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          pnpm --filter @mento-protocol/indexer-envio codegen --config config.multichain.testnet.yaml
          pnpm --filter @mento-protocol/indexer-envio codegen --config config.multichain.mainnet.yaml
      - name: Resolve main baseline (PR baseline-growth check)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          if git ls-tree --name-only origin/main -- indexer-envio/eslint-baseline.json | grep -q .; then
            git show origin/main:indexer-envio/eslint-baseline.json > /tmp/main-baseline-indexer-envio.json
          else
            : > /tmp/main-baseline-indexer-envio.json
          fi
          echo "ESLINT_BASELINE_MAIN=/tmp/main-baseline-indexer-envio.json" >> "$GITHUB_ENV"
      - name: Typecheck
        run: pnpm --filter @mento-protocol/indexer-envio typecheck
      - name: Lint
        # Diff-aware baseline check: prune-only, fails on any new or stale tuple.
        run: pnpm --filter @mento-protocol/indexer-envio lint
      - name: Knip (dead-code / dep hygiene, blocking)
        run: pnpm --filter @mento-protocol/indexer-envio knip
      - name: Test with coverage
        run: pnpm --filter @mento-protocol/indexer-envio test:coverage
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          flags: indexer-envio
          directory: indexer-envio/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  bridge:
    name: Quality Checks (metrics-bridge)
    needs: changes
    if: needs.changes.outputs.bridge == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: Resolve main baseline (PR baseline-growth check)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          if git ls-tree --name-only origin/main -- metrics-bridge/eslint-baseline.json | grep -q .; then
            git show origin/main:metrics-bridge/eslint-baseline.json > /tmp/main-baseline-metrics-bridge.json
          else
            : > /tmp/main-baseline-metrics-bridge.json
          fi
          echo "ESLINT_BASELINE_MAIN=/tmp/main-baseline-metrics-bridge.json" >> "$GITHUB_ENV"
      - name: Typecheck
        run: pnpm --filter @mento-protocol/metrics-bridge typecheck
      - name: Lint
        # Diff-aware baseline check: prune-only, fails on any new or stale tuple.
        run: pnpm --filter @mento-protocol/metrics-bridge lint
      - name: Knip (dead-code / dep hygiene, blocking)
        run: pnpm --filter @mento-protocol/metrics-bridge knip
      - name: Test with coverage
        run: pnpm --filter @mento-protocol/metrics-bridge test:coverage
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          flags: metrics-bridge
          directory: metrics-bridge/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  integration-probes:
    name: Quality Checks (integration-probes)
    needs: changes
    if: needs.changes.outputs.integrationProbes == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: Resolve main baseline (PR baseline-growth check)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          if git ls-tree --name-only origin/main -- integration-probes/eslint-baseline.json | grep -q .; then
            git show origin/main:integration-probes/eslint-baseline.json > /tmp/main-baseline-integration-probes.json
          else
            : > /tmp/main-baseline-integration-probes.json
          fi
          echo "ESLINT_BASELINE_MAIN=/tmp/main-baseline-integration-probes.json" >> "$GITHUB_ENV"
      - name: Typecheck
        run: pnpm --filter @mento-protocol/integration-probes typecheck
      - name: Lint
        run: pnpm --filter @mento-protocol/integration-probes lint
      - name: Knip (dead-code / dep hygiene, blocking)
        run: pnpm --filter @mento-protocol/integration-probes knip
      - name: Test with coverage
        run: pnpm --filter @mento-protocol/integration-probes test:coverage
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          flags: integration-probes
          directory: integration-probes/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  alerts:
    name: Quality Checks (alerts Cloud Functions)
    needs: changes
    if: needs.changes.outputs.alerts == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      # Cloud Build deploys alerts/infra/onchain-event-handler/ as a standalone
      # source root. Install from the package-local pnpm-lock.yaml before the
      # handler checks so CI exercises the same dependency graph that deploys.
      - name: Install handler deploy dependencies
        working-directory: alerts/infra/onchain-event-handler
        run: pnpm install --frozen-lockfile --ignore-scripts --lockfile-dir .
      # Same package-local install for the on-call announcer Cloud Function
      # source root.
      - name: Install on-call announcer deploy dependencies
        working-directory: alerts/infra/oncall-announcer
        run: pnpm install --frozen-lockfile --ignore-scripts --lockfile-dir .
      - name: Typecheck (onchain-event-handler)
        working-directory: alerts/infra/onchain-event-handler
        run: pnpm run typecheck
      - name: Typecheck (oncall-announcer)
        working-directory: alerts/infra/oncall-announcer
        run: pnpm run typecheck
      - name: Lint
        working-directory: alerts/infra/onchain-event-handler
        run: pnpm run lint
      - name: Lint (oncall-announcer)
        working-directory: alerts/infra/oncall-announcer
        run: pnpm run lint
      - name: Knip
        working-directory: alerts/infra/onchain-event-handler
        run: pnpm run knip
      - name: Knip (oncall-announcer)
        working-directory: alerts/infra/oncall-announcer
        run: pnpm run knip
      - name: Test with coverage
        working-directory: alerts/infra/onchain-event-handler
        run: pnpm run test:coverage
      - name: Test with coverage (oncall-announcer)
        working-directory: alerts/infra/oncall-announcer
        run: pnpm run test:coverage
      # Verify event-hashes.json is in sync with safe-abi.json. The handler
      # computes Safe event topic hashes at runtime from safe-abi.json
      # (constants.ts:extractEventSignatures), and the QuickNode webhook
      # filters on the SAME hashes via the vendored event-hashes.json. A
      # safe-abi.json edit that forgets to regenerate event-hashes.json
      # leaves the webhook filtering on the OLD topics — silent event drop
      # for any new Safe event type. This step regenerates the JSON in-place
      # and fails if it differs from the committed copy.
      - name: Verify event-hashes.json is in sync with safe-abi.json
        working-directory: alerts/infra/onchain-event-handler
        run: |
          pnpm run build:event-hashes
          if ! git -C ../../.. diff --exit-code -- alerts/infra/onchain-event-listeners/event-hashes.json; then
            echo "::error::event-hashes.json is stale. Regenerate with: cd alerts/infra/onchain-event-handler && pnpm run build:event-hashes"
            exit 1
          fi
      # Operator shell scripts (deploy, get-logs, manage-quicknode-webhook, etc.).
      # Runtime invocation by operators, so a syntax error here breaks deploy
      # / incident flows rather than CI. `bash -n` parses without executing.
      - name: Shell-script syntax check
        run: |
          find alerts/infra -name '*.sh' -not -path '*/node_modules/*' -print0 \
            | xargs -0 -I {} bash -n {}
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          flags: alerts-onchain-event-handler
          directory: alerts/infra/onchain-event-handler/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          flags: alerts-oncall-announcer
          directory: alerts/infra/oncall-announcer/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  gov-watchdog:
    name: Quality Checks (governance-watchdog)
    needs: changes
    if: needs.changes.outputs.govWatchdog == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      # Cloud Build deploys governance-watchdog/ as a standalone source root.
      # Install from the package-local pnpm-lock.yaml before the checks so CI
      # exercises the same dependency graph that deploys.
      - name: Install deploy dependencies
        working-directory: governance-watchdog
        run: pnpm install --frozen-lockfile --ignore-scripts --lockfile-dir .
      - name: Typecheck
        working-directory: governance-watchdog
        run: pnpm run typecheck
      - name: Lint
        working-directory: governance-watchdog
        run: pnpm run lint
      - name: Knip (dead-code / dep hygiene, blocking)
        working-directory: governance-watchdog
        run: pnpm run knip
      - name: Build
        working-directory: governance-watchdog
        run: pnpm run build
      - name: Test with coverage
        working-directory: governance-watchdog
        run: pnpm run test:coverage
      # Operator shell scripts (deploy, get-logs, reprocess-event, etc.).
      # `bash -n` parses without executing so a syntax error fails CI rather
      # than an operator's deploy / incident flow.
      - name: Shell-script syntax check
        run: |
          find governance-watchdog/bin -name '*.sh' -not -path '*/node_modules/*' -print0 \
            | xargs -0 -I {} bash -n {}
      # QuickNode filter functions are the canonical source that
      # bin/deploy-quicknode-filter.sh pushes to the live webhook; a syntax
      # regression here would otherwise only surface during a live filter update.
      - name: QuickNode filter-function syntax check
        run: |
          find governance-watchdog/infra/quicknode-filter-functions -name '*.js' -print0 \
            | xargs -0 -I {} node --check {}
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          flags: governance-watchdog
          directory: governance-watchdog/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  # Registry-backed Terraform validation inside the required `ci` sentinel.
  # The separate `Infra` workflow prints richer stack summaries and validates
  # the same roots, but it is not part of the branch-protection sentinel.
  terraform:
    name: Terraform Validate (registry)
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.6
      - name: Validate changed stacks
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            matrix="$(node scripts/tf-stacks.mjs changed --base "origin/${BASE_REF}" --head HEAD --json)"
          elif [[ "$EVENT_NAME" == "push" && -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            matrix="$(node scripts/tf-stacks.mjs changed --base "$BEFORE_SHA" --head HEAD --json)"
          else
            matrix="$(node scripts/tf-stacks.mjs changed --json)"
          fi

          count="$(node -e 'const m = JSON.parse(process.argv[1]); console.log(m.include.length)' "$matrix")"
          if [[ "$count" == "0" ]]; then
            echo "No Terraform stacks changed."
            exit 0
          fi

          stack_ids="$(node -e 'const m = JSON.parse(process.argv[1]); for (const s of m.include) console.log(s.id)' "$matrix")"
          while IFS= read -r stack; do
            [[ -n "$stack" ]] || continue
            node scripts/tf-stacks.mjs validate "$stack"
          done <<< "$stack_ids"
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  aegis:
    name: Quality Checks (aegis)
    needs: changes
    if: needs.changes.outputs.aegis == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read
      actions: read
    env:
      FOUNDRY_PROFILE: ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Initialize forge-std test dependency
        run: git -C aegis/lib/forge-std submodule update --init --depth=1 lib/ds-test
      - uses: ./.github/actions/pnpm-install
      - name: Resolve main baseline (PR baseline-growth check)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          if git ls-tree --name-only origin/main -- aegis/eslint-baseline.json | grep -q .; then
            git show origin/main:aegis/eslint-baseline.json > /tmp/main-baseline-aegis.json
          else
            : > /tmp/main-baseline-aegis.json
          fi
          echo "ESLINT_BASELINE_MAIN=/tmp/main-baseline-aegis.json" >> "$GITHUB_ENV"
      - name: Typecheck
        run: pnpm --filter @mento-protocol/aegis typecheck
      - name: Build
        run: pnpm --filter @mento-protocol/aegis build
      - name: Lint
        run: pnpm --filter @mento-protocol/aegis lint
      - name: Knip (dead-code / dep hygiene, blocking)
        run: pnpm --filter @mento-protocol/aegis knip
      - name: Test with coverage
        run: pnpm --filter @mento-protocol/aegis test:cov
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: stable
      - name: Forge tests
        working-directory: aegis
        run: forge test -vvv
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          flags: aegis
          directory: aegis/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  scripts:
    name: Lint + test root scripts
    needs: changes
    if: needs.changes.outputs.rootScripts == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: ESLint root scripts
        run: pnpm lint:scripts
      - name: Agent quality-gate routing regression suite
        # Verifies the path-to-command mapping in scripts/agent-quality-gate.sh.
        # Without this in CI, a routing regression only fails locally (pre-push)
        # and could merge if a contributor bypasses the local gate.
        run: pnpm agent:quality-gate:test
      - name: Terraform stack registry suite
        run: pnpm tf:test
      - name: ESLint baseline-diff semantic suite
        # Direct behavioral coverage of scripts/eslint-baseline-diff.mjs
        # (matching, growth detection, line-proximity absorption, merge-base
        # check). The wrapper is now load-bearing CI policy; routing tests
        # alone don't prove it behaves correctly.
        run: node scripts/eslint-baseline-diff.test.mjs
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  deps:
    name: Code Health (cross-package)
    needs: changes
    # Run on any workspace change. dep-cruiser is monorepo-wide — the rules
    # for "shared-config must stay a leaf" and "indexer-envio is isolated"
    # only fire when there's a path between packages, so we want every
    # workspace edit to recheck the architecture. Also fires on `codeHealth`
    # (dep-cruiser config + knip configs) so a PR that only edits the
    # rule file is validated against the codebase before merge.
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.indexer == 'true' || needs.changes.outputs.bridge == 'true' || needs.changes.outputs.integrationProbes == 'true' || needs.changes.outputs.aegis == 'true' || needs.changes.outputs.codeHealth == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      checks: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: dependency-cruiser (cross-package boundaries, blocking)
        run: pnpm code-health:deps
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  ci:
    name: ci
    needs:
      [
        changes,
        shared,
        ui,
        indexer,
        bridge,
        integration-probes,
        aegis,
        alerts,
        gov-watchdog,
        terraform,
        deps,
        scripts,
      ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      actions: read
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: shared,ui,indexer,bridge,integration-probes,aegis,alerts,gov-watchdog,terraform,deps,scripts
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()
