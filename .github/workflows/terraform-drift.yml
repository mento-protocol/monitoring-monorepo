name: Terraform Drift Detection

# Daily scheduled `terraform plan -detailed-exitcode` for every Terraform stack
# whose `ci.apply == "push-main-production-environment"` in
# `terraform.stacks.json`. Read-only — never applies. On exit-2 ("changes
# pending"), opens or updates a GitHub issue labelled `drift-detection` +
# `stack:<id>` with the sanitized plan tail.
#
# Why this exists: auto-applied stacks (alerts/rules, alerts/infra, aegis) can
# still drift when state changes outside Terraform — UI edits in Grafana, manual
# gcloud changes, Slack admins renaming channels.
# Without a periodic check, drift can sit invisible for weeks. The 2026-05-27
# alerts/rules rollout surfaced ~25 template renames worth of accumulated
# drift; a daily plan job would have caught it days earlier.
#
# Auth note: each drift leg authenticates with the least-privileged SA that can
# still run a full-refresh plan, picked from `matrix.planSa` (derived in the
# discover step from each stack's registry `providers[]`). Grafana-only stacks
# (`alerts-rules`, `aegis`) plan under the read-only plan SA
# (`GCP_SERVICE_ACCOUNT_PLAN` → `org-terraform-plan-readonly@…seed`,
# `objectViewer` on the state bucket). `alerts/infra` keeps the write-capable
# deployer (`GCP_SERVICE_ACCOUNT`): its google provider must refresh GCP
# resources the read-only seed SA has no project roles to read. Making that leg
# read-only too would need a `roles/viewer` grant for the seed SA on the
# `project_factory`-managed project (operator/seed creds) — deferred by design;
# see docs/notes/terraform-cicd-hardening-decisions-2026-05.md.

on:
  schedule:
    # Daily at 05:23 UTC — off-peak globally, off-the-hour to dodge cron
    # contention on GitHub's scheduler.
    - cron: 23 5 * * *
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  discover:
    name: Discover auto-applied stacks
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
      has-stacks: ${{ steps.filter.outputs.has-stacks }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Filter registry to auto-applied stacks
        id: filter
        # Read `terraform.stacks.json` via `node scripts/tf-stacks.mjs list
        # --json`, keep only stacks whose
        # `ci.apply == "push-main-production-environment"`, emit a
        # matrix.include payload.
        #
        # We invoke the script via `node` directly rather than `pnpm tf list`
        # because pnpm isn't pre-installed on GitHub/Blacksmith Ubuntu 24.04
        # runners, and the script only uses Node stdlib (no node_modules
        # needed). Matches the pattern in `.github/workflows/infra.yml` +
        # `ci.yml` which also call `node scripts/tf-stacks.mjs` directly.
        #
        run: |
          set -euo pipefail
          node scripts/tf-stacks.mjs list --json \
            | node -e '
              const stdin = require("fs").readFileSync(0, "utf8");
              const { stacks } = JSON.parse(stdin);
              const filtered = stacks
                .filter(s => s.ci.apply === "push-main-production-environment")
                // `planSa` routes each leg to the least-privileged SA that can
                // still run a full-refresh drift plan. A stack whose only GCP
                // touch is the GCS backend (no google* provider) refreshes fine
                // under the read-only seed SA (`objectViewer` on the state
                // bucket is enough). A stack with a google* provider needs the
                // write-capable deployer because the read-only seed SA has no
                // project roles, so refreshing its GCP resources would 403.
                // Registry-driven so new stacks route correctly without editing
                // this workflow.
                .map(s => ({
                  id: s.id,
                  name: s.name,
                  path: s.path,
                  planSa: (s.providers || []).some(p => p.startsWith("google"))
                    ? "write"
                    : "readonly",
                }));
              const matrix = JSON.stringify({ include: filtered });
              const hasStacks = filtered.length > 0 ? "true" : "false";
              require("fs").appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${matrix}\n`);
              require("fs").appendFileSync(process.env.GITHUB_OUTPUT, `has-stacks=${hasStacks}\n`);
              console.log("Discovered stacks:", filtered.map(s => s.id).join(", ") || "(none)");
            '

  drift-check:
    name: Drift Plan (${{ matrix.id }})
    needs: discover
    if: needs.discover.outputs.has-stacks == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write
      issues: write
      actions: read
    env:
      # Union of every TF_VAR_* secret across the auto-applied stacks. Each
      # `terraform plan` only reads the vars its stack declares — extra vars
      # are harmless. Keep this block in sync with the env blocks in
      # `.github/workflows/alerts-rules.yml`, `alerts-infra.yml`, and
      # `aegis-terraform.yml`.
      TF_VAR_grafana_service_account_token: ${{ secrets.TF_VAR_GRAFANA_SERVICE_ACCOUNT_TOKEN }}
      TF_VAR_slack_bot_token: ${{ secrets.TF_VAR_SLACK_BOT_TOKEN }}
      TF_VAR_splunk_on_call_alerts_webhook_url: ${{ secrets.TF_VAR_SPLUNK_ON_CALL_ALERTS_WEBHOOK_URL }}
      TF_VAR_sentry_auth_token: ${{ secrets.TF_VAR_SENTRY_AUTH_TOKEN }}
      TF_VAR_billing_account: ${{ secrets.TF_VAR_BILLING_ACCOUNT }}
      TF_VAR_terraform_service_account: org-terraform@mento-terraform-seed-ffac.iam.gserviceaccount.com
      TF_VAR_quicknode_api_key: ${{ secrets.TF_VAR_QUICKNODE_API_KEY }}
      TF_VAR_quicknode_signing_secret: ${{ secrets.TF_VAR_QUICKNODE_SIGNING_SECRET }}
      TF_VAR_splunk_on_call_api_id: ${{ secrets.TF_VAR_SPLUNK_ON_CALL_API_ID }}
      TF_VAR_splunk_on_call_api_key: ${{ secrets.TF_VAR_SPLUNK_ON_CALL_API_KEY }}
      TF_VAR_oncall_slack_channel_id: ${{ secrets.TF_VAR_ONCALL_SLACK_CHANNEL_ID }}
      TF_VAR_oncall_support_usergroup_id: ${{ secrets.TF_VAR_ONCALL_SUPPORT_USERGROUP_ID }}
      TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          # Per-leg least privilege: grafana-only stacks (`planSa == readonly`)
          # plan under the read-only plan SA; google-provider stacks
          # (`alerts/infra`) stay on the write-capable deployer because a
          # full-refresh drift plan reads GCP resources the read-only seed SA
          # has no project roles to see. `==` yields a real boolean, so the
          # ternary can't misfire on a stringified matrix value. The
          # repo-scoped WIF binding (terraform/ci-wif.tf) lets any workflow in
          # this repo mint either token — no IAM change was needed to swap.
          service_account: ${{ matrix.planSa == 'readonly' && secrets.GCP_SERVICE_ACCOUNT_PLAN || secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Init
        # Read-only legs override the GCS backend impersonation to the
        # read-only seed SA (the CLI value beats the write SA hardcoded in
        # versions.tf). Write legs init plain against the deployer.
        env:
          PLAN_SA: ${{ matrix.planSa }}
          GCP_SA_PLAN: ${{ secrets.GCP_SERVICE_ACCOUNT_PLAN }}
        run: |
          if [ "$PLAN_SA" = "readonly" ]; then
            # Fail loud rather than silently elevate: the auth ternary
            # (`matrix.planSa == 'readonly' && PLAN || WRITE`) falls through to
            # the write SA if `GCP_SERVICE_ACCOUNT_PLAN` is empty (`true && ''`
            # is falsy in GHA), which would defeat least privilege without an
            # error signal. A missing secret should stop the readonly leg here.
            if [ -z "$GCP_SA_PLAN" ]; then
              echo "::error::GCP_SERVICE_ACCOUNT_PLAN is not set — readonly leg would silently fall back to the write SA"
              exit 1
            fi
            terraform init -input=false -backend-config="impersonate_service_account=org-terraform-plan-readonly@mento-terraform-seed-ffac.iam.gserviceaccount.com"
          else
            terraform init -input=false
          fi

      - name: Plan
        id: plan
        # `-detailed-exitcode`: 0 = no changes, 1 = error, 2 = changes
        # (= drift, since main is the deployed code). Capture raw stdout +
        # stderr, sanitize it, then write `/tmp/tf-plan.txt` for logs and the
        # issue body. `set +e` so a non-zero exit doesn't fail the step.
        # Never tee raw Terraform output: drift can include destroy-time
        # provider state for Splunk webhooks or QuickNode security_token[...] fields.
        # The shared sanitizer below carries the concrete redaction regexes.
        #
        # `matrix.id` is passed through `env:` rather than inlining via
        # `${{ }}` in the `run:` block, matching the workflow-injection
        # hardening pattern used in alerts-rules.yml / alerts-infra.yml.
        # The registry values are repo-controlled, but env-passing is the
        # established convention.
        env:
          STACK_ID: ${{ matrix.id }}
          PLAN_SA: ${{ matrix.planSa }}
        run: |
          set +e
          # Read-only legs must pass `-lock=false`: the read-only seed SA holds
          # `objectViewer` on the state bucket and can't write the GCS lock
          # object. Write legs keep advisory locking. Both run a full refresh —
          # the point of drift detection is to read live resource state.
          if [ "$PLAN_SA" = "readonly" ]; then
            terraform plan -detailed-exitcode -no-color -input=false -lock=false > /tmp/tf-plan.raw 2>&1
          else
            terraform plan -detailed-exitcode -no-color -input=false -lock-timeout=2m > /tmp/tf-plan.raw 2>&1
          fi
          EXITCODE=$?
          set -e
          "${GITHUB_WORKSPACE}/scripts/sanitize-terraform-output.sh" /tmp/tf-plan.raw /tmp/tf-plan.txt
          cat /tmp/tf-plan.txt
          echo "exitcode=$EXITCODE" >> "$GITHUB_OUTPUT"
          case "$EXITCODE" in
            0) echo "No drift in $STACK_ID" ;;
            2) echo "::warning::Drift detected in $STACK_ID — issue will be opened/updated" ;;
            *) echo "::error::terraform plan failed for $STACK_ID with exit code $EXITCODE"; exit 1 ;;
          esac

      - name: Ensure drift labels exist
        if: steps.plan.outputs.exitcode == '2'
        env:
          STACK_ID: ${{ matrix.id }}
          GH_TOKEN: ${{ github.token }}
        # `github.rest.issues.create()` SILENTLY DROPS unknown label names —
        # no 422, the issue just lands without labels. The next run's
        # `listForRepo({ labels })` query then returns [], `existing` is
        # always undefined, and every drift cycle creates a fresh duplicate
        # issue. `gh label create --force` is idempotent (creates if missing,
        # updates if present), so it's safe to run unconditionally each
        # drift-detected cycle.
        run: |
          set -euo pipefail
          gh label create "drift-detection" --color "d73a4a" --description "Terraform drift detected by scheduled workflow" --force
          gh label create "stack:$STACK_ID" --color "0e8a16" --description "Affects Terraform stack: $STACK_ID" --force

      - name: Open or update drift issue
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          STACK_ID: ${{ matrix.id }}
          STACK_NAME: ${{ matrix.name }}
        with:
          script: |
            const fs = require("fs");
            const stackId = process.env.STACK_ID;
            const stackName = process.env.STACK_NAME;
            const planOutput = fs.existsSync("/tmp/tf-plan.txt")
              ? fs.readFileSync("/tmp/tf-plan.txt", "utf8")
              : "(Plan did not produce output — check the workflow logs.)";

            // GitHub issue body cap is ~65KB. Keep the plan tail (last 50 KB);
            // discard the head (provider init noise) — the apply/destroy summary
            // we care about lives at the bottom of the plan output.
            const MAX = 50_000;
            const truncated = planOutput.length > MAX;
            const planBody = truncated
              ? "... (truncated, see workflow logs)\n" + planOutput.slice(-MAX)
              : planOutput;

            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;

            const now = new Date().toISOString();

            const body =
              `**Stack:** \`${stackId}\` (${stackName})\n` +
              `**Last checked:** ${now}\n` +
              `[Full workflow logs](${runUrl})\n\n` +
              `Terraform reported pending changes against this stack's state. ` +
              `Either there's drift from out-of-band edits (Grafana UI, manual gcloud, ` +
              `Slack channel renames, etc.) OR there's code on \`main\` that hasn't ` +
              `been applied yet. Investigate by running \`terraform plan\` from a clean ` +
              `\`main\` checkout against this stack.\n\n` +
              `<details><summary>Plan output${truncated ? " (tail)" : ""}</summary>\n\n` +
              `\`\`\`hcl\n${planBody}\n\`\`\`\n` +
              `</details>\n\n` +
              `<!-- terraform-drift-stack:${stackId} -->`;

            const labels = ["drift-detection", `stack:${stackId}`];

            // Look for an existing open issue with both labels. `paginate`
            // walks every page.
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                labels: labels.join(","),
                per_page: 100,
              },
            );

            // Defense in depth: also confirm the marker comment is present,
            // in case labels got stripped manually.
            const existing = issues.find(i =>
              i.body && i.body.includes(`<!-- terraform-drift-stack:${stackId} -->`),
            );

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              console.log(`Updated existing drift issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Terraform drift detected: ${stackName}`,
                body,
                labels,
              });
              console.log(`Opened drift issue #${created.data.number}`);
            }

      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()
