name: Metrics Bridge

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - metrics-bridge/**
      - cloudbuild.yaml
      - .gcloudignore
      - pnpm-workspace.yaml
      - pnpm-lock.yaml
      - package.json
      - .github/workflows/metrics-bridge.yml
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  quality:
    name: Quality Checks (metrics-bridge)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Detect bridge-related changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            bridge:
              - metrics-bridge/**
              - cloudbuild.yaml
              - .gcloudignore
              - pnpm-workspace.yaml
              - pnpm-lock.yaml
              - package.json
              - .github/workflows/metrics-bridge.yml
      - name: No bridge changes
        if: steps.changes.outputs.bridge != 'true'
        run: echo "No metrics-bridge changes; skipping."
      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.bridge == 'true'
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.bridge == 'true'
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        if: steps.changes.outputs.bridge == 'true'
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        if: steps.changes.outputs.bridge == 'true'
        run: pnpm --filter @mento-protocol/metrics-bridge typecheck
      - name: Lint
        if: steps.changes.outputs.bridge == 'true'
        run: pnpm --filter @mento-protocol/metrics-bridge lint
      - name: Test
        if: steps.changes.outputs.bridge == 'true'
        run: pnpm --filter @mento-protocol/metrics-bridge test
