name: Metrics Bridge

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - metrics-bridge/**
      - cloudbuild.yaml
      - .gcloudignore
      - .node-version
      - pnpm-workspace.yaml
      - pnpm-lock.yaml
      - package.json
      - .github/workflows/metrics-bridge.yml
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  quality:
    name: Quality Checks (metrics-bridge)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Detect bridge-related changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            bridge:
              - metrics-bridge/**
              - cloudbuild.yaml
              - .gcloudignore
              - .node-version
              - pnpm-workspace.yaml
              - pnpm-lock.yaml
              - package.json
              - .github/workflows/metrics-bridge.yml
      - name: No bridge changes
        if: steps.changes.outputs.bridge != 'true'
        run: echo "No metrics-bridge changes; skipping."
      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.bridge == 'true'
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.bridge == 'true'
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        if: steps.changes.outputs.bridge == 'true'
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        if: steps.changes.outputs.bridge == 'true'
        run: pnpm --filter @mento-protocol/metrics-bridge typecheck
      - name: Lint
        if: steps.changes.outputs.bridge == 'true'
        run: pnpm --filter @mento-protocol/metrics-bridge lint
      - name: Test
        if: steps.changes.outputs.bridge == 'true'
        run: pnpm --filter @mento-protocol/metrics-bridge test

  deploy:
    name: Build & Deploy (metrics-bridge)
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: mento-monitoring
      GCP_REGION: europe-west1
      AR_REPO: europe-west1-docker.pkg.dev/mento-monitoring/metrics-bridge
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          TAG="${AR_REPO}/metrics-bridge:${{ github.sha }}"
          gcloud builds submit \
            --project="$GCP_PROJECT" \
            --config=cloudbuild.yaml \
            --substitutions="_IMAGE=${TAG}" \
            --timeout=600s \
            .
          # Resolve to digest so Cloud Run always rolls a new revision,
          # even on re-runs of the same commit.
          DIGEST=$(gcloud artifacts docker images describe "$TAG" \
            --project="$GCP_PROJECT" \
            --format='value(image_summary.digest)')
          IMAGE="${AR_REPO}/metrics-bridge@${DIGEST}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Deploy to Cloud Run via Terraform
        env:
          # All required Terraform variables from GitHub secrets.
          # GCP vars are provided by the auth step above.
          TF_VAR_metrics_bridge_image: ${{ env.IMAGE }}
          TF_VAR_vercel_token: ${{ secrets.VERCEL_TOKEN }}
          TF_VAR_upstash_email: ${{ secrets.UPSTASH_EMAIL }}
          TF_VAR_upstash_api_key: ${{ secrets.UPSTASH_API_KEY }}
          TF_VAR_auth_google_id: ${{ secrets.AUTH_GOOGLE_ID }}
          TF_VAR_auth_google_secret: ${{ secrets.AUTH_GOOGLE_SECRET }}
          TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
          TF_VAR_cron_secret: ${{ secrets.CRON_SECRET }}
          TF_VAR_blob_read_write_token: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          TF_VAR_gcp_org_id: ${{ secrets.GCP_ORG_ID }}
          TF_VAR_gcp_billing_account: ${{ secrets.GCP_BILLING_ACCOUNT }}
        run: |
          terraform -chdir=terraform init -input=false
          terraform -chdir=terraform apply -auto-approve -input=false \
            -target='google_cloud_run_v2_service.metrics_bridge[0]' \
            -target='google_cloud_run_v2_service_iam_member.metrics_bridge_public[0]'
