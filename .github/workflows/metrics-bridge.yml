name: Metrics Bridge

# Deploy-only workflow. Quality checks (typecheck/lint/test) live in
# .github/workflows/ci.yml under the `bridge` job and are gated by the
# required `CI / ci` check on main. Trust-main pattern: anything reaching
# main has already passed quality, so deploy has no `needs:` on a quality
# job.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - metrics-bridge/**
      - cloudbuild.yaml
      - .gcloudignore
      - .node-version
      - pnpm-workspace.yaml
      - pnpm-lock.yaml
      - package.json
      - .github/workflows/metrics-bridge.yml

# Group by SHA (not ref) so two fast main-merges each get their own run
# and the second never cancels the first mid-deploy. cancel-in-progress is
# false so a manual re-dispatch on the same SHA (e.g. retrying after a
# transient deploy failure) queues behind the in-flight run instead of
# cancelling it — SHA-unique groups don't handle that edge case alone.
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

permissions: read-all

jobs:
  deploy:
    name: Build & Deploy (metrics-bridge)
    # Guard against workflow_dispatch from non-main refs: deploy must only
    # run from main so it inherits the trust-main quality gate enforced by
    # the `CI / ci` required check on PRs merging to main.
    if: github.ref == 'refs/heads/main'
    # GitHub Environment gate: adds deployment history in the Environments
    # tab, and lets us optionally add required-reviewer / wait-timer rules
    # in the repo Environments settings without workflow changes.
    environment:
      name: production
      url: https://console.cloud.google.com/run?project=mento-monitoring
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      actions: read
    env:
      GCP_PROJECT: mento-monitoring
      GCP_REGION: europe-west1
      AR_REPO: europe-west1-docker.pkg.dev/mento-monitoring/metrics-bridge
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Build and push image
        run: |
          TAG="${AR_REPO}/metrics-bridge:${{ github.sha }}"
          gcloud builds submit \
            --project="$GCP_PROJECT" \
            --config=cloudbuild.yaml \
            --substitutions="_IMAGE=${TAG}" \
            --timeout=600s \
            .
          # Resolve to digest so Cloud Run always rolls a new revision,
          # even on re-runs of the same commit.
          DIGEST=$(gcloud artifacts docker images describe "$TAG" \
            --project="$GCP_PROJECT" \
            --format='value(image_summary.digest)')
          IMAGE="${AR_REPO}/metrics-bridge@${DIGEST}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: Deploy to Cloud Run via Terraform
        env:
          # All required Terraform variables from GitHub secrets.
          # GCP vars are provided by the auth step above.
          TF_VAR_metrics_bridge_image: ${{ env.IMAGE }}
          TF_VAR_vercel_token: ${{ secrets.VERCEL_TOKEN }}
          TF_VAR_upstash_email: ${{ secrets.UPSTASH_EMAIL }}
          TF_VAR_upstash_api_key: ${{ secrets.UPSTASH_API_KEY }}
          TF_VAR_auth_google_id: ${{ secrets.AUTH_GOOGLE_ID }}
          TF_VAR_auth_google_secret: ${{ secrets.AUTH_GOOGLE_SECRET }}
          TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
          TF_VAR_cron_secret: ${{ secrets.CRON_SECRET }}
          TF_VAR_blob_read_write_token: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          TF_VAR_gcp_org_id: ${{ secrets.GCP_ORG_ID }}
          TF_VAR_gcp_billing_account: ${{ secrets.GCP_BILLING_ACCOUNT }}
        run: |
          terraform -chdir=terraform init -input=false
          terraform -chdir=terraform apply -auto-approve -input=false \
            -target='google_cloud_run_v2_service.metrics_bridge[0]' \
            -target='google_cloud_run_v2_service_iam_member.metrics_bridge_public[0]'

      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()
