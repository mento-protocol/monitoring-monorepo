name: Metrics Bridge

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - metrics-bridge/**
      - cloudbuild.yaml
      - .gcloudignore
      - pnpm-workspace.yaml
      - pnpm-lock.yaml
      - package.json
      - .github/workflows/metrics-bridge.yml
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  quality:
    name: Quality Checks (metrics-bridge)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Detect bridge-related changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            bridge:
              - metrics-bridge/**
              - cloudbuild.yaml
              - .gcloudignore
              - pnpm-workspace.yaml
              - pnpm-lock.yaml
              - package.json
              - .github/workflows/metrics-bridge.yml
      - name: No bridge changes
        if: steps.changes.outputs.bridge != 'true'
        run: echo "No metrics-bridge changes; skipping."
      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.bridge == 'true'
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.bridge == 'true'
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        if: steps.changes.outputs.bridge == 'true'
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        if: steps.changes.outputs.bridge == 'true'
        run: pnpm --filter @mento-protocol/metrics-bridge typecheck
      - name: Lint
        if: steps.changes.outputs.bridge == 'true'
        run: pnpm --filter @mento-protocol/metrics-bridge lint
      - name: Test
        if: steps.changes.outputs.bridge == 'true'
        run: pnpm --filter @mento-protocol/metrics-bridge test

  deploy:
    name: Build & Deploy (metrics-bridge)
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: mento-monitoring
      GCP_REGION: europe-west1
      AR_REPO: europe-west1-docker.pkg.dev/mento-monitoring/metrics-bridge
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          IMAGE="${AR_REPO}/metrics-bridge:${{ github.sha }}"
          gcloud builds submit \
            --project="$GCP_PROJECT" \
            --config=cloudbuild.yaml \
            --substitutions="_IMAGE=${IMAGE}" \
            --timeout=600s \
            .
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run via Terraform
        run: |
          terraform -chdir=terraform init -input=false
          terraform -chdir=terraform apply \
            -auto-approve \
            -var="metrics_bridge_image=${IMAGE}" \
            -input=false
