name: UI Dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ui-dashboard/**
      - shared-config/**
      - pnpm-lock.yaml
      - package.json
      - pnpm-workspace.yaml
      - .node-version
      - .github/workflows/ui-dashboard.yml
  pull_request:
    branches: [main]
    # No paths filter here: the workflow must always run on PRs so the
    # required "Quality Checks (ui-dashboard)" status check can report a
    # result. Relevant-file detection is handled inside the job below.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  quality:
    name: Quality Checks (ui-dashboard)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Detect ui-dashboard changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ui:
              - ui-dashboard/**
              - shared-config/**
              - pnpm-lock.yaml
              - package.json
              - pnpm-workspace.yaml
              - .node-version
              - .github/workflows/ui-dashboard.yml
      - name: No ui-dashboard changes
        if: steps.changes.outputs.ui != 'true'
        run: echo "No ui-dashboard changes; skipping quality checks."
      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.ui == 'true'
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.ui == 'true'
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        if: steps.changes.outputs.ui == 'true'
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        if: steps.changes.outputs.ui == 'true'
        run: pnpm --filter @mento-protocol/ui-dashboard typecheck
      - name: Test with coverage
        if: steps.changes.outputs.ui == 'true'
        run: pnpm --filter @mento-protocol/ui-dashboard test:coverage
      - uses: codecov/codecov-action@v5
        if: steps.changes.outputs.ui == 'true'
        with:
          fail_ci_if_error: false
          flags: ui-dashboard
          directory: ui-dashboard/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
