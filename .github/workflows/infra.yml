name: Infra

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - terraform/**
      - alerts/rules/**
      - alerts/infra/**
      - aegis/terraform/**
      - terraform.stacks.json
      - scripts/tf-stacks.mjs
      - .github/workflows/infra.yml
  pull_request:
    branches: [main]
    paths:
      - terraform/**
      - alerts/rules/**
      - alerts/infra/**
      - aegis/terraform/**
      - terraform.stacks.json
      - scripts/tf-stacks.mjs
      - .github/workflows/infra.yml

# See ci.yml for the concurrency rationale: PR runs cancel on new pushes
# to the same PR ref; push/dispatch events use a SHA-unique group so they
# never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

permissions: read-all

jobs:
  discover:
    name: Discover Terraform stacks
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    outputs:
      matrix: ${{ steps.stacks.outputs.matrix }}
      has-stacks: ${{ steps.stacks.outputs.has-stacks }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Build changed-stack matrix
        id: stacks
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            matrix="$(node scripts/tf-stacks.mjs changed --base "origin/${BASE_REF}" --head HEAD --json)"
          elif [[ "$EVENT_NAME" == "push" && -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            matrix="$(node scripts/tf-stacks.mjs changed --base "$BEFORE_SHA" --head HEAD --json)"
          else
            matrix="$(node scripts/tf-stacks.mjs changed --json)"
          fi

          count="$(node -e 'const m = JSON.parse(process.argv[1]); console.log(m.include.length)' "$matrix")"
          {
            echo "matrix=${matrix}"
            if [[ "$count" == "0" ]]; then
              echo "has-stacks=false"
            else
              echo "has-stacks=true"
            fi
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Terraform stacks"
            echo
            if [[ "$count" == "0" ]]; then
              echo "No Terraform stacks changed."
            else
              echo "| Stack | Path | State prefix | CI plan | CI apply | Apply policy |"
              echo "| --- | --- | --- | --- | --- | --- |"
              node -e '
                const m = JSON.parse(process.argv[1]);
                for (const s of m.include) {
                  console.log(`| ${s.id} | ${s.path} | ${s.state_prefix} | ${s.ci_plan} | ${s.ci_apply} | ${s.apply_policy} |`);
                }
              ' "$matrix"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  validate:
    name: Terraform Validate (${{ matrix.id }})
    needs: discover
    if: needs.discover.outputs.has-stacks == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.6
      - name: Validate stack
        run: node scripts/tf-stacks.mjs validate "${{ matrix.id }}"
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()
