name: Infra

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - terraform/**
      - .github/workflows/infra.yml
  pull_request:
    branches: [main]
    paths:
      - terraform/**
      - .github/workflows/infra.yml

# See ci.yml for the concurrency rationale: PR runs cancel on new pushes
# to the same PR ref; push/dispatch events use a SHA-unique group so they
# never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

permissions: read-all

jobs:
  validate:
    name: Terraform Validate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.14.6
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Init (no backend)
        run: terraform init -backend=false -input=false
      - name: Validate
        run: terraform validate -no-color
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()
