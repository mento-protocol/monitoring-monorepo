name: Infra

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - terraform/**
      - alerts/rules/**
      - alerts/infra/**
      - aegis/terraform/**
      - .github/workflows/infra.yml
  pull_request:
    branches: [main]
    paths:
      - terraform/**
      - alerts/rules/**
      - alerts/infra/**
      - aegis/terraform/**
      - .github/workflows/infra.yml

# See ci.yml for the concurrency rationale: PR runs cancel on new pushes
# to the same PR ref; push/dispatch events use a SHA-unique group so they
# never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

permissions: read-all

jobs:
  validate:
    name: Terraform Validate (${{ matrix.module }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # Each Terraform root module is validated independently. The top-level
        # `terraform/` owns Vercel + Cloud Run + WIF infra; `alerts/rules/`
        # owns Grafana alert rules + Slack contact points; `alerts/infra/`
        # owns the event-delivery stack (Cloud Function + Discord channels +
        # Sentry bridge + QuickNode webhooks); `aegis/terraform/` owns the
        # Aegis Grafana dashboard + alert rules + notification routing
        # (contact points, templates, mute timings). All run `fmt`,
        # `init -backend=false` (no state access needed for validate), and
        # `validate`.
        module:
          - terraform
          - alerts/rules
          - alerts/infra
          - aegis/terraform
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.6
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Init (no backend)
        run: terraform init -backend=false -input=false
      - name: Validate
        run: terraform validate -no-color
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()
