name: Sentry Triage Agent

# Stage B of the Sentry triage pipeline (ADR 0036): a scheduled, READ-ONLY
# claude-code-action agent that posts a structured verdict on each pending queue
# issue (`sentry-triage` + `sentry:needs-triage`). It NEVER fixes code, never
# writes to Sentry, never opens PRs. Prompt-injection containment is the whole
# design point — see the security notes on the `triage` job below.
#
# Inert until activation: the `SENTRY_TRIAGE_ENABLED` repo variable gates the
# whole workflow, and the `select` job additionally no-ops when either secret
# (CLAUDE_CODE_OAUTH_TOKEN, SENTRY_TRIAGE_TOKEN) is absent. Secrets/variable are
# Terraform-owned (ADR 0030) and provisioned by a separate issue. This is NOT a
# required check.

on:
  schedule:
    # 45 min after the ingest workflow (30 5, 30 13) so the queue is fresh.
    - cron: 15 6 * * *
    - cron: 15 14 * * *
  workflow_dispatch:
    # checkov:skip=CKV_GHA_7: issue_number is a single-issue dry-run selector,
    # validated to ^[0-9]+$ before use (see the select job). It only narrows
    # which queue issue is triaged — it cannot affect any build/deploy output
    # (this workflow reads Sentry and posts an issue comment; it builds nothing).
    # Required by issue #1275's dry-run acceptance criterion.
    inputs:
      issue_number:
        description: Single queue issue number to triage (dry-run). Leave blank for the normal oldest-first batch.
        required: false
        type: string

# Serialize runs so an overlapping schedule + dispatch can't double-triage the
# same queue issue. Never cancel an in-flight triage.
concurrency:
  group: sentry-triage-agent
  cancel-in-progress: false

# Minimal top-level default; every job below replaces this with its own
# least-privilege set (job permissions REPLACE workflow permissions).
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # select: pick up to 6 oldest pending queue issues and emit them as a matrix.
  # This job ALWAYS runs and ALWAYS emits a valid JSON array — both the kill
  # switch (SENTRY_TRIAGE_ENABLED, same repo variable as the ingest workflow)
  # and the secret guard live inside the first step, so a disabled or
  # unprovisioned state is a clean no-op (`[]`, exit 0), never a failure and
  # never an empty matrix expression downstream.
  # ---------------------------------------------------------------------------
  select:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: read
    outputs:
      issues: ${{ steps.select.outputs.issues }}
      count: ${{ steps.select.outputs.count }}
    steps:
      - name: Select queue issues (kill-switch + secret guarded)
        id: select
        env:
          ENABLED: ${{ vars.SENTRY_TRIAGE_ENABLED }}
          # Presence-only guard: masked in logs, only tested for emptiness here.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SENTRY_TRIAGE_TOKEN: ${{ secrets.SENTRY_TRIAGE_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          DISPATCH_ISSUE: ${{ github.event.inputs.issue_number }}
        run: |
          set -euo pipefail

          # Always emit a valid JSON array so the downstream matrix never sees
          # an empty string.
          issues='[]'

          if [ "${ENABLED:-}" != "true" ]; then
            echo "::notice::SENTRY_TRIAGE_ENABLED is not 'true' — kill switch off, no-op."
          elif [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ] || [ -z "${SENTRY_TRIAGE_TOKEN}" ]; then
            echo "::notice::Sentry triage secrets not provisioned yet — no-op."
          elif [ -n "${DISPATCH_ISSUE:-}" ]; then
            # Dry-run path: triage exactly the requested issue. Reject anything
            # that isn't a bare integer before it reaches the matrix / prompt.
            if [[ "${DISPATCH_ISSUE}" =~ ^[0-9]+$ ]]; then
              issues="[${DISPATCH_ISSUE}]"
            else
              echo "::error::workflow_dispatch input issue_number must be a plain integer"
              exit 1
            fi
          else
            # Oldest-first, capped at 6 per run (mandatory quota cap — do not raise).
            # `gh issue list` returns newest-first by default, so a bare --limit
            # would window to the newest 100 and starve genuinely older queue
            # issues. `--search 'sort:created-asc'` makes the API return
            # oldest-first (--label/--state filters AND-merge into the search
            # query); the client-side sort_by + slice stays as defense-in-depth.
            issues=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --label sentry-triage \
              --label 'sentry:needs-triage' \
              --state open \
              --search 'sort:created-asc' \
              --json number,createdAt \
              --limit 100 \
              --jq '[sort_by(.createdAt)[].number][0:6]')
          fi

          count=$(printf '%s' "${issues}" | jq 'length')
          {
            echo "issues=${issues}"
            echo "count=${count}"
          } >> "${GITHUB_OUTPUT}"
          echo "Selected ${count} issue(s): ${issues}"

  # ---------------------------------------------------------------------------
  # triage: one claude-code-action run per queue issue (max 2 in parallel).
  #
  # Prompt-injection containment (Sentry payloads are untrusted input):
  #   - permissions: issues:write + contents:read ONLY. No pull-requests, no
  #     id-token, no packages — the agent holds no write credential beyond
  #     commenting/labeling on THIS repo.
  #   - --allowedTools is an explicit allowlist: repo READ tools (Read/Grep/Glob),
  #     Sentry READ tools only, and three scoped `gh issue` subcommands. view/list
  #     are read-only and stay repo-wide (duplicate search needs them); the
  #     agent's ONLY write is `gh issue comment`, pinned to this matrix job's
  #     queue-issue number at the permission layer, so an injected instruction
  #     cannot retarget other issues. (Prefix-match residual: a number that
  #     string-extends the queue issue's digits, e.g. 123 → 1234, would still
  #     match — accepted.) The label swap is NOT delegated to the agent: a
  #     deterministic step below parses the verdict out of the comment and
  #     applies the label itself. No bare Bash, no `gh api`, no `gh issue edit`,
  #     no Write/Edit, no Sentry write/execute tools, no WebFetch/WebSearch.
  #   - SENTRY_TRIAGE_TOKEN is set as job env (see the env: note below) and is
  #     consumed via ${VAR} expansion in --mcp-config; it is never echoed and
  #     never placed in a command.
  # ---------------------------------------------------------------------------
  triage:
    needs: select
    if: ${{ needs.select.outputs.count != '' && needs.select.outputs.count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        issue: ${{ fromJSON(needs.select.outputs.issues) }}
    permissions:
      contents: read
      issues: write
    # Job-level (NOT step-level) env: claude-code-action is a composite action
    # whose internal run step has its own env: block that shadows caller
    # step-level env vars — its action.yml explicitly instructs custom env vars
    # to be set at job level or via $GITHUB_ENV so they reach the Claude
    # subprocess. Job env is exported to every step process of this job.
    #   - GH_TOKEN: gh CLI auth for the agent's scoped `gh issue …` commands
    #     (this job's GITHUB_TOKEN: issues:write + contents:read only).
    #   - SENTRY_TRIAGE_TOKEN: consumed by ${SENTRY_TRIAGE_TOKEN} expansion in
    #     --mcp-config when the CLI launches the stdio Sentry MCP server
    #     (expansion of inline --mcp-config env values verified against the
    #     CLI). Never echoed. Accepted residual: like GH_TOKEN, it is visible
    #     to the agent's allowlisted Bash subprocesses; the token is read-only
    #     scoped, and any misuse lands in the auditable queue-issue comment.
    env:
      GH_TOKEN: ${{ github.token }}
      SENTRY_TRIAGE_TOKEN: ${{ secrets.SENTRY_TRIAGE_TOKEN }}
    steps:
      # SHA-pinned (not tags) so tag retargeting / a compromised release cannot
      # silently run new code. Bump via Dependabot (.github/dependabot.yml).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Render triage prompt
        id: render
        env:
          QUEUE_ISSUE_NUMBER: ${{ matrix.issue }}
        run: |
          set -euo pipefail
          # Wire only the queue-issue number into the checked-in prompt file;
          # the SECURITY section and everything else stay verbatim. sed instead
          # of envsubst: gettext is not guaranteed on ubuntu-latest, and the
          # replacement is a ^[0-9]+$-validated integer, so it is sed-safe.
          {
            echo 'prompt<<SENTRY_TRIAGE_PROMPT_EOF'
            sed "s/\$QUEUE_ISSUE_NUMBER/${QUEUE_ISSUE_NUMBER}/g" .github/prompts/sentry-triage.md
            echo 'SENTRY_TRIAGE_PROMPT_EOF'
          } >> "${GITHUB_OUTPUT}"

      - uses: anthropics/claude-code-action@f87768c6d25f92ae6efa7175e223ef77d4cbf97f # v1.0.166
        with:
          github_token: ${{ github.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.render.outputs.prompt }}
          # Sentry MCP (stdio, read-only token) is wired via --mcp-config. The
          # allowlist excludes every Sentry write/mutation tool (update_issue,
          # add_issue_note, create_*/update_*/remove_*), the search-tools/
          # execute-tool meta-executor, and analyze_issue_with_seer.
          #
          # --setting-sources user: do NOT load the checked-out repo's
          # .claude/settings.json — its permissions.allow list (e.g. `node *`)
          # would otherwise widen this contained agent past the allowlist below.
          # On the CI runner `user` settings are absent, so --allowedTools is the
          # sole permission source.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 40
            --setting-sources user
            --mcp-config '{"mcpServers":{"sentry":{"command":"npx","args":["-y","@sentry/mcp-server@0.37.0"],"env":{"SENTRY_ACCESS_TOKEN":"${SENTRY_TRIAGE_TOKEN}","SENTRY_HOST":"us.sentry.io"}}}}'
            --allowedTools 'Read,Grep,Glob,Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh issue comment ${{ matrix.issue }}:*),mcp__sentry__find_organizations,mcp__sentry__find_projects,mcp__sentry__get_issue_details,mcp__sentry__get_event_stacktrace,mcp__sentry__get_issue_tag_values,mcp__sentry__get_issue_activity,mcp__sentry__search_issues,mcp__sentry__search_events,mcp__sentry__search_issue_events,mcp__sentry__get_sentry_resource'

      - name: Apply verdict label (deterministic)
        env:
          QUEUE_ISSUE_NUMBER: ${{ matrix.issue }}
        run: |
          set -euo pipefail
          # The agent's only write is the verdict comment. The label swap is
          # applied HERE, deterministically, so a prompt-injected agent cannot
          # touch labels at all: parse the verdict out of the newest
          # marker-bearing comment, validate it against the four allowed
          # values, and apply the mapped label. If no valid verdict comment
          # exists, fail the job loudly and leave sentry:needs-triage in place
          # so the next scheduled run retries this issue.
          # NOTE: the comment body is agent-authored from untrusted Sentry
          # data — it is only ever handled as quoted data here (never
          # interpolated into a command), and the extracted verdict is
          # constrained to the closed label set by the case statement.
          body=$(gh issue view "${QUEUE_ISSUE_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json comments \
            --jq '[.comments[].body | select(startswith("<!-- sentry-triage-verdict:v1 -->"))] | last // ""')
          if [ -z "${body}" ]; then
            echo "::error::No verdict comment with the sentry-triage-verdict:v1 marker found on issue #${QUEUE_ISSUE_NUMBER}; leaving sentry:needs-triage in place for retry."
            exit 1
          fi
          verdict=$(printf '%s\n' "${body}" | sed -n 's/^verdict:[[:space:]]*\([a-z-]*\).*$/\1/p' | head -n 1)
          case "${verdict}" in
            code-fix) label="sentry:verdict-code-fix" ;;
            config-fix) label="sentry:verdict-config-fix" ;;
            upstream-transient) label="sentry:verdict-upstream" ;;
            needs-human) label="sentry:verdict-needs-human" ;;
            *)
              echo "::error::Verdict comment on issue #${QUEUE_ISSUE_NUMBER} has missing/invalid verdict value; leaving sentry:needs-triage in place for retry."
              exit 1
              ;;
          esac
          gh issue edit "${QUEUE_ISSUE_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --remove-label 'sentry:needs-triage' \
            --add-label "${label}"
          echo "Applied ${label} to issue #${QUEUE_ISSUE_NUMBER}."

  # ---------------------------------------------------------------------------
  # digest: post ONE deterministic Slack digest per run — what was triaged,
  # with what verdicts, with links — so verdict review needs zero GitHub
  # polling (ADR 0036's failure mode is "unauditable automation going dark").
  #
  #   - if: always() + a non-zero select count. `always()` makes the digest
  #     post even when some `triage` matrix jobs failed (partial visibility is
  #     the point — the failed-triage bucket lists issues still labeled
  #     sentry:needs-triage). The count gate keeps it SILENT on empty batches
  #     and kill-switch no-ops (select emits count '0'/'' then), so a run where
  #     nothing happened stays quiet.
  #   - permissions: issues:read + contents:read ONLY — the digest reads issue
  #     labels/comments and posts to Slack; it holds no write credential.
  #   - This is a pure CONSUMER of the verdict contract: no LLM, no label
  #     writes, no Sentry, no contract changes.
  #   - A digest-job failure fails the whole run, which the main-failure
  #     notifier (notify-slack-on-main-failure.yml, where this workflow is
  #     registered) surfaces to #ci-failures — so a broken digest can't go dark.
  # ---------------------------------------------------------------------------
  digest:
    needs: [select, triage]
    if: ${{ always() && needs.select.outputs.count != '' && needs.select.outputs.count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: read
    steps:
      # SHA-pinned (not tags) so tag retargeting / a compromised release cannot
      # silently run new code. Bump via Dependabot (.github/dependabot.yml).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Build digest payload
        env:
          # Read-only: the digest job's GITHUB_TOKEN is issues:read + contents:read.
          GH_TOKEN: ${{ github.token }}
          # The exact batch this run selected (JSON int array from the select
          # job). Passed via env — never interpolated into the shell command.
          # No Slack token in this step: it only reads issues and emits JSON.
          SENTRY_TRIAGE_ISSUES: ${{ needs.select.outputs.issues }}
        run: |
          set -euo pipefail
          # The digest channel is DELIBERATELY hardcoded here (not a secret or
          # repo variable): #engineering is the standing triage-review channel,
          # and changing it is a one-line PR. The bot's chat:write.public scope
          # lets it post to this public channel uninvited (same mechanism as
          # notify-slack-on-main-failure.yml). The script prints ONLY the Slack
          # payload JSON to stdout; diagnostics go to stderr.
          # --repo: same source of truth as the select/triage jobs
          # (GITHUB_REPOSITORY), so the digest reads the run's own repository
          # instead of assuming the script's default (matters on forks/renames).
          node scripts/sentry-triage-digest.mjs \
            --channel '#engineering' \
            --repo "${GITHUB_REPOSITORY}" \
            > "${RUNNER_TEMP}/digest-payload.json"

      - name: Post digest to #engineering
        env:
          # SLACK_BOT_TOKEN reaches ONLY this posting step's env — never the
          # collector step, never echoed, never placed in a URL. Reuses the
          # existing Terraform-managed bot token (no new secret).
          SLACK_BOT_TOKEN: ${{ secrets.TF_VAR_SLACK_BOT_TOKEN }}
        run: |
          set -euo pipefail

          # Defense in depth: the job is already gated on a non-zero batch, but
          # if the collector produced no payload (empty-batch guard), there is
          # nothing to post — exit cleanly without touching Slack.
          if [ ! -s "${RUNNER_TEMP}/digest-payload.json" ]; then
            echo "::notice::No digest payload produced; nothing to post."
            exit 0
          fi

          # POST the pre-built payload verbatim (--data @file); the summary text
          # was already Slack-escaped by the collector. Mirrors the main-failure
          # notifier's curl + ok-check pattern.
          RESPONSE=$(curl -fsS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data @"${RUNNER_TEMP}/digest-payload.json")

          # Slack returns 200 OK with {"ok": false, "error": "..."} on logical
          # errors; fail loudly so a silently-broken digest turns the run red
          # (the main-failure notifier then fires).
          if [ "$(echo "$RESPONSE" | jq -r '.ok')" != "true" ]; then
            echo "::error::Slack digest post failed: $(echo "$RESPONSE" | jq -r '.error // "unknown"')"
            echo "Full response: $RESPONSE"
            exit 1
          fi
          echo "Posted Sentry triage digest to #engineering."
