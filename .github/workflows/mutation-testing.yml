name: Mutation Testing

on:
  workflow_dispatch:
  schedule:
    # Weekly advisory baseline for the dashboard job (which stays advisory).
    # The bridge job is also re-run here so cron acts as a backstop signal
    # even when no PR has touched probe code that week.
    - cron: 17 5 * * 1
  pull_request:
    # Intentionally NO `paths:` filter — required-status workflows must run on
    # every PR (AGENTS.md "Required-status workflows MUST NOT use paths:").
    # The bridge job decides internally whether to invoke `pnpm
    # bridge:mutation` by checking the `changes` job's output. Fails closed
    # when the change detector itself fails (see `decide` step below).

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    # PR-only detector. Computes whether this PR's diff is relevant to the
    # bridge mutation gate. If this job fails or is skipped, the bridge job
    # below treats it as "run the full gate" (fail-closed semantics).
    if: github.event_name == 'pull_request'
    name: Detect changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 2
    permissions:
      contents: read
      actions: read
    outputs:
      bridge: ${{ steps.filter.outputs.bridge }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            # Anything that can affect the result of `pnpm bridge:mutation`.
            # `metrics-bridge/src/**` is broader than the mutated file alone:
            # rebalance-probe.ts imports from sibling modules (config,
            # metrics, rebalance-check, rpc, types), and a change there can
            # change mutation survival. Same logic for the test: the
            # mutation test imports `fixtures.ts` and the regular probe
            # tests stress shared behavior. Configs + package-manager files
            # (root + bridge) capture script wiring + version drift.
            bridge:
              - metrics-bridge/src/**
              - metrics-bridge/test/**
              - metrics-bridge/stryker.config.mjs
              - metrics-bridge/vitest.mutation.config.ts
              - metrics-bridge/package.json
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - .npmrc
              - .github/workflows/mutation-testing.yml
              - .github/actions/pnpm-install/**

  dashboard-logic-baseline:
    # Advisory: cron + manual dispatch only. PR runs skip this job — the
    # dashboard mutation gate is not blocking yet (see BACKLOG).
    if: github.event_name != 'pull_request'
    name: Dashboard logic baseline
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: Run dashboard mutation baseline
        run: pnpm dashboard:mutation

  bridge-rebalance-probe-baseline:
    # Always runs (required-status safe). The `decide` step computes whether
    # to invoke `pnpm bridge:mutation`:
    #   - cron / workflow_dispatch    → always run the mutation step
    #   - PR + detector succeeded + bridge=true  → run
    #   - PR + detector succeeded + bridge=false → no-op skip
    #   - PR + detector failed/skipped           → run (fail-closed)
    # `metrics-bridge/stryker.config.mjs` sets `break: 80`, so when the
    # mutation step does run, a score below 80% fails the job.
    name: Bridge rebalance probe baseline
    needs: changes
    if: always() && (github.event_name != 'pull_request' || needs.changes.result != 'cancelled')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Decide whether to run mutation
        id: decide
        env:
          EVENT: ${{ github.event_name }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          BRIDGE_CHANGED: ${{ needs.changes.outputs.bridge }}
        run: |
          if [[ "$EVENT" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by $EVENT — running mutation gate."
          elif [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Change detector result is '$CHANGES_RESULT' (expected 'success') — failing closed, running mutation gate."
          elif [[ "$BRIDGE_CHANGED" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Bridge probe inputs changed — running mutation gate."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Bridge probe code + its mutation inputs unchanged — skipping mutation gate."
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.decide.outputs.run == 'true'
      - uses: ./.github/actions/pnpm-install
        if: steps.decide.outputs.run == 'true'
      - name: Run bridge mutation baseline
        if: steps.decide.outputs.run == 'true'
        run: pnpm bridge:mutation
