name: Publish Config Package

on:
  workflow_dispatch:
  push:
    tags:
      - config-v*

concurrency:
  group: publish-config-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @mento-protocol/config
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/config-v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release ref
        run: |
          set -euo pipefail
          version="$(node -p "require('./shared-config/package.json').version")"
          if [[ "$version" == "0.0.0" ]]; then
            echo "::error::shared-config/package.json must use a real semver version before publishing"
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            expected="config-v${version}"
            if [[ "${GITHUB_REF_NAME}" != "$expected" ]]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match package version ${version}; expected ${expected}"
              exit 1
            fi
            git fetch origin main:refs/remotes/origin/main
            if ! git merge-base --is-ancestor HEAD origin/main; then
              echo "::error::Publish tags must point at a commit already reachable from origin/main"
              exit 1
            fi
          elif [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "::error::Manual publish dry-runs must run from main"
            exit 1
          else
            echo "::notice::Manual dispatch from main validates and packs only; push a matching config-v* tag to publish."
          fi

      - name: Build package
        run: pnpm --filter @mento-protocol/config build

      - name: Verify packed contents
        run: |
          set -euo pipefail
          npm pack ./shared-config --dry-run --json > /tmp/config-pack.json
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const [pack] = JSON.parse(readFileSync("/tmp/config-pack.json", "utf8"));
          const files = new Set(pack.files.map((entry) => entry.path));
          const required = [
            "package.json",
            "dist/aggregators.d.ts",
            "dist/aggregators.js",
            "dist/chains.d.ts",
            "dist/chains.js",
            "dist/deployment-namespaces.d.ts",
            "dist/deployment-namespaces.js",
            "dist/erc20-abi.d.ts",
            "dist/erc20-abi.js",
            "dist/format.d.ts",
            "dist/format.js",
            "dist/fx-calendar.d.ts",
            "dist/fx-calendar.js",
            "dist/oracle-reporters.d.ts",
            "dist/oracle-reporters.js",
            "dist/protocol-fee.d.ts",
            "dist/protocol-fee.js",
            "dist/rebalance-abi.d.ts",
            "dist/rebalance-abi.js",
            "dist/thresholds.d.ts",
            "dist/thresholds.js",
            "dist/tokens.d.ts",
            "dist/tokens.js",
            "dist/units.d.ts",
            "dist/units.js",
            "aggregators.json",
            "chain-metadata.json",
            "deployment-namespaces.json",
            "fx-calendar.json",
            "oracle-reporters.json",
          ];

          const missing = required.filter((file) => !files.has(file));
          if (missing.length > 0) {
            console.error(`Packed package is missing required files: ${missing.join(", ")}`);
            process.exit(1);
          }
          NODE

      - name: Verify trusted publishing bootstrap
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          version="$(node -p "require('./shared-config/package.json').version")"
          if ! npm view @mento-protocol/config version >/dev/null 2>&1; then
            echo "::error::npm trusted publishing cannot create a brand-new package. Seed @mento-protocol/config once with an approved maintainer publish, then configure trusted publishing and use this tag workflow for later versions."
            exit 1
          fi

          if npm view "@mento-protocol/config@${version}" version >/dev/null 2>&1; then
            echo "::error::@mento-protocol/config@${version} already exists on npm"
            exit 1
          fi

      - name: Publish to npm
        if: github.ref_type == 'tag'
        run: npm publish ./shared-config --access public --provenance

      - name: Report dry run
        if: github.ref_type != 'tag'
        run: echo "Manual dispatch completed validation and pack checks without publishing; push a matching config-v* tag from main to publish."
