name: Alerts Rules

# Terraform plan-on-PR + apply-on-merge for `alerts/rules/` — the Grafana
# alert rule + contact point + notification policy stack. The stack's GCS
# backend impersonates `org-terraform@mento-terraform-seed-ffac` (see
# `alerts/rules/versions.tf`), so the CI deployer SA needs
# `roles/iam.serviceAccountTokenCreator` on `org-terraform`. That grant lives
# in `terraform/ci-wif.tf` (resource `ci_alerts_org_terraform_token_creator`,
# shared with `alerts/infra/`) and must be applied from the top-level stack
# before this workflow can succeed.
#
# Plan/apply split:
#   - `plan` job runs on every PR + push/dispatch to main. It runs
#     `terraform plan -detailed-exitcode` and emits a `has-changes` job
#     output. On PRs it posts a sticky comment with the plan diff.
#   - `apply` job only runs on push/dispatch to main AND only when the plan
#     reported actual changes. When there are no changes the apply job is
#     skipped entirely, which means the `production` Environment's
#     required-reviewer prompt only fires on real-change merges.
#
# Note: we intentionally do NOT save the plan as a binary artifact for
# cross-job apply. HashiCorp warns that `terraform plan -out=` "saves
# sensitive data in cleartext in the plan file"
# (https://developer.hashicorp.com/terraform/cli/commands/plan), and the
# TF_VAR_* env block here carries production Grafana/Slack/Splunk/Discord
# credentials. Uploading the binary plan as a workflow artifact would
# expose those secrets to anyone with `actions:read`. Instead the apply
# job re-plans at gate-approval time — the trade-off is the brief
# "between approval and apply" drift window, which the reviewer can
# detect by checking the apply-job's plan output before approving.
#
# Quality gating: PR-level fmt/init/validate is already enforced by `infra.yml`
# (matrix module `alerts-rules`). This workflow adds the plan diff comment +
# the apply gate.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - alerts/rules/**
      - .github/workflows/alerts-rules.yml
  push:
    branches: [main]
    paths:
      - alerts/rules/**
      - .github/workflows/alerts-rules.yml

# PR runs cancel on new pushes to the same PR ref (queue depth of 1 per PR
# is fine — a newer plan supersedes an older one).
#
# Push/dispatch runs share ONE group `<workflow>-deploy` with
# `cancel-in-progress: false`, so concurrent merges queue and apply
# strictly in order. Without this, a SHA-unique group would let two
# close-together merges run `terraform apply` in parallel and the older
# one could roll the state back to stale config (Grafana alert rules and
# notification policies are order-sensitive: a stale routing tree can drop
# pages on the floor).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || 'deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
  # Push/dispatch: queue all pending applies (up to 100) so intermediate
  # main-branch merges don't get silently dropped by GitHub's default
  # `queue: single` behavior (only one pending; newer-pending cancels
  # older). For PR events, keep the default `single` — the cancel-on-new-
  # push semantics there are what we want. `queue: max` + `cancel-in-
  # progress: true` is invalid per GitHub, so the conditional matches the
  # cancel-in-progress conditional above. The bundled actionlint version
  # doesn't recognise the `queue` key yet (added by GitHub in 2025); see
  # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/control-the-concurrency-of-workflows-and-jobs
  # trunk-ignore(actionlint/syntax-check)
  queue: ${{ github.event_name == 'pull_request' && 'single' || 'max' }}

permissions: read-all

jobs:
  plan:
    name: Terraform Plan (alerts/rules)
    # Fork PRs and Dependabot PRs don't get repository secrets, so the
    # GCP auth + TF_VAR_* steps would resolve empty and fail every time.
    # Skip the job in those contexts — the plan is only meaningful when
    # secrets are available. Internal PRs + main pushes run.
    if: >-
      (github.event_name == 'pull_request'
        && github.event.pull_request.head.repo.fork == false
        && github.event.pull_request.user.login != 'dependabot[bot]')
      || (github.ref == 'refs/heads/main'
        && (github.event_name == 'push' || github.event_name == 'workflow_dispatch'))
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      actions: read
    defaults:
      run:
        working-directory: alerts/rules
    outputs:
      has-changes: ${{ steps.detect.outputs.has-changes }}
    env:
      # Grafana Cloud (drives the grafana provider; needs Admin role on the stack)
      TF_VAR_grafana_service_account_token: ${{ secrets.TF_VAR_GRAFANA_SERVICE_ACCOUNT_TOKEN }}
      # Slack bot token (drives `grafana_contact_point.slack_*` resources)
      TF_VAR_slack_bot_token: ${{ secrets.TF_VAR_SLACK_BOT_TOKEN }}
      # Splunk On-Call / VictorOps webhook (drives `grafana_contact_point.splunk_on_call`)
      TF_VAR_splunk_on_call_alerts_webhook_url: ${{ secrets.TF_VAR_SPLUNK_ON_CALL_ALERTS_WEBHOOK_URL }}
      # Legacy Discord webhooks — still wired for the per-domain contact points
      TF_VAR_discord_alerts_webhook_url_staging: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_STAGING }}
      TF_VAR_discord_alerts_webhook_url_prod: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_PROD }}
      TF_VAR_discord_alerts_webhook_url_reserve: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_RESERVE }}
      TF_VAR_discord_alerts_webhook_url_trading_modes_staging: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_TRADING_MODES_STAGING }}
      TF_VAR_discord_alerts_webhook_url_trading_modes_prod: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_TRADING_MODES_PROD }}
      TF_VAR_discord_alerts_webhook_url_trading_limits: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_TRADING_LIMITS }}
      TF_VAR_discord_alerts_webhook_url_aegis: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_AEGIS }}
      TF_VAR_discord_alerts_webhook_url_catch_all: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_CATCH_ALL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init
        run: terraform init -input=false

      - name: Validate
        run: terraform validate -no-color

      - name: Plan
        id: plan
        # `-detailed-exitcode`: 0 = no changes, 1 = error, 2 = changes present.
        # `set +e` around terraform so exit-2 (changes) doesn't fail the step;
        # capture terraform's exit (not tee's) via PIPESTATUS, emit as a step
        # output for `detect`, and only `exit 1` on real errors.
        # Plan output is teed to `/tmp/tf-plan.txt` for the sticky comment.
        # No `-out=` — saved plan files contain TF_VAR_* values in cleartext
        # (HashiCorp docs); apply re-plans at gate-approval time instead.
        # `-lock-timeout=2m`: speculative PR plans can race a main-branch
        # apply (separate concurrency groups). 2m is short enough not to stall
        # CI on a long apply, long enough to absorb typical lock holds.
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color -input=false -lock-timeout=2m 2>&1 | tee /tmp/tf-plan.txt
          EXITCODE=${PIPESTATUS[0]}
          set -e
          echo "exitcode=$EXITCODE" >> "$GITHUB_OUTPUT"
          case "$EXITCODE" in
            0) echo "Plan: no changes" ;;
            2) echo "Plan: changes detected" ;;
            *) echo "::error::terraform plan failed with exit code $EXITCODE"; exit 1 ;;
          esac

      - name: Detect changes
        id: detect
        if: success()
        env:
          # `exitcode` is a system-controlled enum (0/2 here — 1 already
          # bailed in the previous step). Passing through `env:` rather than
          # inlining `${{ ... }}` in `run:` keeps this aligned with the
          # GitHub Actions workflow-injection hardening pattern.
          EXITCODE: ${{ steps.plan.outputs.exitcode }}
        run: |
          if [ "$EXITCODE" = "2" ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Strip refresh noise from plan output
        # Terraform's plan output starts with a long `Refreshing state...` /
        # `Reading...` / `Read complete after` preamble — one line per state
        # entry, easily dominates the plan view when the stack has dozens of
        # resources. Strip those lines in-place so the Plan summary and the
        # sticky PR comment (both downstream of /tmp/tf-plan.txt) show only
        # the actionable diff. The raw output is still in the workflow log
        # for debugging refresh failures.
        if: always()
        working-directory: /tmp
        run: |
          if [ -f tf-plan.txt ]; then
            grep -vE '^Acquiring state lock|: Refreshing state\.\.\.|: Reading\.\.\.|: Read complete after' tf-plan.txt \
              | awk 'NF || found {found=1; print}' \
              | cat -s > tf-plan.clean.txt
            mv tf-plan.clean.txt tf-plan.txt
          fi

      - name: Plan summary
        # Renders the plan diff at the top of the job page so reviewers
        # don't have to scroll the raw `Plan` step log. Same source data
        # as the sticky PR comment (`/tmp/tf-plan.txt`), but visible on
        # `push` runs too where there's no PR to comment on. `if: always()`
        # so a failed plan still surfaces the error inline.
        if: always()
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          HAS_CHANGES: ${{ steps.detect.outputs.has-changes }}
        run: |
          {
            echo '## Terraform Plan — `alerts/rules/`'
            echo
            if [ "$PLAN_OUTCOME" = "success" ]; then
              if [ "$HAS_CHANGES" = "true" ]; then
                echo '**Status:** 📝 changes detected — merge will trigger apply'
              else
                echo '**Status:** ✅ no changes — merge will skip apply'
              fi
            else
              case "$PLAN_OUTCOME" in
                cancelled) echo '**Status:** ⚠️ plan cancelled' ;;
                skipped)   echo '**Status:** ⚠️ plan skipped' ;;
                *)         echo '**Status:** ❌ plan failed' ;;
              esac
            fi
            echo
            echo '<details open><summary>Plan output</summary>'
            echo
            echo '```hcl'
            tail -c 50000 /tmp/tf-plan.txt 2>/dev/null || echo '(no plan output captured)'
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post plan as sticky PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          # Pass workflow context through env vars instead of `${{ }}`
          # substitution in the inline script to keep the script free of
          # template injection points (defensive — `steps.*.outcome` is an
          # enum controlled by Actions, but env-based passing is the standard
          # hardening pattern).
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          HAS_CHANGES: ${{ steps.detect.outputs.has-changes }}
        with:
          script: |
            const fs = require("fs");
            const planOutput = fs.existsSync("/tmp/tf-plan.txt")
              ? fs.readFileSync("/tmp/tf-plan.txt", "utf8")
              : "(Plan did not produce output — check the workflow logs.)";

            // GitHub PR comment hard cap is ~65KB. A fresh alerts/rules plan
            // (folders + dozens of alert rules + contact points + notification
            // policy tree) can easily blow past that. Tail the last 50KB so
            // the apply/destroy summary stays visible and link to the run for
            // the full log.
            const MAX = 50_000;
            const truncated = planOutput.length > MAX;
            const planBody = truncated
              ? "... (truncated, see workflow logs)\n" + planOutput.slice(-MAX)
              : planOutput;

            const planOutcome = process.env.PLAN_OUTCOME || "unknown";
            const hasChanges = process.env.HAS_CHANGES === "true";
            const statusIcon = planOutcome === "success"
              ? (hasChanges ? "📝" : "✅")
              : "❌";
            const statusText = planOutcome === "success"
              ? (hasChanges ? "changes detected — merge will trigger apply" : "no changes — merge will skip apply")
              : "plan failed";

            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;

            const body =
              `## Terraform Plan — \`alerts/rules/\`\n\n` +
              `**Status:** ${statusIcon} ${statusText}\n\n` +
              `[Full workflow logs](${runUrl})\n\n` +
              `<details><summary>Plan output${truncated ? " (tail)" : ""}</summary>\n\n` +
              `\`\`\`hcl\n${planBody}\n\`\`\`\n` +
              `</details>\n\n` +
              `<!-- alerts-rules-plan-comment -->`;

            // Paginate through all PR comments to find the existing
            // plan-sticky marker. `listComments` caps at 100 per page;
            // on long-lived PRs the marker could sit past page 1 and
            // we'd duplicate-create instead of updating. `paginate`
            // walks every page.
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              },
            );

            const existing = comments.find(c =>
              c.body && c.body.includes("<!-- alerts-rules-plan-comment -->"),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  apply:
    name: Terraform Apply (alerts/rules)
    needs: plan
    # Apply when (a) on main, (b) push or dispatch event, AND (c) plan said
    # there are real changes. When `has-changes=false` the job is skipped
    # entirely — the production-environment approval prompt never fires for
    # no-op merges (the gap that motivated the saved-plan refactor).
    if: >-
      github.ref == 'refs/heads/main'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.plan.outputs.has-changes == 'true'
    # Reuses the existing `production` environment shared with metrics-bridge,
    # aegis, and alerts/infra. The required-reviewer rule on that environment
    # gates each apply behind manual approval.
    environment:
      name: production
      url: https://console.cloud.google.com/home/dashboard?project=mento-terraform-seed-ffac
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      actions: read
    defaults:
      run:
        working-directory: alerts/rules
    env:
      # Provider auth env vars still need to be present at apply time — saved
      # plans don't serialize provider configuration, so init re-evaluates
      # the provider blocks against these values to talk to Grafana/Slack/etc.
      TF_VAR_grafana_service_account_token: ${{ secrets.TF_VAR_GRAFANA_SERVICE_ACCOUNT_TOKEN }}
      TF_VAR_slack_bot_token: ${{ secrets.TF_VAR_SLACK_BOT_TOKEN }}
      TF_VAR_splunk_on_call_alerts_webhook_url: ${{ secrets.TF_VAR_SPLUNK_ON_CALL_ALERTS_WEBHOOK_URL }}
      TF_VAR_discord_alerts_webhook_url_staging: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_STAGING }}
      TF_VAR_discord_alerts_webhook_url_prod: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_PROD }}
      TF_VAR_discord_alerts_webhook_url_reserve: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_RESERVE }}
      TF_VAR_discord_alerts_webhook_url_trading_modes_staging: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_TRADING_MODES_STAGING }}
      TF_VAR_discord_alerts_webhook_url_trading_modes_prod: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_TRADING_MODES_PROD }}
      TF_VAR_discord_alerts_webhook_url_trading_limits: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_TRADING_LIMITS }}
      TF_VAR_discord_alerts_webhook_url_aegis: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_AEGIS }}
      TF_VAR_discord_alerts_webhook_url_catch_all: ${{ secrets.TF_VAR_DISCORD_ALERTS_WEBHOOK_URL_CATCH_ALL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Init
        run: terraform init -input=false

      - name: Apply
        id: apply
        # Re-plans + applies in a single step. The reviewer at the
        # production-environment gate should read this job's plan output
        # before approving — it's the ground truth for what lands.
        # `-lock-timeout=10m`: apply must wait for any in-progress state
        # lock rather than failing the deploy.
        # `-no-color`: keep the output free of ANSI escapes so the apply
        # summary step renders cleanly in the job summary markdown.
        # Output teed to `/tmp/tf-apply.txt` for the apply summary step;
        # PIPESTATUS preserves terraform's exit code over tee's.
        run: |
          set +e
          terraform apply -auto-approve -no-color -input=false -lock-timeout=10m 2>&1 | tee /tmp/tf-apply.txt
          EXITCODE=${PIPESTATUS[0]}
          set -e
          exit "$EXITCODE"

      - name: Strip refresh noise from apply output
        # Same preamble-stripping treatment as the plan step — terraform
        # apply also refreshes state before showing the action plan. See the
        # equivalent step under `plan` for the full rationale.
        if: always()
        working-directory: /tmp
        run: |
          if [ -f tf-apply.txt ]; then
            grep -vE '^Acquiring state lock|: Refreshing state\.\.\.|: Reading\.\.\.|: Read complete after' tf-apply.txt \
              | awk 'NF || found {found=1; print}' \
              | cat -s > tf-apply.clean.txt
            mv tf-apply.clean.txt tf-apply.txt
          fi

      - name: Apply summary
        # Renders the apply output at the top of the job page so reviewers
        # don't have to scroll the raw `Apply` step log to confirm what
        # actually landed. `if: always()` so a failed apply still surfaces
        # the error inline.
        if: always()
        env:
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
        run: |
          {
            echo '## Terraform Apply — `alerts/rules/`'
            echo
            case "$APPLY_OUTCOME" in
              success) echo '**Status:** ✅ applied' ;;
              failure) echo '**Status:** ❌ apply failed' ;;
              *)       printf '**Status:** %s\n' "$APPLY_OUTCOME" ;;
            esac
            echo
            echo '<details open><summary>Apply output</summary>'
            echo
            echo '```terraform'
            tail -c 50000 /tmp/tf-apply.txt 2>/dev/null || echo '(no apply output captured)'
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()
