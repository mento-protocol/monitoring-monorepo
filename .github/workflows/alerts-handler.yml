name: Alerts Handler

# Quality checks for the alerts/infra/onchain-event-handler Cloud Function:
# typecheck + vitest suite + lockfile-drift guard. Lives in its own workflow
# (not folded into ci.yml) because the alerts/ tree was historically Terraform-
# only and ci.yml's `changes` filter has no alerts/** entries — this is the
# gap-closer.
#
# Note: This workflow is NOT part of the `CI / ci` sentinel in ci.yml, so it
# requires a separate branch-protection rule entry to act as a required check.
#
# Lint + knip are intentionally omitted for now — the underlying scripts are
# being stabilized in a parallel commit. Once landed, add them here as
# `pnpm --filter @mento-protocol/alerts-onchain-event-handler lint` +
# `... knip` steps mirroring the ci.yml `bridge` job. TODO.
#
# Third-party actions pinned to commit SHAs per the policy in
# .github/workflows/claude.yml — update via Dependabot (.github/dependabot.yml).

on:
  pull_request:
    branches: [main]
    paths:
      - alerts/infra/onchain-event-handler/**
      - .github/workflows/alerts-handler.yml
  push:
    branches: [main]
    paths:
      - alerts/infra/onchain-event-handler/**
      - .github/workflows/alerts-handler.yml

# Concurrency: on PRs, group by ref so new pushes to a PR cancel in-flight
# runs. On push to main (or any non-PR event), group by SHA so each commit
# gets its own run and main-branch runs never cancel each other. Mirrors
# ci.yml — see that file for the full rationale.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

permissions: read-all

jobs:
  test:
    name: Quality Checks (alerts-onchain-event-handler)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pnpm-install
      - name: Typecheck
        run: pnpm --filter @mento-protocol/alerts-onchain-event-handler typecheck
      - name: Test
        run: pnpm --filter @mento-protocol/alerts-onchain-event-handler test
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()

  lockfile-drift:
    name: Verify package-lock.json is in sync
    # Cloud Build's `npm ci` consumes alerts/infra/onchain-event-handler/
    # package-lock.json for prod deploys. The package is ALSO a pnpm workspace
    # member, so a dev bumping deps via `pnpm install` only updates the root
    # pnpm-lock.yaml — the per-pkg npm lockfile silently drifts and Cloud
    # Build keeps deploying old deps. This job regenerates the npm lockfile
    # in-place and fails if it differs from the committed copy.
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Node only — no pnpm needed; we're regenerating an npm-managed
      # lockfile. Pinning to .node-version keeps the regenerator's npm
      # major in sync with what developers run locally, which keeps
      # `lockfileVersion` stable and avoids spurious diffs.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - name: Check lockfile is in sync
        working-directory: alerts/infra/onchain-event-handler
        run: |
          cp package-lock.json /tmp/committed-lock.json
          rm -rf node_modules package-lock.json
          npm install --package-lock-only --no-audit --no-fund --ignore-scripts
          diff -q /tmp/committed-lock.json package-lock.json || {
            echo "::error::package-lock.json is out of sync with package.json. Regenerate with: cd alerts/infra/onchain-event-handler && rm -rf node_modules package-lock.json && npm install --package-lock-only"
            exit 1
          }
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        if: always()
