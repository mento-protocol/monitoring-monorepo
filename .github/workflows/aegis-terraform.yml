name: Aegis Terraform

# Terraform plan-on-PR + apply-on-merge for `aegis/terraform/` — the Aegis
# Grafana folder, dashboard, and service-health alert group. The stack's GCS
# backend impersonates a seed-project SA (see `aegis/terraform/main.tf`).
# The plan and apply jobs use a read/write split for plan-time blast-radius
# reduction:
#   - apply (on merge) authenticates through the production-infra-only WIF
#     provider as `production-infra-applier@…seed`, then impersonates
#     `org-terraform@…seed` for backend state writes + locking. The applier's
#     service-account-scoped Token Creator grant lives in `terraform/ci-wif.tf`.
#   - PR plans authenticate as the state-only CI SA
#     (`GCP_SERVICE_ACCOUNT_PLAN`) and override backend impersonation to
#     `org-terraform-plan-readonly@…seed`. Trusted-main push/dispatch plans use
#     the dedicated refresh provider, refresh runner, and
#     `org-terraform-refresh-readonly@…seed` backend identity. Both identities
#     are read-only and require `-lock=false`. PR plans receive a
#     validation-safe placeholder `TF_VAR_grafana_service_account_token` and
#     run `-refresh=false`; trusted-main plans keep the real token and full
#     refresh before deciding whether apply needs the `production-infra` gate.
#
# Plan/apply split:
#   - `plan` job runs on every PR + push/dispatch to main. It runs
#     `terraform plan -detailed-exitcode` and emits a `has-changes` job
#     output. On PRs it posts a sticky comment with the plan diff.
#   - `apply` job only runs on push/dispatch to main, only when the plan
#     reported actual changes, and only for stack-root changes or explicit
#     workflow_dispatch. Workflow/notifier-only edits can still plan, but they
#     do not open the `production-infra` Environment gate for unrelated drift.
#
# Note: we intentionally do NOT save the plan as a binary artifact for
# cross-job apply. HashiCorp warns that `terraform plan -out=` "saves
# sensitive data in cleartext in the plan file"
# (https://developer.hashicorp.com/terraform/cli/commands/plan), and the
# TF_VAR_* env block here carries the production Grafana SA token on
# push/dispatch; PR plans intentionally use a placeholder instead.
# Uploading the binary plan as a workflow artifact would expose that secret to
# anyone with `actions:read`. The Environment gate approves the commit and the
# earlier plan. The apply job starts only after approval, then creates and
# applies a later plan, so the current path has a documented drift window.
#
# Quality gating: PR-level fmt/init/validate is already enforced by `infra.yml`
# (matrix module `aegis`). This workflow adds the plan diff comment +
# the apply gate.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - aegis/terraform/**
      - scripts/sanitize-terraform-output.sh
      - scripts/notify-terraform-apply.mjs
      - scripts/verify-github-environment-protection.mjs
      - scripts/verify-github-environment-protection.test.mjs
      - .github/workflows/aegis-terraform.yml
  push:
    branches: [main]
    paths:
      - aegis/terraform/**
      - scripts/sanitize-terraform-output.sh
      - scripts/notify-terraform-apply.mjs
      - scripts/verify-github-environment-protection.mjs
      - scripts/verify-github-environment-protection.test.mjs
      - .github/workflows/aegis-terraform.yml

# PR runs cancel on new pushes to the same PR ref (queue depth of 1 per PR
# is fine — a newer plan supersedes an older one).
#
# Push/dispatch runs share ONE group `<workflow>-deploy` with
# `cancel-in-progress: false`, so concurrent merges queue and apply
# strictly in order. Without this, a SHA-unique group would let two
# close-together merges run `terraform apply` in parallel and the older
# one could roll the state back to stale config.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || 'deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
  # Push/dispatch: queue all pending applies (up to 100) so intermediate
  # main-branch merges don't get silently dropped by GitHub's default
  # `queue: single` behavior (only one pending; newer-pending cancels
  # older). For PR events, keep the default `single` — the cancel-on-new-
  # push semantics there are what we want. `queue: max` + `cancel-in-
  # progress: true` is invalid per GitHub, so the conditional matches the
  # cancel-in-progress conditional above. The bundled actionlint version
  # doesn't recognise the `queue` key yet (added by GitHub in 2025); see
  # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/control-the-concurrency-of-workflows-and-jobs
  # trunk-ignore(actionlint/syntax-check)
  queue: ${{ github.event_name == 'pull_request' && 'single' || 'max' }}

permissions: read-all

jobs:
  plan:
    name: Terraform Plan (aegis/terraform)
    # Fork PRs and Dependabot PRs don't get repository secrets, so the
    # GCP auth step would resolve empty and fail every time.
    # Skip the job in those contexts — the plan is only meaningful when
    # secrets are available. Internal PRs + main pushes run.
    # Machine-authored Sentry-autofix PRs (head branch sentry-autofix/*) are
    # also skipped: `terraform plan` executes PR-head HCL (data "external"
    # runs programs at plan time) while this job holds the read-only plan SA —
    # whose state-bucket access includes cleartext secret values — so an
    # untrusted-in-effect autofix diff must never reach it. Defense in depth
    # behind the autofix diff guard, which already forbids *.tf/*.hcl edits.
    if: >-
      (github.event_name == 'pull_request'
        && github.event.pull_request.head.repo.fork == false
        && github.event.pull_request.user.login != 'dependabot[bot]'
        && !startsWith(github.event.pull_request.head.ref, 'sentry-autofix/'))
      || (github.ref == 'refs/heads/main'
        && (github.event_name == 'push' || github.event_name == 'workflow_dispatch'))
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      actions: read
    defaults:
      run:
        working-directory: aegis/terraform
    outputs:
      has-changes: ${{ steps.detect.outputs.has-changes }}
      stack-changed: ${{ steps.stack_changes.outputs.stack-changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # PR-head HCL is planned in this job; never leave the checkout token
          # in .git/config where plan-time-executed code could read it.
          persist-credentials: false

      - name: Detect stack path changes
        id: stack_changes
        working-directory: ${{ github.workspace }}
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          STACK_PATH: aegis/terraform
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "stack-changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$BASE_SHA" ] || ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            echo "stack-changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$BASE_SHA" "$HEAD_SHA" -- "$STACK_PATH"; then
            echo "stack-changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "stack-changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate PR plan to Google Cloud
        if: github.event_name == 'pull_request'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          # Read-only plan SA: PR plan jobs authenticate as the plan-readonly
          # CI SA so a malicious PR's plan-time data source can't mint tokens
          # for the write-capable deployer. The apply job below uses the
          # production-infra-only provider and applier. See file header +
          # `terraform/ci-wif.tf`.
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_PLAN }}

      - name: Authenticate trusted-main refresh to Google Cloud
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_TERRAFORM_REFRESH_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_REFRESH_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Export PR-safe Terraform inputs
        if: github.event_name == 'pull_request'
        run: printf '%s\n' 'TF_VAR_grafana_service_account_token=pr-plan-dummy-grafana-token' >> "$GITHUB_ENV"

      - name: Export production Terraform inputs
        if: github.event_name != 'pull_request'
        env:
          INPUT_GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.TF_VAR_GRAFANA_SERVICE_ACCOUNT_TOKEN }}
        run: printf '%s\n' "TF_VAR_grafana_service_account_token=${INPUT_GRAFANA_SERVICE_ACCOUNT_TOKEN}" >> "$GITHUB_ENV"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init PR plan backend
        if: github.event_name == 'pull_request'
        run: terraform init -input=false -backend-config="impersonate_service_account=org-terraform-plan-readonly@mento-terraform-seed-ffac.iam.gserviceaccount.com"

      - name: Init trusted-main refresh backend
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: terraform init -input=false -backend-config="impersonate_service_account=org-terraform-refresh-readonly@mento-terraform-seed-ffac.iam.gserviceaccount.com"

      - name: Validate
        run: terraform validate -no-color

      - name: Plan
        id: plan
        # `-detailed-exitcode`: 0 = no changes, 1 = error, 2 = changes present.
        # `set +e` around terraform so exit-2 (changes) doesn't fail the step;
        # capture terraform's exit before sanitizing output, emit as a step
        # output for `detect`, and only `exit 1` on real errors.
        # Plan output is captured raw, sanitized, then written to
        # `/tmp/tf-plan.txt` for logs, the sticky comment, and Slack.
        # No `-out=` — saved plan files contain TF_VAR_* values in cleartext
        # (HashiCorp docs); apply creates a later plan after approval instead.
        # `-lock=false`: neither read-only route can create/delete the GCS lock
        # object, so plan must skip locking. Safe because plan only reads state
        # and re-runs on every push; a skipped lock can't drop work the way a
        # missed apply could. PR plans also pass `-refresh=false` because their
        # Grafana provider token is a placeholder; trusted-main push/dispatch
        # plans keep full refresh with the real token.
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set +e
          if [ "$EVENT_NAME" = "pull_request" ]; then
            terraform plan -detailed-exitcode -no-color -input=false -lock=false -refresh=false > /tmp/tf-plan.raw 2>&1
          else
            terraform plan -detailed-exitcode -no-color -input=false -lock=false > /tmp/tf-plan.raw 2>&1
          fi
          EXITCODE=$?
          set -e
          "${GITHUB_WORKSPACE}/scripts/sanitize-terraform-output.sh" /tmp/tf-plan.raw /tmp/tf-plan.txt
          cat /tmp/tf-plan.txt
          echo "exitcode=$EXITCODE" >> "$GITHUB_OUTPUT"
          case "$EXITCODE" in
            0) echo "Plan: no changes" ;;
            2) echo "Plan: changes detected" ;;
            *) echo "::error::terraform plan failed with exit code $EXITCODE"; exit 1 ;;
          esac

      - name: Detect changes
        id: detect
        if: success()
        env:
          # `exitcode` is a system-controlled enum (0/2 here — 1 already
          # bailed in the previous step). Passing through `env:` rather than
          # inlining `${{ ... }}` in `run:` keeps this aligned with the
          # GitHub Actions workflow-injection hardening pattern.
          EXITCODE: ${{ steps.plan.outputs.exitcode }}
        run: |
          if [ "$EXITCODE" = "2" ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack that Terraform apply is pending
        if: >-
          success()
          && github.ref == 'refs/heads/main'
          && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          && steps.detect.outputs.has-changes == 'true'
          && (github.event_name == 'workflow_dispatch' || steps.stack_changes.outputs.stack-changed == 'true')
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SLACK_BOT_TOKEN: ${{ secrets.TF_VAR_SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: "${{ vars.TERRAFORM_APPLY_SLACK_CHANNEL == '#ci-operations' && '#deploys' || vars.TERRAFORM_APPLY_SLACK_CHANNEL || '#deploys' }}"
          TERRAFORM_PLAN_FILE: /tmp/tf-plan.txt
          TERRAFORM_STACK_LABEL: aegis/terraform
          TERRAFORM_TARGET_ENVIRONMENT: production-infra
        run: node "$GITHUB_WORKSPACE/scripts/notify-terraform-apply.mjs"

      - name: Post plan as sticky PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          # Pass workflow context through env vars instead of `${{ }}`
          # substitution in the inline script to keep the script free of
          # template injection points (defensive — `steps.*.outcome` is an
          # enum controlled by Actions, but env-based passing is the standard
          # hardening pattern).
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          HAS_CHANGES: ${{ steps.detect.outputs.has-changes }}
          STACK_CHANGED: ${{ steps.stack_changes.outputs.stack-changed }}
        with:
          script: |
            const fs = require("fs");
            const planOutput = fs.existsSync("/tmp/tf-plan.txt")
              ? fs.readFileSync("/tmp/tf-plan.txt", "utf8")
              : "(Plan did not produce output — check the workflow logs.)";

            // GitHub PR comment hard cap is ~65KB. Aegis plans are small
            // (one folder + one dashboard module + one service-health alert
            // group) but truncate defensively just in case dashboard JSON
            // grows.
            const MAX = 50_000;
            const truncated = planOutput.length > MAX;
            const planBody = truncated
              ? "... (truncated, see workflow logs)\n" + planOutput.slice(-MAX)
              : planOutput;

            const planOutcome = process.env.PLAN_OUTCOME || "unknown";
            const hasChanges = process.env.HAS_CHANGES === "true";
            const stackChanged = process.env.STACK_CHANGED === "true";
            const statusIcon = planOutcome === "success"
              ? (hasChanges ? (stackChanged ? "📝" : "⚠️") : "✅")
              : "❌";
            const statusText = planOutcome === "success"
              ? (hasChanges
                  ? (stackChanged ? "changes detected — stack change is eligible for apply" : "drift detected — stack path unchanged, apply will skip")
                  : "no changes — merge will skip apply")
              : "plan failed";

            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;

            const body =
              `## Terraform Plan — \`aegis/terraform/\`\n\n` +
              `**Status:** ${statusIcon} ${statusText}\n\n` +
              `[Full workflow logs](${runUrl})\n\n` +
              `<details><summary>Plan output${truncated ? " (tail)" : ""}</summary>\n\n` +
              `\`\`\`hcl\n${planBody}\n\`\`\`\n` +
              `</details>\n\n` +
              `<!-- aegis-terraform-plan-comment -->`;

            // Paginate through all PR comments to find the existing
            // plan-sticky marker. `listComments` caps at 100 per page;
            // on long-lived PRs the marker could sit past page 1 and
            // we'd duplicate-create instead of updating. `paginate`
            // walks every page.
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              },
            );

            const existing = comments.find(c =>
              c.body && c.body.includes("<!-- aegis-terraform-plan-comment -->"),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - uses: Kesin11/actions-timeline@7bf79990b7c09f5dfb570ac30b814ca597bd538e # v3.1.1
        if: always()

  apply:
    name: Terraform Apply (aegis/terraform)
    needs: plan
    # autofix-ci-trust: this job's if: requires github.ref == main plus a
    # push/workflow_dispatch event, so it can never run for ANY pull_request
    # (autofix or otherwise) — its production secrets are unreachable from
    # PR context. See scripts/check-autofix-ci-trust.mjs.
    # Apply when (a) on main, (b) push or dispatch event, (c) plan said
    # there are real changes, AND (d) the stack root changed or a maintainer
    # explicitly dispatched the workflow. Workflow/notifier-only edits can
    # surface drift in the plan without opening the production-infra approval gate.
    if: >-
      github.ref == 'refs/heads/main'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.plan.outputs.has-changes == 'true'
      && (github.event_name == 'workflow_dispatch' || needs.plan.outputs.stack-changed == 'true')
    # Terraform applies use the dedicated `production-infra` environment so
    # required reviewers gate only infrastructure mutations, not routine
    # service deploys.
    environment:
      name: production-infra
      url: https://console.cloud.google.com/home/dashboard?project=mento-terraform-seed-ffac
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      actions: read
      deployments: read
    defaults:
      run:
        working-directory: aegis/terraform
    env:
      # Provider auth env vars still need to be present at apply time — saved
      # plans don't serialize provider configuration, so init re-evaluates
      # the provider blocks against these values to talk to Grafana.
      TF_VAR_grafana_service_account_token: ${{ secrets.TF_VAR_GRAFANA_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify production-infra environment protection
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_ENVIRONMENT_NAME: production-infra
        run: node "$GITHUB_WORKSPACE/scripts/verify-github-environment-protection.mjs"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_PRODUCTION_INFRA_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_PRODUCTION_INFRA_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Init
        run: terraform init -input=false

      - name: Apply
        # The Environment gate has already approved the commit and earlier plan.
        # This step creates and applies a later plan, then records what landed.
        # `-lock-timeout=10m`: apply must wait for any in-progress state
        # lock rather than failing the deploy.
        run: terraform apply -auto-approve -input=false -lock-timeout=10m

      - uses: Kesin11/actions-timeline@7bf79990b7c09f5dfb570ac30b814ca597bd538e # v3.1.1
        if: always()
