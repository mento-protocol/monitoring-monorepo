name: Lighthouse CI

# Core Web Vitals + accessibility regression detection for the ui-dashboard.
# Runs against the Vercel preview deployment for every dashboard-affecting PR
# so regressions are caught before merge rather than after production deploy.
#
# ADVISORY PATH-FILTER SAFETY:
#   This workflow is not ruleset-required, so its workflow-level `paths:`
#   filter mirrors the dashboard inputs that can produce a Vercel preview.
#   The internal `filter` step uses the same paths via dorny/paths-filter and is
#   `continue-on-error: true`. The `decide` step then either runs Lighthouse
#   (dashboard changed) or skips cleanly (no dashboard change). A filter
#   failure falls closed → Lighthouse always runs when detection fails.
#
# VERCEL PREVIEW URL:
#   The workflow polls the GitHub Deployments API (no Vercel token needed) to
#   find the preview URL Vercel posts for the current SHA. It waits up to
#   5 minutes for the deployment to become active. When the dashboard filter
#   says "skip", the Vercel wait + Lighthouse steps are also skipped, keeping
#   run time under 30 s for non-dashboard PRs.
#
# POOL-DETAIL SPLIT:
#   The preview audit keeps the real deployed bundle, Vercel edge, live indexer,
#   and all four routes in view. Its canonical pool URL uses `?lhci=live`; only
#   that route's 1 700 ms LCP assertion is warning-level because repeated
#   same-preview samples showed 927–2 640 ms live scheduling variance. A second
#   production-build fixture audit uses `?lhci=fixture` and blocks at the same
#   1 700 ms ceiling under deterministic delayed-revalidation data. The local
#   fixture remains runnable when Vercel has no preview, ignores the build, or
#   the PR is a fork/Dependabot context without preview secrets.
#
# PR COMMENT + ARTIFACT:
#   lhci autorun with `upload.target: temporary-public-storage` produces public
#   preview report URLs. The sticky PR comment also includes live and fixture
#   pool diagnostics, while the complete `ui-dashboard/reports/lighthouse-pool`
#   directory is uploaded even when either phase fails.

on:
  pull_request:
    branches: [main]
    # Advisory workflow — NOT in the branch ruleset's required checks, so a
    # `paths:` filter is safe (a skipped run cannot leave a *required* check
    # pending). These globs mirror the in-job `filter` step exactly. Most are
    # dashboard paths Vercel builds previews for (ui-dashboard/scripts/
    # vercel-ignore-build.sh); the workflow file itself is included so changes
    # to this gate exercise the secretless fixture even when Vercel correctly
    # skips a preview. Keep this list in sync with the in-job `filters:` block.
    # NOTE: the ignore script also diffs incrementally against the branch's
    # previous deployment, so Vercel can skip a SHA even when these globs
    # match (e.g. a change under ui-dashboard/scripts/ that is not a build
    # input). The wait step honors Vercel's per-SHA "Canceled by Ignored
    # Build Step" status and skips instead of timing out in that case.
    paths:
      - ui-dashboard/**
      - shared-config/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - patches/**
      - .lighthouserc.cjs
      - .github/workflows/lighthouse.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lighthouse:
    # Runs when the advisory workflow-level dashboard paths match. The
    # redundant in-job `filter` step is `continue-on-error: true`, and the
    # `decide` computes the local-fixture and trusted-preview lanes separately:
    #   - fixture=true/filter failure  → run the local fixture (fail-closed)
    #   - preview=true + trusted PR    → also run the secret-bearing preview
    #   - workflow-only/fork/Dependabot → local fixture only
    #   - fixture=false                → no-op skip
    # Preview assertions warn/error per .lighthouserc.cjs; the deterministic
    # fixture owns the blocking pool-detail LCP contract.
    name: Core Web Vitals + accessibility (ui-dashboard)
    # Cannot move to the cheaper ARM runners even if the economics ever
    # favor it: lhci launches Chrome via chrome-launcher, and Google does
    # not publish Chrome (or Chrome for Testing) for linux-arm64, so the
    # ARM runner image has no Chrome to launch. Migrating would require
    # pointing CHROME_PATH at Playwright's arm64 Chromium — a behavior
    # change to the audit browser.
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # The preview phase historically completes in ~5 minutes. The deterministic
    # production-build fixture phase adds a build, browser smoke, and three
    # isolated Lighthouse collections, so keep a separate timeout envelope.
    timeout-minutes: 30
    permissions:
      contents: read
      # Required for the sticky Lighthouse PR comment. The comment is
      # posted via the issues-comments API (`/repos/{repo}/issues/{n}/comments`)
      # but GitHub authorizes writes against a PR's underlying issue
      # only when BOTH `issues: write` AND `pull-requests: write` are
      # granted — the 403 response header is explicit:
      # `x-accepted-github-permissions: issues=write; pull_requests=write`.
      # `pull-requests: write` also satisfies dorny/paths-filter, which
      # only needs read.
      issues: write
      pull-requests: write
      # `deployments: read` lets the job query the GitHub Deployments API to
      # find the Vercel preview URL without needing a Vercel API token.
      deployments: read
      # `statuses: read` lets the wait step read the combined commit status to
      # detect Vercel's "Canceled by Ignored Build Step" verdict. Without it
      # the lookup 403s and (by design) degrades to the timeout path, so the
      # ignored-build skip would silently never engage.
      statuses: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: filter
        # `continue-on-error: true` keeps a failed path-detection step from
        # failing the job; the `decide` step below interprets a missing/failed
        # filter as "run the full gate" (fail-closed).
        continue-on-error: true
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            # Most entries match the paths Vercel actually builds previews for
            # (see ui-dashboard/scripts/vercel-ignore-build.sh#dashboard_paths).
            # The workflow file is intentionally fixture-only: changing the
            # gate must exercise it even though Vercel has no dashboard build
            # input. The wait step detects Vercel's ignored-build verdict while
            # the deterministic fixture continues independently.
            #
            # `.lighthouserc.cjs` is in BOTH lists so config-only PRs (e.g.
            # changing severity from `warn` to `error` or adjusting a budget
            # threshold) actually exercise the gate they're changing.
            # Without it, a budget change merges without empirical validation
            # and the next dashboard PR is the place breakage surfaces.
            fixture:
              - ui-dashboard/**
              - shared-config/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - patches/**
              - .lighthouserc.cjs
              - .github/workflows/lighthouse.yml
            preview:
              - ui-dashboard/**
              - shared-config/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - patches/**
              - .lighthouserc.cjs

      - name: Decide whether to run Lighthouse
        id: decide
        env:
          FILTER_OUTCOME: ${{ steps.filter.outcome }}
          FIXTURE_CHANGED: ${{ steps.filter.outputs.fixture }}
          PREVIEW_CHANGED: ${{ steps.filter.outputs.preview }}
          # Fork PRs do not produce Vercel preview deployments (see
          # docs/deployment.md), so only the local fixture can run there.
          # Same-repo PRs are the only ones that produce previews and the only
          # ones we trust with the bypass secret.
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
          # Dependabot PRs are technically same-repo (head.repo.full_name
          # matches), but GitHub treats them like forked runs: the token is
          # read-only and `secrets.*` are unavailable. The bypass-secret +
          # PR-comment steps would fail with missing secrets and leave the
          # required check blocking routine dependency updates. They still run
          # the secretless deterministic fixture.
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [[ "$FILTER_OUTCOME" != "success" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Path-filter outcome is '$FILTER_OUTCOME' (expected 'success') — failing closed, running the deterministic fixture."
          elif [[ "$FIXTURE_CHANGED" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Dashboard inputs changed — running the deterministic fixture."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "preview=false" >> "$GITHUB_OUTPUT"
            echo "comment=false" >> "$GITHUB_OUTPUT"
            echo "Dashboard code + its Lighthouse inputs unchanged — skipping Lighthouse."
            exit 0
          fi

          if [[ "$PR_AUTHOR" == "dependabot[bot]" ]]; then
            echo "preview=false" >> "$GITHUB_OUTPUT"
            echo "comment=false" >> "$GITHUB_OUTPUT"
            echo "PR from dependabot[bot] — running the secretless fixture and skipping the Vercel preview lane."
          elif [[ -z "$PR_HEAD_REPO" ]]; then
            echo "preview=false" >> "$GITHUB_OUTPUT"
            echo "comment=false" >> "$GITHUB_OUTPUT"
            echo "PR head repository is unavailable — failing closed to the secretless fixture lane."
          elif [[ "$PR_HEAD_REPO" != "$BASE_REPO" ]]; then
            echo "preview=false" >> "$GITHUB_OUTPUT"
            echo "comment=false" >> "$GITHUB_OUTPUT"
            echo "PR from fork '$PR_HEAD_REPO' — running the secretless fixture and skipping the Vercel preview lane."
          else
            echo "comment=true" >> "$GITHUB_OUTPUT"
            if [[ "$FILTER_OUTCOME" != "success" || "$PREVIEW_CHANGED" == "true" ]]; then
              echo "preview=true" >> "$GITHUB_OUTPUT"
              echo "Trusted same-repo PR with preview inputs — running both fixture and Vercel preview lanes."
            else
              echo "preview=false" >> "$GITHUB_OUTPUT"
              echo "Trusted same-repo PR changed only fixture/workflow inputs — running the fixture lane without waiting for Vercel."
            fi
          fi

      - name: Wait for Vercel preview deployment
        id: vercel-url
        if: steps.decide.outputs.preview == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // For pull_request events, context.sha is the synthetic merge commit
            // that GitHub creates — not the PR head commit that Vercel tracks.
            // Use the PR head SHA so the deployment lookup matches what Vercel posted.
            const sha = context.payload.pull_request?.head?.sha ?? context.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maxWaitMs = 5 * 60 * 1000; // 5 minutes
            const pollIntervalMs = 10 * 1000; // 10 seconds
            const start = Date.now();
            const dashboardPaths = [
              "ui-dashboard",
              "shared-config",
              "package.json",
              "pnpm-lock.yaml",
              "pnpm-workspace.yaml",
              "patches",
              ".lighthouserc.cjs",
            ];

            function touchesDashboardPath(file) {
              return dashboardPaths.some(path => file === path || file.startsWith(`${path}/`));
            }

            function addChangedFilePaths(files, file) {
              if (file.filename) files.add(file.filename);
              if (file.previous_filename) files.add(file.previous_filename);
            }

            async function changedFilesBetween(base, head) {
              const files = new Set();
              let compareStatus = "unknown";
              let behindBy = 0;
              const pages = github.paginate.iterator(
                github.rest.repos.compareCommitsWithBasehead,
                {
                  owner,
                  repo,
                  basehead: `${base}...${head}`,
                  per_page: 100,
                },
              );

              for await (const response of pages) {
                compareStatus = response.data.status ?? compareStatus;
                behindBy = Math.max(behindBy, response.data.behind_by ?? 0);
                for (const file of response.data.files ?? []) {
                  addChangedFilePaths(files, file);
                }
              }
              if (behindBy > 0) {
                throw new Error(
                  `compare base is not an ancestor of head (behind_by=${behindBy}, status=${compareStatus})`,
                );
              }
              if (files.size >= 300) {
                throw new Error("GitHub compare response may be truncated at 300 files");
              }
              return [...files];
            }

            async function changedFilesForPullRequest(pullNumber) {
              const files = new Set();
              const pages = github.paginate.iterator(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              });

              for await (const response of pages) {
                for (const file of response.data ?? []) {
                  addChangedFilePaths(files, file);
                }
              }
              if (files.size >= 3000) {
                throw new Error("GitHub PR file response may be truncated at 3000 files");
              }
              return [...files];
            }

            async function successfulPreviewUrl(deployment) {
              const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                owner,
                repo,
                deployment_id: deployment.id,
                per_page: 5,
              });
              const active = statuses.find(s => s.state === "success");
              return active?.environment_url ?? null;
            }

            // Vercel's ignoreCommand (ui-dashboard/scripts/vercel-ignore-build.sh)
            // diffs incrementally against the branch's previous deployment, so it
            // can legitimately skip a SHA even when the branch as a whole touches
            // a path in `dashboardPaths` (e.g. an operator script under
            // ui-dashboard/scripts/ that is not a build input). When it skips, no
            // GitHub Deployment is ever created for the SHA — only a commit
            // status: context "Vercel", state "success", description
            // "Canceled by Ignored Build Step". Without honoring that verdict,
            // this wait step polls for a preview that will never exist and fails
            // by timeout. Treat the status as authoritative: no new preview means
            // no new dashboard bundle to audit, so the (advisory) check skips.
            async function vercelIgnoredBuild() {
              const { data } = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: sha,
                per_page: 100,
              });
              return (data.statuses ?? []).some(
                s =>
                  s.context === "Vercel" &&
                  s.state === "success" &&
                  /ignored build step/i.test(s.description ?? ""),
              );
            }

            async function latestPushTouchedDashboard() {
              const pullRequest = context.payload.pull_request;
              const action = context.payload.action;
              const before = context.payload.before;
              const after = context.payload.after ?? sha;
              // pull_request.synchronize carries the pushed range; opened
              // events may omit it or use an all-zero before SHA.
              if (
                typeof before === "string" &&
                before.length > 0 &&
                !/^0+$/.test(before) &&
                typeof after === "string" &&
                after.length > 0
              ) {
                const files = await changedFilesBetween(before, after);
                return { touched: files.some(touchesDashboardPath), source: `${before}...${after}`, files };
              }

              if (
                (action === "opened" || action === "reopened") &&
                typeof pullRequest?.number === "number"
              ) {
                const files = await changedFilesForPullRequest(pullRequest.number);
                return { touched: files.some(touchesDashboardPath), source: `pull_request#${pullRequest.number}`, files };
              }

              const { data: commit } = await github.rest.repos.getCommit({
                owner,
                repo,
                ref: sha,
              });
              const parent = commit.parents?.[0]?.sha;
              if (!parent) {
                return { touched: true, source: "no-parent-fallback", files: [] };
              }
              const files = await changedFilesBetween(parent, sha);
              return { touched: files.some(touchesDashboardPath), source: `${parent}...${sha}`, files };
            }

            async function findPriorSuccessfulPreviewForCurrentDashboard() {
              const pullRequest = context.payload.pull_request;
              const deploymentArgs = {
                owner,
                repo,
                environment: "Preview",
                per_page: 30,
              };
              if (pullRequest?.head?.ref) {
                deploymentArgs.ref = pullRequest.head.ref;
              }
              const { data: deployments } = await github.rest.repos.listDeployments(deploymentArgs);

              for (const deployment of deployments) {
                if (!deployment.sha || deployment.sha === sha) continue;
                const previewUrl = await successfulPreviewUrl(deployment);
                if (!previewUrl) continue;
                const files = await changedFilesBetween(deployment.sha, sha);
                const dashboardFiles = files.filter(touchesDashboardPath);
                if (dashboardFiles.length === 0) {
                  return {
                    sha: deployment.sha,
                    previewUrl,
                    source: `${deployment.sha}...${sha}`,
                  };
                }
                core.info(
                  `Prior preview ${deployment.sha} is stale for current dashboard inputs; ` +
                    `changed files since that preview: ${dashboardFiles.join(", ")}`,
                );
              }
              return null;
            }

            core.info(`Waiting for Vercel preview deployment for SHA ${sha}...`);

            while (Date.now() - start < maxWaitMs) {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner,
                repo,
                sha,
                environment: "Preview",
                per_page: 10,
              });

              for (const deployment of deployments) {
                const previewUrl = await successfulPreviewUrl(deployment);
                if (previewUrl) {
                  core.info(`Found active Vercel preview: ${previewUrl}`);
                  core.setOutput("preview_url", previewUrl);
                  core.setOutput("skip_lighthouse", "false");
                  return;
                }
              }

              // No preview yet — check whether Vercel has already ruled this
              // SHA out via its Ignored Build Step before polling again. A
              // pending/absent Vercel status means a build may still be
              // starting, so keep polling in that case. A status-API error is
              // treated the same as "no verdict yet" so it cannot bypass the
              // 5-minute timeout backstop below.
              let ignoredBuild = false;
              try {
                ignoredBuild = await vercelIgnoredBuild();
              } catch (error) {
                core.info(
                  `Vercel status lookup failed (will keep polling): ${error instanceof Error ? error.message : String(error)}`,
                );
              }
              if (ignoredBuild) {
                // Do NOT trust the verdict when the PR touches the ignore
                // machinery itself: a buggy (or malicious) edit to the skip
                // logic could make Vercel report "ignored" for a SHA that
                // really changes the dashboard, and silently skipping would
                // suppress the audit exactly when it matters. Deliberately
                // FULL-PR-scoped (not latest-push-scoped): once any commit in
                // the PR modifies the machinery, that modified script is what
                // Vercel runs for every subsequent head, so no head in the PR
                // may vouch for its own skip — even a later push that only
                // touches unrelated files. Falls through to the polling/
                // timeout path, which fails loudly and forces the change to
                // prove itself.
                const ignoreMachineryPaths = [
                  "ui-dashboard/scripts/vercel-ignore-build.sh",
                  "ui-dashboard/vercel.json",
                ];
                try {
                  const pullNumber = context.payload.pull_request?.number;
                  const pullRequestFiles =
                    typeof pullNumber === "number"
                      ? await changedFilesForPullRequest(pullNumber)
                      : (await latestPushTouchedDashboard()).files ?? [];
                  const touchedMachinery = pullRequestFiles.filter(f =>
                    ignoreMachineryPaths.includes(f),
                  );
                  if (touchedMachinery.length > 0) {
                    core.warning(
                      `Vercel reported "Canceled by Ignored Build Step" for ${sha}, but this ` +
                        `push touches the ignore machinery (${touchedMachinery.join(", ")}) — ` +
                        "not trusting the verdict; continuing to poll (will fail loudly on timeout).",
                    );
                    core.info(`No active preview yet — retrying in ${pollIntervalMs / 1000}s...`);
                    await new Promise(r => setTimeout(r, pollIntervalMs));
                    continue;
                  }
                } catch (error) {
                  core.warning(
                    `Could not verify the pushed file list before honoring Vercel's ignored-build ` +
                      `verdict (${error instanceof Error ? error.message : String(error)}) — ` +
                      "not trusting the verdict; continuing to poll.",
                  );
                  core.info(`No active preview yet — retrying in ${pollIntervalMs / 1000}s...`);
                  await new Promise(r => setTimeout(r, pollIntervalMs));
                  continue;
                }
                core.notice(
                  `Vercel canceled the build for ${sha} via its Ignored Build Step — ` +
                    "no preview will be posted for this SHA, so there is no new " +
                    "dashboard bundle to audit. Skipping Lighthouse.",
                );
                try {
                  const priorPreview = await findPriorSuccessfulPreviewForCurrentDashboard();
                  core.info(
                    priorPreview
                      ? `Prior successful preview ${priorPreview.previewUrl} at ${priorPreview.sha} still covers the current dashboard bundle.`
                      : "No prior branch preview exists; the branch has never produced a dashboard-affecting change per Vercel.",
                  );
                } catch (error) {
                  core.info(
                    `Prior-preview lookup skipped: ${error instanceof Error ? error.message : String(error)}`,
                  );
                }
                core.setOutput("skip_lighthouse", "true");
                return;
              }

              core.info(`No active preview yet — retrying in ${pollIntervalMs / 1000}s...`);
              await new Promise(r => setTimeout(r, pollIntervalMs));
            }

            // Timed out. If the current PR synchronization did not touch any
            // dashboard-affecting paths, Vercel intentionally skipped posting
            // a new preview for this head SHA and the previous preview still
            // reflects the dashboard bundle. Treat that case as a clean skip.
            // Fail closed when the comparison cannot prove that.
            try {
              const latestPush = await latestPushTouchedDashboard();
              if (!latestPush.touched) {
                const priorPreview = await findPriorSuccessfulPreviewForCurrentDashboard();
                if (priorPreview === null) {
                  core.info(
                    "Latest push did not touch dashboard inputs, but no prior successful " +
                      "Preview deployment could be proven current for this dashboard bundle.",
                  );
                } else {
                  core.info(
                    `No dashboard-affecting files changed in ${latestPush.source}; ` +
                      `prior successful preview ${priorPreview.previewUrl} at ${priorPreview.sha} ` +
                      `covers ${priorPreview.source}.`,
                  );
                  core.setOutput("skip_lighthouse", "true");
                  return;
                }
              } else {
                core.info(
                  `Latest push ${latestPush.source} touched dashboard-affecting files: ` +
                    latestPush.files.filter(touchesDashboardPath).join(", "),
                );
              }
            } catch (error) {
              core.warning(
                `Could not prove the latest push skipped dashboard inputs: ${
                  error instanceof Error ? error.message : String(error)
                }`,
              );
            }

            // Fail rather than audit a stale branch alias.
            // A branch alias can still resolve to the previous successful
            // deployment for that branch, so falling back would silently pass
            // Lighthouse against stale code and miss the missing current preview.
            core.setFailed(`Timed out waiting for a successful Vercel preview deployment for SHA ${sha}. Check the Vercel deployment logs.`);

      - name: Install dependencies (includes @lhci/cli)
        if: ${{ always() && steps.decide.outputs.run == 'true' }}
        uses: ./.github/actions/pnpm-install

      - name: Install Chromium dependencies
        if: ${{ always() && steps.decide.outputs.run == 'true' }}
        run: |
          # lhci autorun launches Chromium via puppeteer internally.
          # The required system libraries are not present on the runner by default.
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 libnspr4 libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 \
            libxcomposite1 libxdamage1 libxfixes3 libxkbcommon0 libxrandr2

      - name: Run Lighthouse CI
        id: lhci
        if: ${{ steps.decide.outputs.preview == 'true' && steps.vercel-url.outputs.skip_lighthouse != 'true' && steps.vercel-url.outputs.preview_url != '' }}
        env:
          # The bypass secret is passed via lhci's --collect.settings.extraHeaders
          # rather than the URL query string so it does NOT end up in the
          # public lhci report (temporary-public-storage reports render the
          # requested URL verbatim including query params). The secret is
          # also unset from env before lhci spawns to keep PR-controlled
          # `.lighthouserc.cjs` from reading it. The fork + Dependabot guards
          # in `decide` ensure this step only runs for trusted, secret-bearing
          # contexts.
          #
          # `x-vercel-set-bypass-cookie: true` is required for in-browser
          # tooling (puppeteer, Playwright, lhci). Without it, the header
          # bypass authorizes the first request but Chrome strips custom
          # headers on cross-origin navigation (e.g. the SSO redirect Vercel
          # issues on subresources), so the audit lands on the SSO interstitial
          # instead of the dashboard. With the cookie-set header, Vercel
          # responds Set-Cookie on the first 200 and Chrome carries the
          # bypass cookie across all subsequent requests. This matches
          # Vercel's documented Playwright pattern.
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          PREVIEW_URL: ${{ steps.vercel-url.outputs.preview_url }}
        run: |
          set -eo pipefail
          # jq -nc builds the JSON safely. The shell-concat form was fragile —
          # a literal `"` or `\` in BYPASS_SECRET would silently malform the
          # JSON. Vercel secrets are UUIDs today so this is defensive, not a
          # current bug. `--arg secret` shell-quotes the secret as a JSON
          # string; the cookie value stays the literal string `"true"` since
          # HTTP header values are strings.
          BYPASS_HEADER=$(jq -nc --arg secret "${BYPASS_SECRET}" \
            '{"x-vercel-protection-bypass":$secret,"x-vercel-set-bypass-cookie":"true"}')
          unset BYPASS_SECRET
          pnpm exec lhci autorun \
            --collect.url="${PREVIEW_URL}/" \
            --collect.url="${PREVIEW_URL}/pools" \
            --collect.url="${PREVIEW_URL}/volume" \
            --collect.url="${PREVIEW_URL}/pool/42220-0x462fe04b4fd719cbd04c0310365d421d02aaa19e?lhci=live" \
            --collect.settings.extraHeaders="${BYPASS_HEADER}" \
            2>&1 | tee /tmp/lhci-output.txt

      - name: Assert every Lighthouse report's finalUrl matches the dashboard
        id: final_url_guard
        # The accessibility budget is `error`-severity (blocking). If the
        # deployment-protection bypass silently regresses, lhci will happily
        # audit Vercel's SSO interstitial — a minimal page that scores
        # 0.94+ on accessibility — and the gate passes with false confidence.
        #
        # The check parses every `.lighthouseci/lhr-*.json` report's
        # `finalUrl`, then asserts the exact 3-runs × 4-path matrix for `/`,
        # `/pools`, `/volume`, and the canonical Celo pool-detail route on the
        # preview host. The pool request carries `?lhci=live`; the guard counts
        # the exact pathname + query target so a stripped marker cannot bypass
        # the pool assertion pattern. This catches more than the SSO interstitial: a
        # Vercel error page, a mid-deploy 503, a wrong-project deployment, a
        # missing/duplicated run, or any redirect to an unexpected path all
        # fail closed. Previously a stdout grep for `vercel.com/login` only
        # caught the SSO case.
        #
        # `always()` keeps this guard running even when `lhci autorun` exits
        # non-zero. Without it, a hard performance-budget failure (once those
        # graduate from `warn` to `error`) would skip the SSO diagnostic and
        # leave the engineer staring at a generic assertion failure.
        if: ${{ always() && steps.decide.outputs.preview == 'true' && steps.vercel-url.outputs.skip_lighthouse != 'true' && steps.vercel-url.outputs.preview_url != '' }}
        env:
          PREVIEW_URL: ${{ steps.vercel-url.outputs.preview_url }}
        run: node ui-dashboard/scripts/assert-lhci-finalurl.mjs

      - name: Cache Playwright Chromium
        # `playwright install chromium` re-downloads ~130 MB on every run
        # otherwise. The cache key hashes BOTH `ui-dashboard/package.json`
        # (the version range, e.g. `^1.60.0`) AND `pnpm-lock.yaml` (the
        # resolved version pnpm actually picks). Keying on package.json
        # alone misses lockfile-only `@playwright/test` updates within the
        # caret range — in that case the key would stay constant while
        # the Chromium revision Playwright wants flips, so every run
        # restores the stale cache, the install step re-downloads, but
        # actions/cache won't re-save under the already-hit key, so the
        # next run re-downloads again indefinitely. Hashing the lockfile
        # makes the key flip on any real Playwright version bump.
        #
        # `runner.arch` is in the key so a runner-architecture change in
        # either consumer of this cache namespace (this job or ci.yml's ui
        # job) can never restore another arch's Chromium — binaries are
        # arch-specific and a cross-arch restore would fail at exec time,
        # not install time.
        if: ${{ always() && steps.decide.outputs.run == 'true' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.arch }}-${{ hashFiles('ui-dashboard/package.json', 'pnpm-lock.yaml') }}
          # `restore-keys` lets an unrelated lockfile or `package.json`
          # edit still reuse the most recent chromium cache instead of
          # triggering a ~130 MB fresh download. `playwright install` then fast-
          # validates the existing binary against the version it wants
          # (no-op on match, re-download only on a real Playwright
          # version bump).
          restore-keys: |
            playwright-chromium-${{ runner.arch }}-

      - name: Install Playwright Chromium (for fixture + INP measurement)
        # The fixture runner uses `@playwright/test`'s chromium for its delayed
        # breaker-revalidation smoke and as the local LHCI CHROME_PATH fallback.
        # The INP step uses the same existing browser-test dependency rather than
        # puppeteer-core + lighthouse user-flow because (a) zero new workspace
        # deps, (b) web-vitals delivers the same Event-Timing-API INP a real user
        # would see — Lighthouse timespan mode estimates it from main-thread
        # timing.
        #
        # `always()` keeps the fixture and INP gates independent of the preview
        # lhci step's outcome: an accessibility regression (already blocking)
        # shouldn't silently skip either additional signal.
        #
        # On a cache hit (see prior step) this is a fast no-op that just
        # verifies the chromium binary is present.
        if: ${{ always() && steps.decide.outputs.run == 'true' }}
        working-directory: ui-dashboard
        run: pnpm exec playwright install chromium

      - name: Measure canonical pool LCP against deterministic fixture
        id: pool-fixture
        # This phase owns the blocking 1 700 ms pool-detail LCP contract. It
        # builds and starts the real production dashboard against the local
        # Hasura fixture, verifies the delayed breaker revalidation path in a
        # browser, and collects three `?lhci=fixture` Lighthouse runs.
        #
        # It deliberately excludes Vercel edge/network variance, production
        # analytics/Sentry, and live-indexer latency. The preview phase above
        # continues to cover those real deployment surfaces, all non-LCP
        # budgets, and warning-level live pool LCP diagnostics.
        #
        # No Vercel bypass value is passed to this PR-controlled command. The
        # raw secret remains confined to the trusted workflow shell in the
        # preview/INP steps and is unset before their Node processes start.
        if: ${{ always() && steps.decide.outputs.run == 'true' }}
        run: pnpm dashboard:lighthouse:pool-fixture

      - name: Summarize live pool Lighthouse diagnostics
        id: live-pool-diagnostics
        # Run even when preview LHCI or the deterministic fixture fails so the
        # artifact and sticky comment retain the per-run candidate/phase data
        # needed to distinguish app render cost from live scheduling variance.
        # The CLI fails closed on a missing/invalid three-report live pool set.
        if: ${{ always() && steps.decide.outputs.preview == 'true' && steps.vercel-url.outputs.skip_lighthouse != 'true' && steps.vercel-url.outputs.preview_url != '' }}
        run: |
          mkdir -p ui-dashboard/reports/lighthouse-pool
          node ui-dashboard/scripts/lighthouse-pool-diagnostics.mjs \
            --dir .lighthouseci \
            --path '/pool/42220-0x462fe04b4fd719cbd04c0310365d421d02aaa19e?lhci=live' \
            --expected-runs 3 \
            --output-json ui-dashboard/reports/lighthouse-pool/live-diagnostics.json \
            --output-markdown ui-dashboard/reports/lighthouse-pool/live-diagnostics.md

      - name: Upload pool Lighthouse diagnostics
        # Preserve both fixture and live JSON/Markdown even when either audit,
        # the final-URL guard, diagnostics validation, or INP fails.
        if: ${{ always() && steps.decide.outputs.run == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-pool-${{ github.event.pull_request.number }}-${{ github.run_attempt }}
          path: ui-dashboard/reports/lighthouse-pool/
          if-no-files-found: warn
          retention-days: 14

      - name: Measure INP (Playwright + web-vitals)
        id: inp
        # Drives the /pools client surface through a scripted interaction
        # (focus filter input → type → click Apply), captures INP via the
        # web-vitals library injected into the page, and fails the workflow
        # if INP > INP_BUDGET_MS (default 200 — web-vitals' "good"
        # threshold). The script reuses the same bypass headers the lhci
        # step uses; the chromium it launches inherits @playwright/test's
        # multi-process setup (no sandbox single-process workaround needed
        # on GHA runners).
        #
        # Secret handling matches the lhci step: build the bypass headers
        # JSON in trusted workflow shell, `unset BYPASS_SECRET`, then pass
        # only the resolved headers JSON to the PR-controlled script. The
        # raw secret never reaches Node code that's part of the PR diff.
        #
        # `always()` mirrors the audited-page guard: don't silently skip
        # the INP gate when an earlier step (lhci accessibility, the bypass
        # guard) fails.
        if: ${{ always() && steps.decide.outputs.preview == 'true' && steps.vercel-url.outputs.skip_lighthouse != 'true' && steps.vercel-url.outputs.preview_url != '' }}
        env:
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          PREVIEW_URL: ${{ steps.vercel-url.outputs.preview_url }}
        run: |
          set -eo pipefail
          BYPASS_HEADERS_JSON=$(jq -nc --arg secret "${BYPASS_SECRET}" \
            '{"x-vercel-protection-bypass":$secret,"x-vercel-set-bypass-cookie":"true"}')
          unset BYPASS_SECRET
          BYPASS_HEADERS_JSON="$BYPASS_HEADERS_JSON" node ui-dashboard/scripts/measure-inp.mjs

      - name: Post Lighthouse results as PR comment
        if: ${{ always() && steps.decide.outputs.comment == 'true' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          LHCI_STEP_OUTCOME: ${{ steps.lhci.outcome }}
          FIXTURE_STEP_OUTCOME: ${{ steps.pool-fixture.outcome }}
          LIVE_DIAGNOSTICS_OUTCOME: ${{ steps.live-pool-diagnostics.outcome }}
          FINAL_URL_GUARD_OUTCOME: ${{ steps.final_url_guard.outcome }}
          INP_STEP_OUTCOME: ${{ steps.inp.outcome }}
          PREVIEW_EXPECTED: ${{ steps.decide.outputs.preview }}
          PREVIEW_SKIPPED: ${{ steps.vercel-url.outputs.skip_lighthouse }}
          VERCEL_WAIT_OUTCOME: ${{ steps.vercel-url.outcome }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const { formatLighthouseStatus } = require(
              path.join(
                process.env.GITHUB_WORKSPACE,
                "ui-dashboard/scripts/lighthouse-comment-status.cjs",
              ),
            );
            const lhciOutput = fs.existsSync("/tmp/lhci-output.txt")
              ? fs.readFileSync("/tmp/lhci-output.txt", "utf8")
              : "(No lhci output captured)";

            // Extract report URLs from lhci output (temporary-public-storage URLs)
            const reportUrls = [...lhciOutput.matchAll(/https:\/\/storage\.googleapis\.com\/lighthouse-infrastructure\.appspot\.com\/reports\/\S+\.html/g)]
              .map(m => m[0]);

            const previewUrl = "${{ steps.vercel-url.outputs.preview_url }}";
            const previewExpected = process.env.PREVIEW_EXPECTED === "true";
            const previewSkipped = process.env.PREVIEW_SKIPPED === "true";
            const auditedPaths = [
              "/",
              "/pools",
              "/volume",
              "/pool/42220-0x462fe04b4fd719cbd04c0310365d421d02aaa19e?lhci=live",
            ];
            const diagnosticsDir = path.join(
              process.env.GITHUB_WORKSPACE,
              "ui-dashboard/reports/lighthouse-pool",
            );
            const readDiagnostics = (filename, label) => {
              const reportPath = path.join(diagnosticsDir, filename);
              if (!fs.existsSync(reportPath)) {
                return `### ${label}\n\n_Diagnostics unavailable; inspect the workflow logs and artifact step._\n\n`;
              }
              return `### ${label}\n\n${fs.readFileSync(reportPath, "utf8").trim()}\n\n`;
            };

            let body = `## Lighthouse CI Results\n\n`;
            if (previewUrl) {
              body += `### Audited preview pages\n`;
              body += auditedPaths
                .map(path => `- [\`${path}\`](${previewUrl}${path})`)
                .join("\n");
              body += "\n\n";
            } else {
              body +=
                "The Vercel preview lane was unavailable or not required. " +
                "The deterministic production-build fixture still audited the canonical pool target.\n\n";
            }

            if (reportUrls.length > 0) {
              body += `### Reports\n`;
              reportUrls.forEach((url, i) => {
                body += `- [Median report ${i + 1}](${url})\n`;
              });
              body += "\n";
            }

            // Use the actual step outcome, not presentation glyphs in LHCI's
            // terminal output. Hard assertion failures use `✘`, while the old
            // parser counted only `❌` and could label a red run as warnings.
            const previewStatus = formatLighthouseStatus({
              stepOutcome: process.env.LHCI_STEP_OUTCOME,
              lhciOutput,
            });
            const fixtureOutcome = process.env.FIXTURE_STEP_OUTCOME;
            const liveDiagnosticsOutcome = process.env.LIVE_DIAGNOSTICS_OUTCOME;
            const finalUrlGuardOutcome = process.env.FINAL_URL_GUARD_OUTCOME;
            const inpOutcome = process.env.INP_STEP_OUTCOME;
            const fixtureOnly = !previewExpected || previewSkipped;
            const jobStatus =
              fixtureOutcome !== "success"
                ? "❌ Failed"
                : fixtureOnly
                  ? "✅ Passed (deterministic fixture only)"
                  : liveDiagnosticsOutcome === "success" &&
                      finalUrlGuardOutcome === "success" &&
                      inpOutcome === "success"
                    ? previewStatus
                    : "❌ Failed";

            body += `**Status:** ${jobStatus}\n\n`;
            body += `- Vercel preview wait: \`${process.env.VERCEL_WAIT_OUTCOME ?? "unknown"}\`\n`;
            body += `- Preview Lighthouse: \`${process.env.LHCI_STEP_OUTCOME ?? "unknown"}\`\n`;
            body += `- Preview final-URL guard: \`${finalUrlGuardOutcome ?? "unknown"}\`\n`;
            body += `- Deterministic pool fixture: \`${fixtureOutcome ?? "unknown"}\`\n`;
            body += `- Live pool diagnostics: \`${liveDiagnosticsOutcome ?? "unknown"}\`\n`;
            body += `- Preview INP: \`${inpOutcome ?? "unknown"}\`\n\n`;
            if (previewUrl) {
              body += readDiagnostics(
                "live-diagnostics.md",
                "Live preview pool diagnostics (LCP warning contract)",
              );
            }
            body += readDiagnostics(
              "fixture-diagnostics.md",
              "Deterministic production-fixture pool diagnostics (blocking contract)",
            );
            body += `<details><summary>Raw lhci output</summary>\n\n\`\`\`\n${lhciOutput.slice(0, 8000)}\n\`\`\`\n</details>\n`;
            body += `\n<!-- lighthouse-ci-comment -->`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body.includes("<!-- lighthouse-ci-comment -->"));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
