name: PR Description

# Enforces the repo PR-description standard (AGENTS.md "PR description standard"
# + .github/PULL_REQUEST_TEMPLATE.md): every PR body must lead with
# `## The Problem` and `## The Solution`, and must not still contain the
# unfilled template placeholders. The `## Deferrals` section is OPTIONAL —
# omit it when nothing is deferred; when present it must say "None" or link a
# GitHub issue per item (for everything knowingly deferred from the PR).
#
# REQUIRED-STATUS SAFETY: no workflow-level `paths:` filter — this is meant to
# run on every PR so it can be a required status (AGENTS.md: required-status
# workflows MUST NOT use `paths:`). It re-runs on `edited` (so fixing the body
# clears it) and on `synchronize` (so the status re-attaches to each new head
# commit). Draft PRs and Dependabot PRs are skipped.

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: PR description format
    # Skip drafts (work-in-progress) and Dependabot (auto-generated bodies).
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    steps:
      - name: Validate PR description
        # Body is passed via env (never interpolated into the script) to avoid
        # shell injection from PR content.
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          # 1) Empty body — one clean error, fail fast (before the heading checks
          #    so we don't also emit "missing The Problem/The Solution").
          if [ -z "${PR_BODY//[[:space:]]/}" ]; then
            echo "::error::PR description is empty. It must start with '## The Problem' then '## The Solution' (AGENTS.md 'PR description standard')."
            exit 1
          fi

          # 2) Unfilled template placeholders from .github/PULL_REQUEST_TEMPLATE.md.
          if grep -qE '\[Plain-English problem|\[Simple explanation of how|\[Implementation details, invariants|\[Commands and results' <<<"$PR_BODY"; then
            echo "::error::PR description still contains unfilled template placeholders — replace the bracketed prompts with real content."
            exit 1
          fi

          # 3) The description must START with the two mandated sections, exactly
          #    and in order (AGENTS.md "PR description standard").
          #
          #    For the OPENING check, strip only HTML comments (so the template's
          #    markdownlint pragma is allowed) — NOT code fences: a leading code
          #    fence is real content before the headings and must be rejected.
          comment_stripped=$(awk '
            comment { if ($0 ~ /-->/) comment = 0; next }
            /<!--/ && $0 !~ /-->/ { comment = 1; next }
            $0 ~ /^[[:space:]]*<!--.*-->[[:space:]]*$/ { next }
            { print }
          ' <<<"$PR_BODY")
          # The first non-blank line must be exactly '## The Problem' (rejects
          # leading prose, a '# Summary' H1, a leading code fence, or
          # '## The Problem extra'). Case-exact, exact heading line.
          firstline=$(grep -vE '^[[:space:]]*$' <<<"$comment_stripped" | sed -n '1p' || true)
          # For the SECOND section, also strip code fences so an example '##' line
          # inside a fence (after the first heading) isn't taken as the heading.
          fence_stripped=$(awk '
            BEGIN { fence = 0 }
            $0 ~ /^[[:space:]]*(```|~~~)/ { fence = ! fence; next }
            fence { next }
            { print }
          ' <<<"$comment_stripped")
          second=$(grep -E '^##[[:space:]]' <<<"$fence_stripped" | sed -n '2p' || true)
          if ! grep -qE '^##[[:space:]]+The Problem[[:space:]]*$' <<<"$firstline" \
             || ! grep -qE '^##[[:space:]]+The Solution[[:space:]]*$' <<<"$second"; then
            echo "::error::PR description must START with '## The Problem' then '## The Solution' as its first two sections — exact title-case, exact heading lines, in order, with no content before (only HTML comments may precede '## The Problem'). See AGENTS.md 'PR description standard' / .github/PULL_REQUEST_TEMPLATE.md."
            exit 1
          fi

          # 4) Deferral declaration (AGENTS.md "Deferral rule"): the `## Deferrals`
          #    section is OPTIONAL. When it is omitted, the PR is treated as
          #    deferring nothing — there is no need to write the section just to
          #    say "None". When the section IS present, it must either say "None"
          #    or reference at least one GitHub issue (#123 or a full issues URL):
          #    that keeps every knowing deferral carrying its own issue link. The
          #    checks below operate on fence_stripped (comments + code fences
          #    removed) so an example heading or issue ref inside a fence or the
          #    template's instructional comment can't satisfy the check.
          #    The section is OPTIONAL: a body with no Deferrals heading at all
          #    passes (nothing was deferred). But a near-miss heading
          #    (`### Deferrals`, `## Deferrals:`, `##Deferrals`,
          #    `## Deferrals.`, `## Deferrals — later`) must NOT silently pass —
          #    otherwise an unlinked deferred section under a malformed heading
          #    slips through. The "Deferrals-style heading" matcher allows any
          #    `#`-run with optional space, then `Deferrals` followed by ANY
          #    non-word character or EOL — so a missing space (`##Deferrals`)
          #    and any trailing punctuation/words are all caught, while a
          #    genuinely different word (`## DeferralsX`, `## Deferred work`) is
          #    not flagged. We reject EVERY non-canonical Deferrals heading
          #    first, INDEPENDENTLY of whether a canonical `## Deferrals` also
          #    exists — a body can carry both a valid `## Deferrals` section and
          #    a separate malformed one, and validating only the canonical
          #    section would let the malformed one bypass the guard. The
          #    `[[:space:]]{0,3}` prefix matches CommonMark heading indentation
          #    (1–3 leading spaces still render as a heading; 4+ is a code block
          #    and correctly not treated as a Deferrals section), so an indented
          #    ` ## Deferrals.` can't slip past the matcher either.
          deferrals_style=$(grep -E '^[[:space:]]{0,3}#{1,6}[[:space:]]*Deferrals([^[:alnum:]_]|$)' <<<"$fence_stripped" || true)
          near_miss=$(grep -vE '^##[[:space:]]+Deferrals[[:space:]]*$' <<<"$deferrals_style" || true)
          if [ -n "$near_miss" ]; then
            echo "::error::PR description has a Deferrals-style heading that isn't exactly '## Deferrals'. Every Deferrals heading must be exactly '## Deferrals' (H2, no trailing punctuation or extra words), or be removed if nothing was knowingly deferred. Offending heading(s): $(head -3 <<<"$near_miss" | tr '\n' ' '). See AGENTS.md 'Deferral rule'."
            exit 1
          fi
          if ! grep -qE '^##[[:space:]]+Deferrals[[:space:]]*$' <<<"$fence_stripped"; then
            echo "PR description OK — opens with '## The Problem' then '## The Solution', no placeholders, no Deferrals section (nothing deferred)."
            exit 0
          fi
          # canonical heading present — fall through to strict per-item validation below
          deferrals=$(awk '
            /^##[[:space:]]+Deferrals[[:space:]]*$/ { insec = 1; next }
            insec && /^##[[:space:]]/ { insec = 0 }
            insec { print }
          ' <<<"$fence_stripped")
          # The gate validates ITEMS: list bullets (`- …` / `* …`) plus
          # standalone `None` lines. Everything else in the section —
          # wrapped continuation lines, generated trailers like the
          # `🤖 Generated with …` footer or a bot summary — is ignored, so
          # metadata appended after a final `## Deferrals` section can't
          # block a valid body. Rules:
          #   - at least one item must exist;
          #   - every item must either be exactly `None` (optional trailing
          #     period) or reference a GitHub issue (#123 / issues URL).
          # That makes each knowing deferral carry its own issue link — one
          # linked item can't cover an untracked sibling — while a leftover
          # `- None` next to real linked items stays harmless, and prose
          # merely containing the word "none" never passes.
          none_re='^[[:space:]]*([-*][[:space:]]+)?[Nn][Oo][Nn][Ee][[:space:]]*\.?[[:space:]]*$'
          issue_re='#[0-9]+|github\.com/[^[:space:]]+/issues/[0-9]+'
          items=$(grep -E '^[[:space:]]*[-*][[:space:]]+[^[:space:]]' <<<"$deferrals" || true)
          standalone_none=$(grep -E "$none_re" <<<"$deferrals" || true)
          if [ -z "$items" ] && [ -z "$standalone_none" ]; then
            echo "::error::The '## Deferrals' section must list its content as items: '- None' when nothing was knowingly deferred, or one '- #123 …' / issues-URL item per deferral. Create the issue first (problem description + solution ideas if you have them), then link it here."
            exit 1
          fi
          bad_items=$(grep -vE "$none_re" <<<"$items" | grep -vE "$issue_re" || true)
          if [ -n "$bad_items" ]; then
            echo "::error::Every item in '## Deferrals' must either be 'None' or reference a GitHub issue (#123 or an issues URL) — one linked item does not cover an untracked sibling. Missing issue reference on: $(head -3 <<<"$bad_items" | tr '\n' ' ')"
            exit 1
          fi

          echo "PR description OK — opens with '## The Problem' then '## The Solution', no placeholders, deferrals declared."
