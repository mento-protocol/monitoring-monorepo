name: PR Description

# Enforces the repo PR-description standard (AGENTS.md "PR description standard"
# + .github/PULL_REQUEST_TEMPLATE.md): every PR body must lead with
# `## The Problem` and `## The Solution`, and must not still contain the
# unfilled template placeholders. The `## Deferrals` section is OPTIONAL —
# omit it when nothing is deferred; when present it must say "None" or link a
# GitHub issue per item (for everything knowingly deferred from the PR).
#
# REQUIRED-STATUS SAFETY: no workflow-level `paths:` filter — this is meant to
# run on every PR so it can be a required status (AGENTS.md: required-status
# workflows MUST NOT use `paths:`). It re-runs on `edited` (so fixing the body
# clears it) and on `synchronize` (so the status re-attaches to each new head
# commit). Draft PRs and Dependabot PRs are skipped.

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: PR description format
    # Skip drafts (work-in-progress) and Dependabot (auto-generated bodies).
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    steps:
      - name: Checkout trusted validator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: trusted-base
      - name: Checkout bootstrap validator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-head
      - name: Validate PR description
        # Body is passed via env (never interpolated into the script) to avoid
        # shell injection from PR content.
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if [ -f trusted-base/scripts/check-pr-description.mjs ]; then
            node trusted-base/scripts/check-pr-description.mjs
          elif [ -f pr-head/scripts/check-pr-description.mjs ]; then
            echo "::warning::Trusted PR-description validator missing on target branch; using PR copy only for the bootstrap PR that introduces the script."
            node pr-head/scripts/check-pr-description.mjs
          else
            echo "::error::PR-description validator is missing from both the target branch and PR head."
            exit 1
          fi
