packages:
  - shared-config
  - indexer-envio
  - ui-dashboard
  - metrics-bridge
  - integration-probes
  - aegis
  - alerts/infra/onchain-event-handler
  - alerts/infra/oncall-announcer
  - governance-watchdog

catalog:
  # Single source of truth for viem. ui-dashboard/metrics-bridge reference it
  # via "catalog:"; indexer-envio, aegis, governance-watchdog and the alerts
  # handler are also built as standalone source roots outside this workspace,
  # so they keep literal pins; scripts/version-skew-check.mjs enforces they
  # stay equal to this entry.
  viem: 2.50.4

# package.json#pnpm.overrides carries bounded undici security pins for the 6.x
# Discord path and the 7.x jsdom path. Keep them bounded: unbounded range
# overrides forward-resolve the whole graph to undici 8.x on fresh installs,
# which broke Discord delivery (#831/#833/#837). Standalone deploy roots such
# as governance-watchdog need their own matching 6.x pin because Cloud Build
# installs them from their package-local lockfiles.

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@mento-protocol/*"
  - envio-cloud
  - "@envio-dev/envio-cloud-*"
  # Security override floors for the 2026-06-15 advisory batch may be younger
  # than the 3-day release-age gate.
  - "@babel/core"
  - esbuild
  - "@esbuild/*"
  - form-data
  - js-yaml
  - multer@2.2.0
  - protobufjs
  - tar
  - undici@7.28.0
  - vite

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

onlyBuiltDependencies:
  - "@nestjs/core"
  - envio-cloud
  - "@sentry/cli"
  - es5-ext
  - esbuild
  - rescript
