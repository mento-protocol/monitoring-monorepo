packages:
  - shared-config
  - indexer-envio
  - ui-dashboard
  - metrics-bridge
  - integration-probes
  - aegis
  - alerts/infra/onchain-event-handler
  - alerts/infra/oncall-announcer
  - governance-watchdog

catalog:
  # Single source of truth for viem. ui-dashboard/metrics-bridge reference it
  # via "catalog:"; indexer-envio, aegis, governance-watchdog and the alerts
  # handler are also built as standalone source roots outside this workspace,
  # so they keep literal pins; scripts/version-skew-check.mjs enforces they
  # stay equal to this entry.
  viem: 2.50.4

# No undici override on purpose (overrides live in package.json#pnpm.overrides,
# which can't carry comments): discord.js/@discordjs/rest pin undici exactly
# (6.24.1), and the other root-graph consumers' own ranges (@vercel/blob ^6.23.0,
# jsdom ^7.24.5) resolve at or above the 6.24.0/7.24.0 advisory floor from the
# 2026-03 GHSA batch. A range override forward-resolves the whole graph to
# undici 8.x on fresh installs, which broke Discord delivery (#831/#833/#837).
# If a future undici advisory lands, bump the consumers instead of re-adding a
# blanket override.

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@mento-protocol/*"
  - envio-cloud
  - "@envio-dev/envio-cloud-*"
  # Security override floors for the 2026-06-15 advisory batch may be younger
  # than the 3-day release-age gate.
  - "@babel/core"
  - esbuild
  - "@esbuild/*"
  - form-data
  - js-yaml
  - protobufjs
  - tar
  - vite

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

onlyBuiltDependencies:
  - "@nestjs/core"
  - envio-cloud
  - "@sentry/cli"
  - es5-ext
  - esbuild
  - rescript
