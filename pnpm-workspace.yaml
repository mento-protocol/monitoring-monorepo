packages:
  - shared-config
  - indexer-envio
  - ui-dashboard
  - metrics-bridge
  - integration-probes
  - aegis
  - alerts/infra/onchain-event-handler
  - alerts/infra/oncall-announcer
  - governance-watchdog

catalog:
  # Single source of truth for viem. ui-dashboard/metrics-bridge reference it
  # via "catalog:"; indexer-envio, aegis, governance-watchdog and the alerts
  # handler are also built as standalone source roots outside this workspace,
  # so they keep literal pins; scripts/version-skew-check.mjs enforces they
  # stay equal to this entry.
  viem: 2.50.4

# pnpm-workspace.yaml overrides carry bounded undici security pins for root
# workspace consumers such as @vercel/blob/jsdom. Keep them bounded: unbounded
# range overrides forward-resolve the whole graph to undici 8.x on fresh
# installs, which broke Discord delivery (#831/#833/#837). Keep standalone
# deploy roots on narrow runtime dependencies instead of forcing incompatible
# transitive transport versions.

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@mento-protocol/*"
  - envio-cloud
  - "@envio-dev/envio-cloud-*"
  # Security override floors may be younger than the 3-day release-age gate.
  - "@babel/core"
  - brace-expansion
  - esbuild
  - "@esbuild/*"
  - fast-uri
  - form-data
  - js-yaml
  - multer@2.2.0
  # July 2026 security releases: Next 16.2.11 and Auth.js 5.0.0-beta.32.
  - next@16.2.11
  - "@next/env@16.2.11"
  - "@next/swc-darwin-arm64@16.2.11"
  - "@next/swc-darwin-x64@16.2.11"
  - "@next/swc-linux-arm64-gnu@16.2.11"
  - "@next/swc-linux-arm64-musl@16.2.11"
  - "@next/swc-linux-x64-gnu@16.2.11"
  - "@next/swc-linux-x64-musl@16.2.11"
  - "@next/swc-win32-arm64-msvc@16.2.11"
  - "@next/swc-win32-x64-msvc@16.2.11"
  - next-auth@5.0.0-beta.32
  - "@auth/core@0.41.3"
  # GHSA-r28c-9q8g-f849: first patched PostCSS release (2026-07-24).
  - postcss@8.5.18
  - protobufjs
  - tar
  - undici@7.28.0
  - vite

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

onlyBuiltDependencies:
  - "@nestjs/core"
  - envio-cloud
  - "@sentry/cli"
  - es5-ext
  - esbuild
  - rescript

# Root pnpm settings live here for pnpm 11+.
packageConfigs:
  # indexer-envio pins Envio CLI/runtime versions exactly; pnpm 11 ignores
  # non-auth package .npmrc settings, so keep the policy in the workspace file.
  "@mento-protocol/indexer-envio":
    saveExact: true

overrides:
  "envio>react": 19.2.6
  # GHSA-f88m-g3jw-g9cj: stable Next 16.2.x still requests sharp ^0.34.5.
  # Remove once the supported stable Next line selects sharp >=0.35.0.
  "sharp@<0.35.0": 0.35.3
  "flatted@<3.4.2": 3.4.2
  "brace-expansion@>=2.0.0 <3": 2.1.2
  "brace-expansion@>=5.0.0 <6": 5.0.7
  # GHSA-r28c-9q8g-f849: <=8.5.17 can disclose arbitrary source-map files.
  "postcss@<8.5.18": 8.5.18
  "picomatch@>=4.0.0 <4.0.4": 4.0.4
  "vite@>=8.0.0 <8.0.16": 8.0.16
  "@grpc/grpc-js": 1.14.4
  "esbuild": 0.28.1
  "@babel/core@>=7.0.0 <7.29.6": 7.29.6
  "body-parser@<1.20.3": 1.20.3
  "path-to-regexp@<0.1.13": 0.1.13
  "fast-uri@<3.1.4": 3.1.4
  "express@<4.20.0": 4.22.1
  "form-data@<2.5.6": 2.5.6
  "form-data@>=4.0.0 <4.0.6": 4.0.6
  "@istanbuljs/load-nyc-config>js-yaml": 4.3.0
  "@lhci/utils>js-yaml": 4.3.0
  "js-yaml@>=4.0.0 <4.3.0": 4.3.0
  "protobufjs@>=7.0.0 <7.6.5": 7.6.5
  "qs@<6.15.2": 6.15.2
  "cookie@<0.7.0": 0.7.2
  "send@<0.19.0": 0.19.2
  "serve-static@<1.16.0": 1.16.3
  "@eslint/eslintrc@<3.3.5": 3.3.5
  "ajv@^6.0.0": ^6.14.0
  "ajv@^8.0.0": ^8.18.0
  "body-parser@>=2.0.0 <2.2.1": 2.2.1
  "brace-expansion@^1.0.0": 1.1.16
  "cron": 4.3.4
  "diff@^4.0.0": ^4.0.4
  "file-type@^21.0.0": ^21.3.2
  "handlebars@<4.7.9": 4.7.9
  "lodash@>=4.0.0 <4.17.23": 4.18.1
  "minimatch@^3.0.0": ^3.1.4
  "minimatch@^9.0.0": ^9.0.7
  "minimatch@^10.0.0": ^10.2.3
  "multer@<2.2.0": 2.2.0
  "@opentelemetry/core@<2.8.0": 2.8.0
  "path-to-regexp@^8.0.0": ^8.4.0
  "picomatch@^2.0.0": ^2.3.2
  "@trunkio/launcher>tar": 7.5.19
  "tar@>=7.0.0 <7.5.19": 7.5.19
  "@lhci/cli>tmp": 0.2.7
  "external-editor>tmp": 0.2.7
  "uuid@<11.1.1": 11.1.1
  "undici@>=7.23.0 <7.28.0": 7.28.0
  "webpack@>=5.0.0 <5.104.1": 5.106.2
  "lighthouse>ws": 7.5.11
  "ws@>=8.0.0 <8.21.0": 8.21.0
  "undici@<6.27.0": 6.27.0
  "yaml@^2.0.0": ^2.8.3

patchedDependencies:
  "@lhci/utils@0.15.1": patches/@lhci__utils@0.15.1.patch
  blamer@1.0.7: patches/blamer@1.0.7.patch

# pnpm 11 records dependency build-script policy explicitly.
allowBuilds:
  "@nestjs/core": true
  "@sentry/cli": true
  "envio-cloud": true
  "es5-ext": true
  "esbuild": true
  "protobufjs": false
  "rescript": true
  "sharp": false
  "unrs-resolver": false
