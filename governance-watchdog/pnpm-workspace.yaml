packages:
  - .

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@mento-protocol/*"
  - envio-cloud
  - "@envio-dev/envio-cloud-*"
  # esbuild@0.28.1 patches GHSA-gv7w-rqvm-qjhr (high); exclude so the security
  # override is not blocked by the 3-day minimumReleaseAge gate. The @esbuild/*
  # platform packages are optional deps installed alongside the main esbuild
  # package and share the same release timestamp.
  - esbuild
  - "@esbuild/*"
  # Security override floors may be younger than the 3-day release-age gate.
  - brace-expansion
  - fast-uri
  - js-yaml
  # GHSA-r28c-9q8g-f849: first patched PostCSS release (2026-07-24).
  - postcss@8.5.18
  - protobufjs

overrides:
  "brace-expansion@^1.0.0": 1.1.16
  "brace-expansion@>=2.0.0 <3": 2.1.2
  "brace-expansion@>=5.0.0 <6": 5.0.7
  # Exact pin because ranges resolve forward on fresh installs. 3.4.2 is what
  # both the standalone npm lockfile and this lockfile resolve today.
  flatted: 3.4.2
  # esbuild: tsx@4.22.4 still pins esbuild@0.28.0 (GHSA-gv7w-rqvm-qjhr, high).
  # Patched floor is 0.28.1; pin exact so fresh installs don't drift.
  esbuild: 0.28.1
  # Google Cloud deps still resolve vulnerable qs/uuid ranges. Pin the
  # vulnerable ranges narrowly instead of overriding whole packages.
  "fast-uri@<3.1.4": 3.1.4
  # GHSA-r28c-9q8g-f849: <=8.5.17 can disclose arbitrary source-map files.
  "postcss@<8.5.18": 8.5.18
  "qs@<6.15.2": 6.15.2
  "uuid@<11.1.1": 11.1.1
  "protobufjs@>=7.0.0 <7.6.5": 7.6.5
  "js-yaml@>=4.0.0 <4.3.0": 4.3.0
  # isows resolves ws@8.20.1 through viem; 8.21.0 contains the GHSA-96hv-2xvq-fx4p
  # fix and stays compatible with isows' ws peer range.
  "ws@<8.21.0": 8.21.0
  # Keep standalone Cloud Build installs on the Node 24 type surface even for
  # Express transitive type packages with broad @types/node ranges.
  "@types/node": 24.13.2

# pnpm 11 records dependency build-script policy explicitly.
allowBuilds:
  esbuild: true
  protobufjs: false
