packages:
  - .

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@mento-protocol/*"
  - envio-cloud
  - "@envio-dev/envio-cloud-*"
  # esbuild@0.28.1 patches GHSA-gv7w-rqvm-qjhr (high); exclude so the security
  # override is not blocked by the 3-day minimumReleaseAge gate. The @esbuild/*
  # platform packages are optional deps installed alongside the main esbuild
  # package and share the same release timestamp.
  - esbuild
  - "@esbuild/*"
  # Security override floors for the 2026-06-15 advisory batch may be younger
  # than the 3-day release-age gate.
  - protobufjs

overrides:
  # Exact pin because ranges resolve forward on fresh installs. 3.4.2 is what
  # both the standalone npm lockfile and this lockfile resolve today.
  flatted: 3.4.2
  # esbuild: tsx@4.22.4 still pins esbuild@0.28.0 (GHSA-gv7w-rqvm-qjhr, high).
  # Patched floor is 0.28.1; pin exact so fresh installs don't drift.
  esbuild: 0.28.1
  # Google Cloud deps still resolve vulnerable qs/uuid ranges. Pin the
  # vulnerable ranges narrowly instead of overriding whole packages.
  "qs@<6.15.2": 6.15.2
  "uuid@<11.1.1": 11.1.1
  "protobufjs@>=7.0.0 <7.6.3": 7.6.3
  # isows resolves ws@8.20.1 through viem; 8.21.0 contains the GHSA-96hv-2xvq-fx4p
  # fix and stays compatible with isows' ws peer range.
  "ws@<8.21.0": 8.21.0
  # discord.js and @discordjs/rest pin undici exactly. Stay on the same major:
  # undici 8 broke prod once by rejecting @discordjs/rest's response wrapping
  # with Symbol(sensitiveHeaders) (see issue #833).
  "undici@6.24.1": 6.27.0
