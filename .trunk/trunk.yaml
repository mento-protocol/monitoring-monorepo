# https://docs.trunk.io/cli
version: 0.1
cli:
  version: 1.25.0

plugins:
  sources:
    - id: trunk
      ref: v1.7.5
      uri: https://github.com/trunk-io/plugins

runtimes:
  enabled:
    - node@22.16.0
    - python@3.10.8

lint:
  ignore:
    - linters: [ALL]
      paths:
        - "**/node_modules/**"
        - "**/.next/**"
        - "**/coverage/**"
        - "**/generated/**"
        - "**/.envio/**"
    - linters: [eslint]
      paths:
        - indexer-envio/**
    - linters: [osv-scanner]
      paths:
        - indexer-envio/pnpm-lock.yaml
        - pnpm-lock.yaml
  enabled:
    - checkov@3.2.506
    - eslint@10.0.2
    - prettier@3.8.1
    - markdownlint@0.48.0
    - git-diff-check
    - trufflehog@3.93.6
    - osv-scanner@2.3.3
    - codespell@2.4.1
    - actionlint@1.7.8
    - yamllint@1.38.0

actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push # Use custom pre-push below
  definitions:
    - id: trunk-check-all-pre-push
      display_name: Trunk Check All Pre-Push
      run: trunk check --all
      triggers:
        - git_hooks: [pre-push]
    - id: typecheck-pre-push
      display_name: TypeCheck Pre-Push
      description: >
        Runs codegen for indexer-envio (to produce the generated/ types) then
        typechecks both workspaces. Combined into one action so the generated
        module is guaranteed to exist before tsc runs.
      run: pnpm indexer:codegen && pnpm --filter @mento-protocol/ui-dashboard --filter @mento-protocol/indexer-envio typecheck
      triggers:
        - git_hooks: [pre-push]
    - id: test-pre-push
      display_name: Test Pre-Push
      run: pnpm --filter @mento-protocol/ui-dashboard test:coverage
      triggers:
        - git_hooks: [pre-push]
    - id: trunk-fmt-pre-push
      display_name: Trunk Format Pre-Push
      description: Runs trunk fmt --all before push so formatting issues are caught locally, not in CI.
      run: trunk fmt --all
      triggers:
        - git_hooks: [pre-push]
  enabled:
    - trunk-fmt-pre-commit
    - trunk-fmt-pre-push
    - trunk-check-all-pre-push
    - typecheck-pre-push
    - test-pre-push
    - trunk-upgrade-available
