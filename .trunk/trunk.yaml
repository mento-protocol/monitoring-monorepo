# https://docs.trunk.io/cli
version: 0.1
cli:
  version: 1.25.0

plugins:
  sources:
    - id: trunk
      ref: v1.7.5
      uri: https://github.com/trunk-io/plugins

runtimes:
  enabled:
    - node@22.16.0
    - python@3.10.8

lint:
  ignore:
    - linters: [ALL]
      paths:
        - "**/node_modules/**"
        - "**/.next/**"
        - "**/coverage/**"
        - "**/generated/**"
        - "**/.envio/**"
        # Raw Arkham extraction output (gitignored locally; JSONLs of API
        # responses that contain harmless misspellings + are not formatted
        # for human review).
        - "**/.intel-marathon/**"
    - linters: [prettier]
      paths:
        # Clawpatch owns these generated state artifacts; formatting them
        # creates churn without improving source review.
        - .clawpatch/**/*.json
    - linters: [osv-scanner]
      paths:
        - indexer-envio/pnpm-lock.yaml
        - pnpm-lock.yaml
        # Per-package npm lockfile committed for Cloud Build's `npm ci`. Vulns
        # surface against the workspace pnpm-lock.yaml (already ignored above);
        # scanning this derived artifact would just double-report transitive
        # findings with no fix path.
        - alerts/infra/onchain-event-handler/package-lock.json
    - linters: [checkov]
      paths:
        - terraform/main.tf
        - pnpm-lock.yaml
        # Ethereum contract addresses look like base64 high-entropy strings to checkov;
        # this file holds only public proxy + token addresses generated from
        # @mento-protocol/contracts by scripts/generateNttAddresses.mjs.
        - indexer-envio/config/nttAddresses.json
        # Regression fixture — public pool + token addresses used to verify
        # `poolName(chainId, token0, token1)` matches the old hand-rolled
        # POOL_PAIR_LABELS list. No secrets.
        - shared-config/__tests__/fixtures/known-pools.json
  enabled:
    - checkov@3.2.506
    # eslint is run per-package via `pnpm --filter X lint`, wired into the
    # agent quality gate. Each package's lint script invokes
    # `scripts/eslint-baseline-diff.mjs` against its `eslint-baseline.json`
    # (prune-only diff check; fails on any new or stale tuple). Root-level
    # build scripts under `scripts/` are linted by the standalone
    # `pnpm lint:scripts` job in CI — see eslint.config.mjs at the repo
    # root. Re-enabling trunk-eslint here would either duplicate that work
    # or fight the baseline mechanism (trunk treats every warning as a
    # check failure).
    - prettier@3.8.1
    - markdownlint@0.48.0
    - git-diff-check
    - trufflehog@3.93.6
    - osv-scanner@2.3.3
    - codespell@2.4.1
    - actionlint@1.7.8
    - yamllint@1.38.0

actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push # Use custom pre-push below
  definitions:
    - id: agent-quality-gate-pre-push
      display_name: Agent Quality Gate Pre-Push
      description: >
        Runs the path-aware agent quality gate before push. The gate maps the
        branch diff to the required local checks instead of always running the
        full monorepo pre-push suite.
      run: git fetch --quiet origin main && bash scripts/agent-quality-gate.sh --run --fail-fast --skip-if-fresh --base origin/main
      triggers:
        - git_hooks: [pre-push]
  enabled:
    - trunk-fmt-pre-commit
    - agent-quality-gate-pre-push
    - trunk-upgrade-available
