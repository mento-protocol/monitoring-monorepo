packages:
  - .

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@mento-protocol/*"
  - envio-cloud
  - "@envio-dev/envio-cloud-*"
  # Security override floors may be younger than the 3-day release-age gate.
  - brace-expansion
  - fast-uri
  - form-data
  - js-yaml
  - protobufjs
  - vite

overrides:
  "brace-expansion@^1.0.0": 1.1.16
  "brace-expansion@>=5.0.0 <6": 5.0.7
  fast-uri@<3.1.4: 3.1.4
  form-data@<2.5.6: 2.5.6
  "form-data@>=4.0.0 <4.0.6": 4.0.6
  js-yaml@>=4.0.0 <4.3.0: 4.3.0
  protobufjs@>=7.0.0 <7.6.5: 7.6.5
  qs@<6.15.2: 6.15.2
  uuid: 11.1.1
  vite@<8.0.16: 8.0.16
  ws@<8.21.0: 8.21.0

# pnpm 11 records dependency build-script policy explicitly.
allowBuilds:
  protobufjs: false
