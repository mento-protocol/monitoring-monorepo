packages:
  - .

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@mento-protocol/*"
  - envio-cloud
  - "@envio-dev/envio-cloud-*"
  # Security override floors for the 2026-06-15 advisory batch may be younger
  # than the 3-day release-age gate.
  - "@esbuild/*"
  - form-data
  - esbuild
  - js-yaml
  - protobufjs
  - vite

overrides:
  "@grpc/grpc-js": 1.14.4
  body-parser@<1.20.5: 1.20.5
  express: 4.22.2
  form-data@<2.5.6: 2.5.6
  js-yaml@>=4.0.0 <4.2.0: 4.2.0
  protobufjs@>=7.0.0 <7.6.3: 7.6.3
  qs@<6.15.2: 6.15.2
  uuid: 11.1.1
  vite@<8.0.16: 8.0.16

# pnpm 11 records dependency build-script policy explicitly.
allowBuilds:
  protobufjs: false
